<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#1B2A4A" />
  <title>Thermowerk Heizlast</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Thermowerk Heizlast <span class="sub">· FWS Modul 3</span></h1>
    <div class="header-actions">
      <select id="project-select" title="Gespeichertes Projekt laden">
        <option value="">— Projekt laden —</option>
      </select>
      <button id="btn-save"        title="Speichern">Speichern</button>
      <button id="btn-delete"      class="danger" title="Aktuelles Projekt löschen">×</button>
      <button id="btn-neu"         title="Neues Projekt">Neu</button>
      <button id="btn-export-json" title="Als JSON exportieren">JSON ↓</button>
      <button id="btn-import-json" title="JSON importieren">JSON ↑</button>
      <button id="btn-logo-upload" title="Firmenlogo setzen">Logo</button>
      <button id="btn-print-kunde" title="Kundenfreundlicher PDF-Export">PDF Kunde</button>
      <button id="btn-print-full"  class="primary" title="Vollständiger Export inkl. Rechenwege">PDF intern</button>
      <input type="file" id="file-import" accept="application/json" style="display:none" />
      <input type="file" id="file-logo" accept="image/*" style="display:none" />
    </div>
  </header>

  <!-- Druck-Kopf (nur beim Drucken sichtbar) -->
  <div class="print-header" id="print-header">
    <div class="print-logo-wrap"><img id="print-logo" alt="" /></div>
    <div class="print-title">
      <div class="print-title-main">Heizlastberechnung</div>
      <div class="print-title-sub">nach FWS Modul 3</div>
    </div>
    <div class="print-meta" id="print-meta"></div>
  </div>

  <main class="app" id="app">
    <!-- Module werden per JS injiziert -->
  </main>

  <div class="print-footer">
    Berechnung nach FWS Modul 3 (Ausgabe 1-2025) · SIA 384/1:2022 · SIA 385/1:2020.
    Die ausgewiesenen Leistungen sind nach anerkannten Regeln der Technik ermittelt.
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
