<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Thermowerk Logo Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=DM+Sans:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 60px;
      font-family: 'DM Sans', sans-serif;
      background: #f5f5f5;
    }
    .preview-box {
      padding: 40px 60px;
      border-radius: 8px;
      text-align: center;
    }
    .preview-box h3 {
      margin: 0 0 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #999;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .light { background: #ffffff; }
    .dark { background: #1B2A4A; }
    img { max-width: 500px; width: 100%; }
  </style>
</head>
<body>
  <div class="preview-box light">
    <h3>Auf hellem Hintergrund</h3>
    <img src="public/img/logo-thermowerk.svg" alt="Thermowerk Logo">
  </div>
  <div class="preview-box dark">
    <h3 style="color:#667">Auf dunklem Hintergrund</h3>
    <img src="public/img/logo-thermowerk.svg" alt="Thermowerk Logo">
  </div>
</body>
</html>
