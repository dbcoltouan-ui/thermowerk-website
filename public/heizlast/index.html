/* ==============================================================
   Daemm-Dicken-Optionen (m) — Stufe 5.
   Quelle: typische CH-Praxis aus bauteilDefaults
           (4-26 cm in 2-cm-Schritten).
   ============================================================== */
const DAEMM_DICKEN = [0.04, 0.06, 0.08, 0.10, 0.12, 0.14, 0.16, 0.18, 0.20, 0.22, 0.24, 0.26];

/* ==============================================================
   Bauteil-Typ-Aliasse + Richtungs-Lookup
   ============================================================== */
const BT_ALIAS = { aw: 'aussenwand' };

const RICHTUNG = {
  aussenwand: 'horizontal',
  dach:       'aufwaerts',
  boden:      'abwaerts',
};

function normBauteilTyp(t) {
  return BT_ALIAS[t] || t;
}

function dickeLabel(d) {
  const cm = d * 100;
  return (Math.abs(cm - Math.round(cm)) < 0.05 ? cm.toFixed(0) : cm.toFixed(1)) + ' cm';
}

function defaultBauweiseFor(bt, bk) {
  if (bt === 'aussenwand') {
    if (bk === 'vor1945')     return 'vollziegel';
    if (bk === '1946_1960')   return 'backstein';
    return 'hochlochziegel';
  }
  if (bt === 'dach')  return 'steildach_holz';
  if (bt === 'boden') return 'stahlbeton';
  return null;
}

/**
 * Baujahr-typisches `hatDaemmung`-Default fuer den Bestand
 * (NICHT Sanierungs-Default). Vor 1978 typisch ungedaemmt,
 * danach mit Daemmung gerechnet.
 */
function defaultHatDaemmungFor(bk) {
  if (bk === 'vor1945' || bk === '1946_1960' || bk === '1961_1977') return false;
  return true;
}

/**
 * Liefert die UI-Stufen-Definition fuer ein Bauteil.
 * Aufruf vom UI: rendere pro Stufe ein <select> mit options[],
 * speichere User-Wahl in partialState und rufe `computeUWert`.
 *
 * @param {('aw'|'aussenwand'|'dach'|'boden'|'fenster')} bauteilTyp
 * @param {number|string} baujahr
 * @param {object} [partialState] — User-Selektionen (sel.bauweise etc.)
 * @returns {{
 *   bauteilTyp: string,
 *   baujahrklasse: string,
 *   fenster: boolean,
 *   isDoppelmauerwerk?: boolean,
 *   stufen: Array<{key,label,options,defaultIfUnknown,source,locked?:boolean}>
 * }}
 */
function getStufen(bauteilTyp, baujahr, partialState) {
  const bt = normBauteilTyp(bauteilTyp);
  const bk = baujahrklasse(baujahr) || '1978_1994';
  const sel = partialState || {};

  /* ---- Fenster: nur EINE Stufe (Generation) ---- */
  if (bt === 'fenster') {
    const genOptions = Object.keys(FENSTER_GENERATIONEN)
      .filter(k => k !== 'unbekannt')
      .map(k => ({
        value: k,
        label: FENSTER_GENERATIONEN[k].label + ' (Uw=' + FENSTER_GENERATIONEN[k].uw.toFixed(2) + ')',
      }));
    genOptions.push({ value: null, label: '— Unbekannt (Pauschalwert)' });
    return {
      bauteilTyp: bt,
      baujahrklasse: bk,
      fenster: true,
      stufen: [
        {
          key: 'generation',
          label: 'Fenster-Generation',
          options: genOptions,
          defaultIfUnknown: FENSTER_GEN_DEFAULT_BY_BK[bk] || '2fach_unbeschichtet',
          source: 'fensterGenerationDefault[' + bk + ']',
        },
      ],
    };
  }

  /* ---- AW / Dach / Boden: 5 Stufen ---- */
  const bws = BAUWEISEN[bt] || [];
  const defaults = bauteilDefaultsFor(bt, bk) || null;
  const isDoppel = sel.bauweise === 'doppelmauerwerk';

  // Stufe 1 — Bauweise
  const bauweiseOptions = bws.map(b => ({ value: b.key, label: b.label, lambda: b.lambda }));
  bauweiseOptions.push({ value: null, label: '— Unbekannt (Pauschalwert)' });
  const defaultBwKey = defaultBauweiseFor(bt, bk) || (bws[0] && bws[0].key) || null;

  const activeBwKey = sel.bauweise || defaultBwKey;
  const activeBw = bws.find(b => b.key === activeBwKey) || bws[0];

  // Stufe 2 — Dicke
  const dickenOptions = (activeBw ? activeBw.dicken : []).map(d => ({ value: d, label: dickeLabel(d) }));
  dickenOptions.push({ value: null, label: '— Unbekannt (Pauschalwert)' });

  // Stufe 3 — Daemmung ja/nein (Doppelmauerwerk: locked-true)
  const daemmungOptions = isDoppel
    ? [{ value: true, label: 'Ja (Kerndaemmung — fix bei Doppelmauerwerk)' }]
    : [
        { value: true,  label: 'Ja' },
        { value: false, label: 'Nein' },
        { value: null,  label: '— Unbekannt (Pauschalwert)' },
      ];

  // Stufe 4 — Daemm-Material
  const daemmstoffOptions = Object.keys(DAEMMSTOFFE)
    .filter(k => k !== 'unbekannt')
    .map(k => ({ value: k, label: DAEMMSTOFFE[k].label + ' (λ=' + DAEMMSTOFFE[k].lambda.toFixed(3) + ')' }));
  daemmstoffOptions.push({ value: null, label: '— Unbekannt (Pauschalwert)' });

  // Stufe 5 — Daemm-Dicke
  const daemmDickenOptions = DAEMM_DICKEN.map(d => ({ value: d, label: dickeLabel(d) }));
  daemmDickenOptions.push({ value: null, label: '— Unbekannt (Pauschalwert)' });

  return {
    bauteilTyp: bt,
    baujahrklasse: bk,
    fenster: false,
    isDoppelmauerwerk: isDoppel,
    stufen: [
      {
        key: 'bauweise',
        label: 'Bauweise',
        options: bauweiseOptions,
        defaultIfUnknown: defaultBwKey,
        source: 'BAUWEISEN[' + bt + '] + bauteilDefaults[' + bk + ']',
      },
      {
        key: 'dicke',
        label: 'Dicke der Tragschicht',
        options: dickenOptions,
        defaultIfUnknown: activeBw ? activeBw.defaultDicke : null,
        source: 'BAUWEISEN[' + bt + '][' + (activeBw ? activeBw.key : '?') + '].defaultDicke',
      },
      {
        key: 'hatDaemmung',
        label: 'Ist gedaemmt?',
        options: daemmungOptions,
        defaultIfUnknown: isDoppel ? true : defaultHatDaemmungFor(bk),
        source: 'baujahrklasse-Default (vor 1978 = nein, ab 1978 = ja)',
        locked: isDoppel,
      },
      {
        key: 'daemmstoff',
        label: 'Daemm-Material',
        options: daemmstoffOptions,
        defaultIfUnknown: defaults && defaults.daemmung ? defaults.daemmung.material : 'mineralwolle',
        source: 'bauteilDefaults[' + bk + '].daemmung.material',
      },
      {
        key: 'daemmDicke',
        label: 'Daemm-Dicke',
        options: daemmDickenOptions,
        defaultIfUnknown: defaults && defaults.daemmung ? defaults.daemmung.dicke : 0.06,
        source: 'bauteilDefaults[' + bk + '].daemmung.dicke',
      },
    ],
  };
}

/**
 * Berechnet den U-Wert + Quelle aus den User-Selektionen.
 * Stufen mit `null` werden mit dem Baujahrs-/Bauteil-Default
 * pauschalisiert; bekannte Stufen bleiben exakt.
 *
 * @param {('aw'|'aussenwand'|'dach'|'boden'|'fenster')} bauteilTyp
 * @param {number|string} baujahr
 * @param {object} selections
 *   AW/Dach/Boden: {bauweise, dicke, hatDaemmung, daemmstoff, daemmDicke}
 *   Fenster:       {generation}
 * @returns {{
 *   uWert: number|null,
 *   quelle: 'voll-bekannt'|'gemischt'|'voll-unbekannt',
 *   schichten: Array,
 *   defaultsAngewendet: object,
 *   unbekanntStufen: string[],
 *   marker: string
 * }}
 */
function computeUWert(bauteilTyp, baujahr, selections) {
  const bt = normBauteilTyp(bauteilTyp);
  const bk = baujahrklasse(baujahr) || '1978_1994';
  const sel = selections || {};

  /* ---- Fenster: 1 Stufe ---- */
  if (bt === 'fenster') {
    const wasUnknown = (sel.generation == null);
    const gen = wasUnknown
      ? (FENSTER_GEN_DEFAULT_BY_BK[bk] || '2fach_unbeschichtet')
      : sel.generation;
    const def = FENSTER_GENERATIONEN[gen] || FENSTER_GENERATIONEN['2fach_unbeschichtet'];
    return {
      uWert: def.uw,
      quelle: wasUnknown ? 'voll-unbekannt' : 'voll-bekannt',
      schichten: [],
      defaultsAngewendet: { generation: gen },
      unbekanntStufen: wasUnknown ? ['generation'] : [],
      marker: wasUnknown ? 'baujahr' : 'gemessen',
    };
  }

  /* ---- AW / Dach / Boden ---- */
  const bws = BAUWEISEN[bt] || [];
  const defaults = bauteilDefaultsFor(bt, bk) || null;
  const unbekanntStufen = [];
  const angewendet = {};

  // Pre-Check: voll-unbekannt → direkter Baujahr-Lookup statt Schicht-Rekonstruktion
  // (sonst liefert der Sanierungs-Default in bauteilDefaults einen zu niedrigen
  // U-Wert fuer Altbauten, vgl. Refactor-Plan-Einfach-Modus-V2 §3 Schritt 2).
  const allNull = (sel.bauweise == null) && (sel.dicke == null) && (sel.hatDaemmung == null) && (sel.daemmstoff == null) && (sel.daemmDicke == null);
  if (allNull) {
    const bauteilTypForFallback = bt === 'aussenwand' ? 'aussenwand'
      : bt === 'dach' ? 'dach'
      : bt === 'boden' ? 'bodenPlatte' : null;
    const dachform = bt === 'dach' ? 'steildach' : undefined;
    const fb = uValueFallback({
      bauteilTyp: bauteilTypForFallback,
      baujahr,
      gebaeudetyp: 'EFH',
      dachform,
    });
    return {
      uWert: fb.u,
      quelle: 'voll-unbekannt',
      schichten: [],
      defaultsAngewendet: { quelle: 'baujahr-typ-uwert', baujahrklasse: bk },
      unbekanntStufen: ['bauweise', 'dicke', 'hatDaemmung', 'daemmstoff', 'daemmDicke'],
      marker: 'baujahr',
    };
  }

  // 1. bauweise
  let bwKey = sel.bauweise;
  if (bwKey == null) {
    unbekanntStufen.push('bauweise');
    bwKey = defaultBauweiseFor(bt, bk) || (bws[0] && bws[0].key);
  }
  angewendet.bauweise = bwKey;
  const bwDef = bws.find(b => b.key === bwKey) || bws[0];
  const isDoppel = bwKey === 'doppelmauerwerk';

  // 2. dicke
  let dicke = sel.dicke;
  if (dicke == null) {
    unbekanntStufen.push('dicke');
    dicke = bwDef ? bwDef.defaultDicke : null;
  }
  angewendet.dicke = dicke;

  // 3. hatDaemmung — bei Doppelmauerwerk locked auf true
  let hatDaemmung;
  if (isDoppel) {
    hatDaemmung = true;
  } else if (sel.hatDaemmung == null) {
    unbekanntStufen.push('hatDaemmung');
    hatDaemmung = defaultHatDaemmungFor(bk);
  } else {
    hatDaemmung = sel.hatDaemmung;
  }
  angewendet.hatDaemmung = hatDaemmung;

  // 4 + 5. daemmstoff + daemmDicke (nur wenn hatDaemmung)
  let daemmstoff = null;
  let daemmDicke = 0;
  if (hatDaemmung) {
    daemmstoff = sel.daemmstoff;
    if (daemmstoff == null) {
      unbekanntStufen.push('daemmstoff');
      daemmstoff = (defaults && defaults.daemmung) ? defaults.daemmung.material : 'mineralwolle';
    }
    angewendet.daemmstoff = daemmstoff;

    daemmDicke = sel.daemmDicke;
    if (daemmDicke == null) {
      unbekanntStufen.push('daemmDicke');
      daemmDicke = (defaults && defaults.daemmung) ? defaults.daemmung.dicke : 0.06;
    }
    angewendet.daemmDicke = daemmDicke;
  }

  // Schichten zusammenbauen
  const schichten = [];
  if (bwDef && bwDef.holzbau) {
    // Holzrahmen-Komposit: Beplankung + Staender (mit/ohne Daemmung) + Aussenschalung
    schichten.push({ label: 'Innenbeplankung Gipskarton', lambda: 0.21, d: 0.0125 });
    if (hatDaemmung && daemmDicke > 0) {
      schichten.push({ material: daemmstoff, d: daemmDicke });
    } else {
      // Ohne Daemmung: Hohlraum-Mittelwert (ungewoehnliche Wahl, aber nicht blockieren)
      schichten.push({ label: 'Holzrahmen Hohlraum', lambda: 0.13, d: dicke });
    }
    schichten.push({ label: 'Aussenschalung Holz', lambda: 0.13, d: 0.022 });
  } else if (isDoppel) {
    // Zweischalig: Innenputz + Innenschale 17,5 cm + Kerndaemmung + Klinker-Vormauer 11,5 cm
    schichten.push({ label: 'Innenputz Kalkgips', lambda: 0.70, d: 0.015 });
    schichten.push({ label: 'Innenschale Mauerwerk', lambda: 0.81, d: 0.175 });
    schichten.push({ material: daemmstoff, d: daemmDicke });
    schichten.push({ label: 'Aussenschalung Holz', lambda: 0.13, d: 0.022 });
  } else if (isDoppel) {
    // Zweischalig: Innenputz + Innenschale 17,5 cm + Kerndaemmung + Klinker-Vormauer 11,5 cm
    schichten.push({ label: 'Innenputz Kalkgips', lambda: 0.70, d: 0.015 });
    schichten.push({ label: 'Innenschale Mauerwerk', lambda: 0.81, d: 0.175 });
    schichten.push({ material: daemmstoff, d: daemmDicke });
    schichten.push({ label: 'Aussenschale Klinker', lambda: 0.81, d: 0.115 });
  } else {
    // Massiv (Vollziegel/Backstein/HLZ/KSE/Porenbeton/Stahlbeton/Steildach/Flachdach/Boden)
    if (defaults && defaults.putzInnen) schichten.push({ ...defaults.putzInnen });
    if (bwDef) schichten.push({ label: bwDef.label, lambda: bwDef.lambda, d: dicke });
    if (hatDaemmung && daemmDicke > 0) schichten.push({ material: daemmstoff, d: daemmDicke });
    if (defaults && defaults.putzAussen) schichten.push({ ...defaults.putzAussen });
  }

  // U-Wert via Schichtformel
  const dir = RICHTUNG[bt] || 'horizontal';
  const r = uWertAusSchichten(schichten, { direction: dir, markerSource: 'material' });

  // Quelle klassifizieren
  const relevantCount = 2 + (isDoppel ? 0 : 1) + (hatDaemmung ? 2 : 0);
  let quelle;
  if (unbekanntStufen.length === 0) quelle = 'voll-bekannt';
  else if (unbekanntStufen.length >= relevantCount) quelle = 'voll-unbekannt';
  else quelle = 'gemischt';

  // Marker passend zur Quelle
  const marker = quelle === 'voll-bekannt' ? 'gemessen'
                : quelle === 'voll-unbekannt' ? 'baujahr'
                : 'gemischt';

  return {
    uWert: r.U,
    quelle,
    schichten: r.schichten,
    defaultsAngewendet: angewendet,
    unbekanntStufen,
    marker,
  };
}

/* export default */ void {
  BAUWEISEN,
  DAEMM_DICKEN,
  FENSTER_GEN_DEFAULT_BY_BK,
  getStufen,
  computeUWert,
};

__mods__["./calc/material-picker.mjs"] = { getStufen, computeUWert, FENSTER_GEN_DEFAULT_BY_BK, BAUWEISEN, DAEMM_DICKEN };
})();

// === ./calc/dhw.mjs ===
(function(){
// src/calc/dhw.mjs
// Warmwasser-Auslegung — FWS-Methode (Modul 3 §8) + Norm-Werte SIA 385/2.
// Quelle: reference/FWS-RECHENWEGE.md §6/§9, reference/wissensbasis-auszug.md §D.
//
// Pure Funktionen — kein DOM-/FS-Zugriff.
//
// Hauptpfade:
//   1. VW,u (Tagesvolumen) — direkt | Personen × l/(P·d) | Messung (QW,u direkt)
//   2. QW,u = V · cp · ΔT / 3600                                [kWh/d]
//   3. QWW = QW,u + Σ Verluste (Speicher, Zirkulation, Ausstoss) [kWh/d]
//   4. Qn,WW = QWW · 365                                         [kWh/a]
//   5. Qw  = Q_HL · (24/(24−td) − 1), td = QWW/Q_HL              [kW]
//   6. VW,Sto = QWW / (cp·ΔT/3600) · f_Sto                       [l]
//      gerundet markt-realistisch (50/100/250/500-L-Schritte oder 10er).

/* ==========================================================================
   KONSTANTEN
   ========================================================================== */

const C_P = 4.2;     // kJ/(kg·K), Wasser
const RHO_W = 1.0;   // kg/l

// Tagesbedarf pro Person — SIA 385/2 / FWS §8.1 / Wissensbasis D
const VWU_PRESETS = [
  { key:'sparsam',  label:'Sparsam (Dusche)',     lPd: 30 },
  { key:'normal',   label:'Normal (Standard)',     lPd: 40 },
  { key:'komfort',  label:'Komfort (inkl. Bad)',  lPd: 55 },
  { key:'mfh',      label:'MFH allgemein',         lPd: 35 },
  { key:'mfh_geh',  label:'MFH gehoben',           lPd: 45 },
  { key:'buero',    label:'Bürogebäude',           lPd:  3 }
];

// Speicher-Konfiguration f_Sto (FWS §10.2)
const F_STO_PRESETS = [
  { key:'innen',  label:'Innenliegender WT (Misch- + Kaltzone)',     fSto: 1.25 },
  { key:'aussen', label:'Aussenliegender WT (nur Mischzone)',         fSto: 1.10 },
  { key:'ohne',   label:'Keine Misch-/Kaltzone (ideale Schichtung)',  fSto: 1.00 }
];

// Verlustfaktor-Defaults (Prozent)
const VERLUST_DEFAULTS = {
  speicher: 10,    // %
  zirk: 0,         // % (nur wenn Zirkulation vorhanden)
  ausstoss: 15     // %
};

/* ==========================================================================
   PRIMITIV-FORMELN
   ========================================================================== */

/** VW,u aus Personen × l/(P·d) oder Direkteingabe.
 *  inputs = { modus:'direkt'|'personen'|'messung', VW_u, personen, lProPerson, QW_u? } */
function effectiveVWu(inputs = {}){
  if (inputs.modus === 'personen'){
    const p = Number(inputs.personen) || 0;
    const l = Number(inputs.lProPerson) || 40;
    return p * l;
  }
  if (inputs.modus === 'messung') return 0; // QW,u wird direkt geliefert
  return Number(inputs.VW_u) || 0;
}

/** QW,u Tages-Nutzwärmebedarf [kWh/d]. */
function qwuTag({ V_l_d, cp = C_P, dT = 50 }){
  return ((Number(V_l_d) || 0) * cp * (Number(dT) || 0)) / 3600;
}

/** QWW [kWh/d] = QW,u · Π(1 + f_i). */
function qwwTag({ QW_u, fSpeicher = 0, fZirk = 0, fAusstoss = 0 }){
  return (Number(QW_u) || 0)
       * (1 + (Number(fSpeicher) || 0)/100)
       * (1 + (Number(fZirk) || 0)/100)
       * (1 + (Number(fAusstoss) || 0)/100);
}

/** Qn,WW Jahres-Kompaktformel (FWS §8). */
function qnwwJahr({ V_l_d, cp = C_P, dT = 50, fSpeicher = 0, fZirk = 0, fAusstoss = 0 }){
  if (!(V_l_d > 0)) return 0;
  const base = V_l_d * cp * dT / 3600 * 365;
  const factor = (1 + fSpeicher/100) * (1 + fZirk/100) * (1 + fAusstoss/100);
  return base * factor;
}

/** Qw — WP-Leistungszuschlag für WW. td auf [0,12] geclampt. */
function qw({ Qhl, QWW_Tag }){
  if (!(Qhl > 0) || !(QWW_Tag > 0)) return { Qw: 0, td: 0, tdRaw: 0, tdClamped: false };
  const tdRaw = QWW_Tag / Qhl;
  const td = Math.max(0, Math.min(12, tdRaw));
  return {
    Qw: Qhl * (24/(24 - td) - 1),
    td, tdRaw, tdClamped: tdRaw > 12
  };
}

/** VW,Sto-Roh: V = QWW_Tag / (cp·ΔT/3600). */
function vwStoRoh({ QWW_Tag, cp = C_P, dT = 50 }){
  if (!(QWW_Tag > 0) || !(dT > 0)) return 0;
  return QWW_Tag / (cp * dT / 3600);
}

/** Marktrealistische Speichervolumen-Staffelung (AUFRUNDEN).
 *  ≤ 200 L → 50er, 200..500 L → 100er, 500..1000 L → 250er, > 1000 L → 500er. */
function rundeSpeicherMarkt(V){
  if (!(V > 0)) return 0;
  if (V <= 200) return Math.ceil(V / 50)  * 50;
  if (V <= 500) return Math.ceil(V / 100) * 100;
  if (V <= 1000) return Math.ceil(V / 250) * 250;
  return Math.ceil(V / 500) * 500;
}

/** Heizpuffer-Staffelung (Variante mit feinerer Auflösung): ≤ 200 L → 50er, ≤ 500 L → 100er, sonst 200er. */
function rundePufferMarkt(V){
  if (!(V > 0)) return 0;
  if (V <= 200) return Math.ceil(V / 50)  * 50;
  if (V <= 500) return Math.ceil(V / 100) * 100;
  return Math.ceil(V / 200) * 200;
}

/** Speichervolumen mit f_Sto-Aufschlag, gerundet 10-L-Schritte (FWS-Default). */
function speichervolumen({ QWW_Tag, cp = C_P, dT = 50, fSto = 1.0 }){
  const V = vwStoRoh({ QWW_Tag, cp, dT });
  if (V <= 0) return 0;
  return Math.ceil(V * fSto / 10) * 10;
}

/** Sicherheitsventil-Empfehlung nach DIN EN 12828 / SIA 384.201.
 *  Anschlussweite und Auslösedruck nach Kessel-Nennleistung Q_h [kW].
 *  Quelle: Wissensbasis §F (TRD 721 / EN 12828, gängige CH-Praxis).
 */
function sicherheitsventilEmpfehlung(Qh_kW){
  const Q = Number(Qh_kW) || 0;
  if (Q <= 0) return null;
  let dn, anschluss, p_ansprech;
  if (Q <= 50)       { dn = 'DN15';  anschluss = '1/2"'; p_ansprech = 3.0; }
  else if (Q <= 100) { dn = 'DN20';  anschluss = '3/4"'; p_ansprech = 3.0; }
  else if (Q <= 200) { dn = 'DN25';  anschluss = '1"';   p_ansprech = 3.0; }
  else if (Q <= 350) { dn = 'DN32';  anschluss = '1¼"';  p_ansprech = 4.0; }
  else               { dn = 'DN40';  anschluss = '1½"';  p_ansprech = 4.0; }
  return { dn, anschluss, p_ansprech_bar: p_ansprech, Qh_kW: Q };
}

/** Wasser-Ausdehnungsfaktor n in Abhängigkeit von ΔT (10/4 °C → tmax).
 *  Tabellenwerte VDI 4708 / DIN EN 12828, gerundet:
 *    ΔT 50K → n ≈ 0.0143    ΔT 70K → n ≈ 0.0226    ΔT 90K → n ≈ 0.0344
 *  Linear interpoliert; clampt zwischen 30 und 100 K. */
function ausdehnungsfaktor(deltaT_K){
  const dT = Math.max(30, Math.min(100, Number(deltaT_K) || 0));
  // Stützpunkte aus Wasser-Dichtetabelle (Mittel zwischen 10°C und tmax):
  const PTS = [
    [30, 0.0061], [40, 0.0096], [50, 0.0143], [60, 0.0181],
    [70, 0.0226], [80, 0.0284], [90, 0.0344], [100, 0.0408]
  ];
  for (let i = 0; i < PTS.length - 1; i++){
    const [t1, n1] = PTS[i], [t2, n2] = PTS[i + 1];
    if (dT >= t1 && dT <= t2){
      const k = (dT - t1) / (t2 - t1);
      return n1 + k * (n2 - n1);
    }
  }
  return PTS[PTS.length - 1][1];
}

/** Schätzung Anlagenvolumen wenn nicht explizit angegeben.
 *  Faustformel CH-EFH: 12 L/kW Heizleistung Rohrnetz + Speicher/Puffer addieren.
 *  V_Anlage = 12 · Qh_kW + V_Puffer + V_WW_Speicher (wenn im Heizkreis).
 */
function anlagenvolumenSchaetzung({ Qh_kW = 0, V_puffer = 0, V_speicherWW_im_HK = 0 } = {}){
  return 12 * (Number(Qh_kW) || 0) + (Number(V_puffer) || 0) + (Number(V_speicherWW_im_HK) || 0);
}

/** Membran-Ausdehnungsgefäss (MAG) Nennvolumen nach DIN EN 12828:
 *    V_n = (V_a · n + V_v) · (p_e + 1) / (p_e − p_0)
 *  V_a = Anlagenvolumen [L], V_v = Wasservorlage = max(3 L, 0.5 % · V_a),
 *  p_e = Enddruck [bar], p_0 = Vordruck [bar].
 *  Gerundet auf marktrealistische Stufen 8/12/18/25/35/50/80/100/140/200/250 L.
 */
const MAG_STUFEN = [8, 12, 18, 25, 35, 50, 80, 100, 140, 200, 250, 300, 400, 500];

function magVolumen({ V_a, deltaT_K = 70, p_e = 2.5, p_0 = 1.0 } = {}){
  const Va = Number(V_a) || 0;
  if (!(Va > 0)) return { V_n: 0, V_n_markt: 0, V_v: 0, n: 0, hinweis: 'Anlagenvolumen fehlt' };
  const n = ausdehnungsfaktor(deltaT_K);
  const V_v = Math.max(3, 0.005 * Va); // mind. 3 L oder 0.5 %
  const pE = Number(p_e), p0 = Number(p_0);
  const denom = (pE - p0);
  if (!(denom > 0)) return { V_n: 0, V_n_markt: 0, V_v, n, hinweis: 'p_e muss > p_0 sein' };
  const V_n = (Va * n + V_v) * (pE + 1) / denom;
  // Aufrunden auf nächste Marktstufe
  const stufe = MAG_STUFEN.find(s => s >= V_n) || (Math.ceil(V_n / 50) * 50);
  return { V_n, V_n_markt: stufe, V_v, n, hinweis: 'OK' };
}

function computeDhw({

/**
 * Filtert Förderprogramme nach Kanton + Massnahme.
 *
 * @param {{programme: Array}} foerderDb  geladene foerderungen.json
 * @param {object} kriterien
 * @param {string} kriterien.kanton        2-Letter-Code (ZH, BE, ...) — leer = nur Bund
 * @param {string} kriterien.massnahme     Massnahme-ID
 * @param {string} [kriterien.wp_quelle]   'luft' | 'sole' | 'wasser' — filtert WP-Programme heuristisch
 * @returns {Array} passende Programme, sortiert: Bund zuerst, dann Kanton.
 */
function filterFoerderungen(foerderDb, kriterien){
  if (!foerderDb || !Array.isArray(foerderDb.programme)) return [];
  const k = (kriterien && kriterien.kanton || '').toUpperCase().trim();
  const m = kriterien && kriterien.massnahme || '';
  const q = (kriterien && kriterien.wp_quelle || '').toLowerCase();
  if (!m) return [];

  const matches = [];
  for (const p of foerderDb.programme){
    if (!Array.isArray(p.massnahmen) || !p.massnahmen.includes(m)) continue;
    // Kanton-Match: '*' = bundesweit, sonst exakter Kanton.
    const programKanton = (p.kanton || '').toUpperCase();
    if (programKanton !== '*' && programKanton !== k) continue;
    // WP-Quelle: wenn Programm-Name auf spezifische Quelle hinweist und User andere wählt, ausblenden.
    if (m === 'heizungsersatz' && q){
      const nameLower = (p.name || '').toLowerCase();
      const isSole = /sol[e/]|wasser\/wasser|sol\/eau|eau\/eau|salamoia/.test(nameLower);
      const isLuft = /luft\/wasser|air\/eau|aria\/acqua/.test(nameLower);
      const isWasser = /wasser\/wasser|eau\/eau/.test(nameLower);
      // Wenn Programm spezifisch ist und nicht zur Quelle passt, ausblenden.
      if (q === 'luft' && (isSole || isWasser) && !isLuft) continue;
      if (q === 'sole' && isLuft && !isSole) continue;
      if (q === 'wasser' && isLuft && !(isWasser || isSole)) continue;
    }
    matches.push(p);
  }

  // Sortierung: Bund (kanton === '*') zuerst, dann nach Kanton-Code, dann Name.
  matches.sort((a, b) => {
    const ka = (a.kanton || '').toUpperCase(), kb = (b.kanton || '').toUpperCase();
    if (ka === '*' && kb !== '*') return -1;
    if (kb === '*' && ka !== '*') return 1;
    if (ka !== kb) return ka < kb ? -1 : 1;
    return String(a.name).localeCompare(String(b.name));
  });
  return matches;
}

/**
 * Liefert kantonale Baubewilligungs-Hinweise für gegebenen Kanton.

 * @param {object} bauDb  geladene baubewilligungen.json

function lookupBaubewilligung(bauDb, kanton){

  const k = (kanton || '').toUpperCase().trim();
  if (!k) return null;

/**
 * Schätzt einen Förderbetrag auf Basis der Q_h-Auslegungsleistung bzw. Bauteilfläche.
 * Nur Richtwert für Anzeige — verbindlich ist immer das Antragsportal.
 *
 * @param {object} program     Programm-Eintrag
 * @param {object} kontext     { Qh_kW, A_bauteil_m2, kollektor_m2, kWp }
 * @returns {number|null} CHF-Betrag oder null wenn nicht ableitbar.
 */
function schaetzeBetrag(program, kontext){
  if (!program) return null;
  const grund = Number(program.betrag_chf_grund) || 0;
  const perUnit = Number(program.betrag_chf_per_unit) || 0;
  const einheit = (program.einheit || '').toLowerCase();
  let menge = 0;
  if (einheit === 'chf/kw') menge = Number(kontext && kontext.Qh_kW) || 0;
  else if (einheit === 'chf/m²' || einheit === 'chf/m2') {
    // Bauteilfläche / Kollektor / je nach Massnahme
    if ((program.massnahmen || []).includes('thermische_solar')){
      menge = Number(kontext && kontext.kollektor_m2) || 0;
    } else {
      menge = Number(kontext && kontext.A_bauteil_m2) || 0;
    }
  }
  else if (einheit === 'chf/kwp') menge = Number(kontext && kontext.kWp) || 0;
  else if (einheit === 'pauschal') return grund > 0 ? grund : null;

  if (grund <= 0 && perUnit <= 0) return null;
  if (menge <= 0 && perUnit > 0 && grund <= 0) return null;
  return grund + perUnit * menge;
}

/**
 * Vergleicht Norm-Heizlast mit FWS-Verbrauchs-Heizlast und liefert Ampel.
 *
 * Schwellen (Spezifikation S6):
 *   <10 %  → grün (Werte stimmen gut überein)
 *   10–25 % → gelb (Verbrauchsdaten prüfen)
 *   >25 %  → rot (Konflikt — einer der Werte stimmt nicht)
 *
 * @param {number} Qhl_norm_kW Norm-Heizlast (Detail) in kW
 * @param {number} Qhl_fws_kW  FWS-Verbrauchs-Heizlast in kW
 * @returns {{abweichung_proz:(number|null), ampel:('gruen'|'gelb'|'rot'|'grau'), hinweis:string}}
 */
function vergleichNormVerbrauch(Qhl_norm_kW, Qhl_fws_kW){
  const a = Number(Qhl_norm_kW), b = Number(Qhl_fws_kW);
  if (!Number.isFinite(a) || !Number.isFinite(b) || a <= 0 || b <= 0){
    return { abweichung_proz: null, ampel: 'grau', hinweis: 'Werte unvollständig — Vergleich nicht möglich.' };
  }
  const abw = Math.abs(a - b) / Math.max(a, b) * 100;
  if (abw < 10){
    return { abweichung_proz: abw, ampel: 'gruen', hinweis: 'Werte stimmen gut überein — Auslegung plausibel.' };
  }
  if (abw < 25){
    return { abweichung_proz: abw, ampel: 'gelb',
      hinweis: 'Mittlere Abweichung — Verbrauchsdaten prüfen (Klimakorrektur, WW-Anteil, Stillstand).' };
  }
  return { abweichung_proz: abw, ampel: 'rot',
    hinweis: 'Grosse Abweichung — einer der Werte stimmt nicht (Bauteilflächen / U-Werte / Verbrauchsbilanz).' };
}

/**
 * Gruppiert/aggregiert die Liste — sinnvoll fürs Cockpit.
 * @returns {{ bund: Array, kanton: Array, total_geschaetzt: number|null }}
 */
function gruppiereProgramme(programme, kontext){
  const bund = [], kanton = [];
  let total = 0; let any = false;
  for (const p of programme){
    if ((p.kanton || '').toUpperCase() === '*') bund.push(p);
    else kanton.push(p);
    const b = schaetzeBetrag(p, kontext);
    if (b != null && Number.isFinite(b) && b > 0){ total += b; any = true; }
  }
  return { bund, kanton, total_geschaetzt: any ? total : null };
}

  updateFoerderung(state, calc);
  updateBaubewilligung(state);
  applyAllConditionals(state);
  syncPeriodsCount(state);
  syncRoomsCount(state);
  syncKreiseCount(state);
  syncRaumHflCount(state);
}

/* =========================================================================
   RENDER — STATIC SKELETON
   ========================================================================= */

function renderStepper(){
  return STEPS.map(s => `
    <button class="step" type="button" data-step="${s.id}" aria-controls="${s.id}">
      <span class="step__num">${s.num}</span>
      <span>${s.label}</span>
    </button>
  `).join('');
}

function renderSections(s){
  // Aufbauende Reihenfolge — Stamm → Hülle → Räume → WW → Wärmeübergabe →
  // Zuschläge → Heizlast → Speicher → Gerät → Förder → Bau → Ergebnis.
  // Detail-only Sektionen werden nur im Detail-Modus eingeblendet.
  const detail = !!s?.detail?.aktiv;
  // Notizen-Block am Ende jeder Sektion (vor </section>) injizieren.
  const noted = (html, key) => html.replace(/<\/section>\s*$/, renderSectionNotes(s, key) + '\n  </section>');
  const out = [noted(renderStammdaten(s), 'stamm')];
  if (detail){
    out.push(noted(renderHuelle(s), 'huelle'));
    out.push(noted(renderRaeume(s), 'raeume'));
  }
  out.push(noted(renderWarmwasser(s), 'ww'));
  if (detail) out.push(noted(renderVerteilung(s), 'verteilung'));
  out.push(noted(renderZuschlaege(s), 'zuschlaege'));
  out.push(noted(renderHeizlast(s), 'heizlast'));
  out.push(noted(renderSpeicher(s), 'speicher'));
  if (detail){
    out.push(noted(renderGeraet(s), 'geraet'));
    out.push(noted(renderFoerderung(s), 'foerder'));
    out.push(noted(renderBaubewilligung(s), 'bau'));
  }
  out.push(renderErgebnis(s));
  return out.join('');
}

/**
 * S7 — Sektion-Notizen (collapse). Pro Bereich ein Textarea, das im Export
 * mitgenommen wird. Path: notes.<key> (siehe state.mjs).
 */
function renderSectionNotes(s, key){
  const v = s?.notes?.[key] || '';
  return `

}

  tueren: 'aussenluft', boden: 'erdreich'
};
function anschlussOptsFor(typ){
  if (typ === 'boden') return ['erdreich', 'unbeheizt', 'durchfahrt'].map(k => ANSCHLUSS_OPTS[k]);
  if (typ === 'wand' || typ === 'tueren') return ['aussenluft', 'unbeheizt', 'beheizt'].map(k => ANSCHLUSS_OPTS[k]);
  if (typ === 'dach') return ['aussenluft', 'unbeheizt'].map(k => ANSCHLUSS_OPTS[k]);
  return ['aussenluft', 'unbeheizt'].map(k => ANSCHLUSS_OPTS[k]);
}

/** Aufgelöste U-Werte aus Hülle.
 *  Pro Bauteil wird der gleiche Resolver wie für Räume verwendet — d.h.
 *  variant ('unbekannt'/'unsaniert'/'saniert'/'schichten'/'eigener') +
 *  optionale layers + dach-form/fenster-gen treiben den U-Wert.
 *  Backwards-Compat: alte u_user-Felder werden als 'eigener' interpretiert.
 */
function resolveHuelleUWerte(state){
  const det = state?.detail?.huelle || {};
  const obj = state?.objekt || {};
  let bk = bauklasseFromPeriode(obj.bauperiode);
  bk = applySanierung(bk, obj.sanierungsstand) || bk;
  const out = {};
  const hints = {};
  for (const key of ['wand','fenster','dach','boden','tueren']){
    const slot = det[key] || {};
    let variant = slot.variant;
    if (!variant && (slot.u_user != null && slot.u_user !== '')) variant = 'eigener';
    if (!variant) variant = 'unbekannt';
    const fakeB = {
      typ: key, variant, layers: slot.layers,
      u_override: slot.u_user,
      anschluss: ANSCHLUSS_DEFAULT[key],
      dach_variant: slot.dach_variant,
      fenster_gen: slot.fenster_gen,
      fenster_rahmen: slot.fenster_rahmen
    };
    const r = resolveBauteilUFrt(state, fakeB);
    out[key] = r.u || 0;
    hints[key] = { auto: r.u, user: slot.u_user, eff: r.u, bauklasse: bk, source: r.source };
  }
  return { uHuelle: out, hints, bauklasse: bk };
}

/**
 * S7 — Resolver für U-Wert + f_RT eines Bauteils.
 * Nutzt data/u-werte.json + Bauperiode + Sanierungsstand + Variant + Anschluss.
 * Liefert immer ein Result, auch wenn keine Daten geladen sind (Fallback).
 */
/**
 * S7 — Layer-Resolver: pro Layer-Slot (tragschicht/daemmung/putzInnen/
 * putzAussen) und Bauteil-Typ den Material+Dicke+λ Wert auflösen.
 * Default-Material = 'auto' → Wert aus bauteilDefaults[typ][bauklasse].
 * 'unbekannt' im Material → Lambda aus daemmstoffe.unbekannt (konservativ).
 * Dicke leer → Default aus bauteilDefaults.
 */
function resolveLayerForBauteil(typ, slot, cfg, bauklasse){
  // Map ui-typ to data-key (boden bleibt boden, dach->dach, wand->aussenwand)
  const dataTyp = (typ === 'wand') ? 'aussenwand' : typ;
  const node = _uWerteData?.bauteilDefaults?.[dataTyp]?.[bauklasse] || null;
  const slotDefault = node ? node[slot] : null;
  const mat = cfg.mat || (slot === 'aussenschale' ? 'keine' : 'auto');

  // 'keine'/'keiner' → kein Layer (Aussenschale Default für einschalige Wand)
  if (mat === 'keine' || mat === 'keiner') return null;

  // λ ermitteln — bei 'unbekannt' werden Standardwerte gezogen.
  let lambda = null, label = '';
  if (mat === 'auto'){
    if (!slotDefault) return null;
    lambda = slotDefault.lambda || (_uWerteData?.daemmstoffe?.[slotDefault.material]?.lambda) || null;
    label  = slotDefault.label || (slotDefault.material ? _uWerteData?.daemmstoffe?.[slotDefault.material]?.label : '') || LAYER_LABELS[slot];
  } else if (mat === 'unbekannt'){
    // Unbekannt = nutzt Standard für Bauperiode bzw. konservative Schätzung.
    if (slot === 'daemmung'){
      lambda = (_uWerteData?.daemmstoffe?.unbekannt?.lambda) || 0.045;
    } else if (slot === 'aussenschale'){
      lambda = MATERIAL_LAMBDA.aussenschale.unbekannt; // Backstein-Default 0.81
    } else {
      // tragschicht / Putze: nimm Bauperiode-Default
      lambda = slotDefault?.lambda ?? 0.5;
    }
    label = 'Unbekannt — Standard';
  } else {
    lambda = MATERIAL_LAMBDA[slot]?.[mat] || null;
    if (!lambda && slot === 'daemmung'){
      lambda = _uWerteData?.daemmstoffe?.[mat]?.lambda || 0.045;
    }
    label = (MATERIAL_CATALOG[slot] || []).find(o => o[0] === mat)?.[1] || mat;
  }

  // Dicke ermitteln
  let d_m = null;
  if (cfg.d_cm != null && cfg.d_cm !== '' && Number(cfg.d_cm) > 0){
    d_m = Number(cfg.d_cm) / 100;
  } else {
    // Default-Dicke je Slot/Material — auch bei 'unbekannt' wird ein
    // sinnvoller Standardwert gezogen, damit U trotzdem berechnet wird.
    if (slot === 'aussenschale'){
      d_m = MATERIAL_DEFAULT_D.aussenschale[mat] ?? 0.12;
    } else if (slot === 'daemmung'){
      if (mat === 'luftschicht') d_m = 0.05; // typischer Doppelmauerwerk-Hohlraum
      else d_m = (slotDefault?.dicke != null) ? Number(slotDefault.dicke) : 0;
    } else {
      d_m = slotDefault?.d != null ? Number(slotDefault.d) : 0;
    }
  }
  return { d: d_m, lambda, label, fromDefault: (mat === 'auto' || mat === 'unbekannt' || !cfg.d_cm) };
}

/* =========================================================================
   MATERIAL-PICKER INTEGRATION (AUDIT 3.13 · Session 2 · 2026-04-29)
   -------------------------------------------------------------------------
   5-Stufen-Picker (Bauweise → Dicke → Daemmung j/n → Material → Dicke)
   fuer Aussenwand/Dach/Boden, 1-Stufen-Picker (Generation) fuer Fenster.
   State-Pfad: detail.raeume[i].bauteile[j].picker.{stufe-key}.
   Wenn b.picker definiert ist, hat der Material-Picker Vorrang vor dem
   alten variant/layers/eigener-Pfad. Tueren bleiben bei TUER_U_BY_BK.
   ========================================================================= */

/** Repraesentatives Baujahr aus FWS-Bauperiode (z. B. '1971-1980' → 1976). */
function mapPeriodeToBaujahr(periode){
  if (!periode || typeof periode !== 'string') return 2000;
  if (periode === 'minergie') return 2018;
  if (periode === '<1919') return 1900;
  if (periode === '2011-heute') return 2018;
  const m = periode.match(/(\d{4})\s*[-–]\s*(\d{4})/);
  if (m) return Math.round((Number(m[1]) + Number(m[2])) / 2);
  const m2 = periode.match(/(\d{4})/);
  if (m2) return Number(m2[1]);
  return 2000;
}

/** UI-Bauteil-Typ (`wand`) → Picker-Typ (`aussenwand`). */
function pickerTypFor(typ){
  if (typ === 'wand') return 'aussenwand';
  if (typ === 'dach') return 'dach';
  if (typ === 'boden') return 'boden';
  if (typ === 'fenster') return 'fenster';
  return null;
}

/** Normalisiert Picker-Selections (UI-Strings → null/Number/Boolean). */
function normalizePicker(picker){
  if (!picker || typeof picker !== 'object') return {};
  const out = {};
  const numKeys = ['dicke', 'daemmDicke'];
  const boolKeys = ['hatDaemmung'];
  for (const k of Object.keys(picker)){
    let v = picker[k];
    if (v === '' || v === undefined) { out[k] = null; continue; }
    if (numKeys.includes(k)){
      const n = Number(v);
      out[k] = Number.isFinite(n) ? n : null;
      continue;
    }
    if (boolKeys.includes(k)){
      if (v === true || v === 'true') out[k] = true;
      else if (v === false || v === 'false') out[k] = false;
      else out[k] = null;
      continue;
    }
    out[k] = v;
  }
  return out;
}

/** Rendert den 5-Stufen / 1-Stufen Picker fuer ein Bauteil. */
function renderMaterialPicker(idx, j, b, state){
  const ptyp = pickerTypFor(b.typ);
  if (!ptyp) return '';
  const baujahr = mapPeriodeToBaujahr(state?.objekt?.bauperiode);
  const pickerState = normalizePicker(b.picker || {});
  let def;
  try { def = getStufen(ptyp, baujahr, pickerState); }
  catch (e){ return `<div class="field__hint">Picker-Fehler: ${esc(String(e.message))}</div>`; }

  const stufen = def.stufen.map(stf => {
    const path = `detail.raeume[${idx}].bauteile[${j}].picker.${stf.key}`;
    const cur = pickerState[stf.key];
    let curStr;
    if (cur === null || cur === undefined) curStr = '';
    else if (typeof cur === 'boolean') curStr = cur ? 'true' : 'false';
    else curStr = String(cur);
    const opts = stf.options.map(o => {
      let v;
      if (o.value === null) v = '';
      else if (typeof o.value === 'boolean') v = o.value ? 'true' : 'false';
      else v = String(o.value);
      return [v, o.label];
    });
    const lockedAttr = stf.locked ? ' (fix)' : '';
    return `
      <div class="field" style="min-width:200px;">
        <label class="field__label">${esc(stf.label)}${lockedAttr}</label>
        ${select(path, curStr, opts)}
      </div>`;
  }).join('');

  return `<div class="layer-editor">
    <div class="layer-editor__head">Material-Picker · ${esc(def.fenster ? 'Fenster' : ptyp)} · Bauklasse ${esc(def.baujahrklasse)}${def.isDoppelmauerwerk ? ' · Doppelmauerwerk (Kerndaemmung fix)' : ''}</div>
    <div class="bauteil__row1" style="flex-wrap:wrap;gap:var(--s-3);">${stufen}</div>
  </div>`;
}

/**
 * S7 — Bauteil-Werte (U + f_RT) gemäss Variant/Anschluss/Bauperiode pro
 * Raum auflösen und in eine ENRICHED-Kopie schreiben. Wird vor compute/
 * computeBuildingDetailLoad in main.mjs aufgerufen, damit der Heatload-
 * Calc ohne Code-Eingriff die korrekten Werte sieht.
 */
function enrichRaeumeWithResolvedUFrt(state){
  if (!state?.detail?.raeume) return state;
  const out = JSON.parse(JSON.stringify(state));
  (out.detail.raeume || []).forEach(r => {
    (r.bauteile || []).forEach(b => {
      const res = resolveBauteilUFrt(state, b);
      b.u   = res.u;
      b.fRT = res.fRT;
    });
  });
  return out;
}

function resolveBauteilUFrt(state, b){
  const obj = state?.objekt || {};
  let bk = bauklasseFromPeriode(obj.bauperiode) || '1978_1994';
  bk = applySanierung(bk, obj.sanierungsstand) || bk;
  const typ = b.typ || 'wand';
  const variant = b.variant || 'unbekannt';
  const anschluss = b.anschluss || ANSCHLUSS_DEFAULT[typ] || 'aussenluft';
  // ---- AUDIT 3.13: Material-Picker hat Vorrang, wenn b.picker definiert ----
  // Tueren laufen weiter ueber TUER_U_BY_BK; alle anderen Bauteiltypen ueber
  // computeUWert(). Picker-Type-Mapping: 'wand' → 'aussenwand', sonst identisch.
  const _ptyp = pickerTypFor(typ);
  if (_ptyp && b.picker && typeof b.picker === 'object'){
    // fRT vorab berechnen wie unten
    let _fRT;
    if (anschluss === 'beheizt'){
      const ti = Number(obj.tInnenAuslegung) || 20;
      const te = Number(obj.tAussenAuslegung);
      const teE = Number.isFinite(te) ? te : -8;
      const tn = Number(b.theta_nb);
      const tnE = Number.isFinite(tn) ? tn : 20;
      const dt = ti - teE;
      _fRT = dt !== 0 ? (ti - tnE) / dt : 0;
    } else {
      _fRT = ANSCHLUSS_FRT[anschluss] != null ? ANSCHLUSS_FRT[anschluss] : 1.0;
    }
    const _src = ANSCHLUSS_OPTS[anschluss] ? ANSCHLUSS_OPTS[anschluss][1] : '';
    const _baujahr = mapPeriodeToBaujahr(obj.bauperiode);
    const _sel = normalizePicker(b.picker);
    const _r = computeUWert(_ptyp, _baujahr, _sel);
    const _u = (typeof _r.uWert === 'number' && Number.isFinite(_r.uWert) && _r.uWert > 0) ? _r.uWert : 1.0;
    const _unbek = (_r.unbekanntStufen || []).join(',');
    const _quelle = `Picker · ${_r.quelle}${_unbek ? ' [unbek: ' + _unbek + ']' : ''}`;
    return { u: _u, fRT: _fRT, source: _quelle + ' · ' + _src };
  }
  // AUDIT 3.6: für 'beheizt' fRT formel-basiert aus θ_int/θ_nb/θ_e
  let fRT;
  if (anschluss === 'beheizt'){
    const theta_int = Number(obj.tInnenAuslegung) || 20;
    const theta_e   = Number(obj.tAussenAuslegung); // kann negativ sein
    const theta_e_eff = Number.isFinite(theta_e) ? theta_e : -8;
    const theta_nb  = Number(b.theta_nb);
    const theta_nb_eff = Number.isFinite(theta_nb) ? theta_nb : 20;
    const dt = theta_int - theta_e_eff;
    fRT = dt !== 0 ? (theta_int - theta_nb_eff) / dt : 0;
  } else {
    fRT = ANSCHLUSS_FRT[anschluss] != null ? ANSCHLUSS_FRT[anschluss] : 1.0;
  }
  const fRT_src = ANSCHLUSS_OPTS[anschluss] ? ANSCHLUSS_OPTS[anschluss][1] : '';

  // User-Override
  if (variant === 'eigener' && b.u_override != null && b.u_override !== ''){
    return { u: Number(b.u_override), fRT, source: 'manuell · ' + fRT_src };
  }
  // Schichten-Berechnung: Layer für Layer auflösen, U via uFromLayers.
  if (variant === 'schichten' && LAYERS_FOR_TYP[typ]){
    const resolvedLayers = LAYERS_FOR_TYP[typ].map(slot =>
      resolveLayerForBauteil(typ, slot, (b.layers || {})[slot] || {}, bk)
    ).filter(L => L && L.lambda > 0);
    const u = (function(layers){
      let R = 0.13 + 0.04;
      for (const L of layers){ if (L.d > 0 && L.lambda > 0) R += L.d / L.lambda; }
      return R > 0 ? 1 / R : null;
    })(resolvedLayers);
    return {
      u: u ?? 1.0,
      fRT,
      source: `Schichten-Aufbau · ${resolvedLayers.length} Lagen · ${esc(bk)}`
    };
  }

  const data = _uWerteData;
  const pick = (entry) => {
    if (!entry) return null;
    if (variant === 'unsaniert') return entry.max ?? entry.typ ?? null;
    if (variant === 'saniert')   return entry.min ?? entry.typ ?? null;
    return entry.typ ?? null;
  };
  let u = null, src = '';
  switch (typ){
    case 'wand': {
      const tk = obj.typ === 'mfh' ? 'MFH' : 'EFH';
      const e = data?.wandUWert?.[tk]?.[bk];
      u = pick(e);
      src = `Tabelle Wand · ${tk} · ${esc(bk)}`;
      break;
    }
    case 'dach': {
      const dachKey = b.dach_variant || 'steildach';
      const e = data?.dachUWert?.[dachKey]?.[bk];
      u = pick(e);
      src = `Tabelle Dach · ${esc(dachKey)} · ${esc(bk)}`;
      break;
    }
    case 'boden': {
      const bodenKey = anschluss === 'erdreich' ? 'gegenErdreich'
                    : anschluss === 'unbeheizt' ? 'unbeheizterKeller'
                    : anschluss === 'durchfahrt' ? 'aussenluftDurchfahrt'
                    : 'gegenErdreich';
      const e = data?.bodenUWert?.[bodenKey]?.[bk];
      u = pick(e);
      src = `Tabelle Boden · ${esc(bodenKey)} · ${esc(bk)}`;
      break;
    }
    case 'fenster': {
      // AUDIT 3.2/3.3 Fix:
      //  - Variant-Dropdown schreibt in `b.variant` mit fensterUWert-Keys
      //    (einfachverglasung, isolierglas_2fach_low_e_argon, …) → wenn ein
      //    gültiger Key vorliegt, direkt in fensterUWert mit Rahmen lesen.
      //  - Sonst (variant='unbekannt') Fallback auf b.fenster_gen bzw.
      //    fensterGenerationDefault[bk] (Keys: einfach, 3fach, …) → primär
      //    aus fensterGenerationen[gen].uw, sekundär aus fensterUWert[gen].
      const rahmen = b.fenster_rahmen || 'kunststoff';
      const rk = 'uFenster_' + (rahmen === 'holz_alu' ? 'holz_alu' : rahmen);
      // 1) Variant ist gültiger fensterUWert-Key → direkter Lookup
      if (variant && variant !== 'unbekannt' && variant !== 'eigener'
          && variant !== 'schichten' && data?.fensterUWert?.[variant]){
        const e = data.fensterUWert[variant];
        u = e?.[rk]?.typ ?? e?.uFenster_holz?.typ ?? e?.uFenster_kunststoff?.typ ?? e?.uGlas?.typ ?? null;
        src = `Fenster ${esc(variant)} (${esc(rahmen)})`;
        break;
      }
      // 2) Default-Pfad: fenster_gen oder Bauperiode-Default → fensterGenerationen
      let gen = b.fenster_gen;
      if (!gen || gen === 'unbekannt'){
        gen = data?.fensterGenerationDefault?.[bk] || '3fach';
      }
      if (data?.fensterGenerationen?.[gen]?.uw != null){
        u = data.fensterGenerationen[gen].uw;
        src = `Fenster ${esc(gen)} · Bauperiode ${esc(bk)}`;
        break;
      }
      // 3) Letzter Fallback: fensterUWert mit Rahmen
      const e = data?.fensterUWert?.[gen];
      if (e){
        u = e?.[rk]?.typ ?? e?.uFenster_holz?.typ ?? e?.uFenster_kunststoff?.typ ?? e?.uGlas?.typ ?? null;
        src = `Fenster ${esc(gen)} (${esc(rahmen)})`;
      }
      break;
    }
    case 'tueren': {
      u = TUER_U_BY_BK[bk] ?? 2.0;
      src = `Tür-Standard · ${esc(bk)}`;
      break;
    }
  }
  if (u == null) u = 1.0; // Notnagel-Fallback
  return { u, fRT, source: src + ' · ' + fRT_src };
}

/**
 * S7 — Layer-Editor: Pro Schicht (innen→aussen) Material-Dropdown + Dicke-Input
 * + Live-Anzeige des resolved λ und d (auch wenn 'auto' → Default-Werte).
 * Pfad-Prefix erlaubt das Wiederverwenden in Hülle (global) und Räumen.
 */
function renderLayerEditor(pathPrefix, b, state){
  const typ = b.typ || 'wand';
  const slots = LAYERS_FOR_TYP[typ];
  if (!slots) return '';
  const obj = state?.objekt || {};
  let bk = bauklasseFromPeriode(obj.bauperiode) || '1978_1994';
  bk = applySanierung(bk, obj.sanierungsstand) || bk;
  const layers = b.layers || {};
  const rows = slots.map(slot => {
    const cfg = layers[slot] || { mat: 'auto', d_cm: '' };
    const res = resolveLayerForBauteil(typ, slot, cfg, bk);
    const lambda = res ? fmt(res.lambda, 3) : '–';
    const dCm    = res && res.d != null ? fmt(res.d * 100, 1) : '–';
    return `
    <div class="layer-row">
      <span class="layer-row__name">${esc(layerLabel(typ, slot))}</span>
      <div class="layer-row__mat">
        ${select(`${pathPrefix}.layers.${slot}.mat`, cfg.mat || 'auto', MATERIAL_CATALOG[slot])}
      </div>
      <div class="layer-row__d">
        <div class="input-group">${inputNumRaw(`${pathPrefix}.layers.${slot}.d_cm`, cfg.d_cm == null ? '' : cfg.d_cm, 0.5, 0, 'auto')}<span class="input-group__unit">cm</span></div>
      </div>
      <span class="layer-row__resolved">λ ${lambda} · d ${dCm} cm ${res?.fromDefault ? '<em>(Default)</em>' : ''}</span>
    </div>`;
  }).join('');
  return `
  <div class="layer-editor">
    <div class="layer-editor__head">Schichtenaufbau (innen → aussen) · leer / Default = aus Bauperiode-Tabelle</div>
    ${rows}
  </div>`;
}

function renderRoomBauteil(idx, j, b){
  const typeOpts = Object.entries(BAUTEIL_LABELS).map(([k, l]) => [k, l]);
  const typ = b.typ || 'wand';
  const variant = b.variant || 'unbekannt';
  const isFenster = (typ === 'fenster');
  const isDach = (typ === 'dach');
  const isTuer = (typ === 'tueren');

  // Resolver-Aufruf — Werte sichtbar im UI
  const state = _getState ? _getState() : null;
  const r = state ? resolveBauteilUFrt(state, b) : { u: 1.0, fRT: 1.0, source: '—' };

  const variantOpts = isFenster ? BAUTEIL_VARIANT_OPTS.fensterGen : BAUTEIL_VARIANT_OPTS.std;
  const anschlussOpts = anschlussOptsFor(typ);
  const eigenerVariant = (variant === 'eigener');

  return `
  <div class="bauteil" data-bauteil-idx="${idx}-${j}">
    <div class="bauteil__row1">
      <div class="field" style="flex:1;min-width:120px;">
        <label class="field__label">Typ</label>
        ${select(`detail.raeume[${idx}].bauteile[${j}].typ`, typ, typeOpts)}
      </div>
      ${(typ === 'tueren' || !b.picker) ? `
      <div class="field" style="flex:2;min-width:200px;">
        <label class="field__label">${isFenster ? 'Verglasung' : 'Bauweise / Variante'}</label>
        ${select(`detail.raeume[${idx}].bauteile[${j}].variant`, variant, variantOpts)}
      </div>` : ''}
      ${(isDach && !b.picker) ? `
      <div class="field" style="min-width:140px;">
        <label class="field__label">Dach-Form</label>
        ${select(`detail.raeume[${idx}].bauteile[${j}].dach_variant`, b.dach_variant || 'steildach', BAUTEIL_VARIANT_OPTS.dachForm)}
      </div>` : ''}
      ${(isFenster && !b.picker) ? `
      <div class="field" style="min-width:140px;">
        <label class="field__label">Rahmen</label>
        ${select(`detail.raeume[${idx}].bauteile[${j}].fenster_rahmen`, b.fenster_rahmen || 'kunststoff', BAUTEIL_VARIANT_OPTS.fensterRahmen)}
      </div>` : ''}
      ${!isFenster && !isTuer ? `
      <div class="field" style="min-width:200px;">
        <label class="field__label">Anschluss</label>
        ${select(`detail.raeume[${idx}].bauteile[${j}].anschluss`, b.anschluss || ANSCHLUSS_DEFAULT[typ], anschlussOpts)}
      </div>` : ''}
      <button class="btn btn--ghost" type="button" data-del-bauteil="${idx}-${j}" title="Bauteil löschen">×</button>
    </div>
    <div class="bauteil__row2">
      <div class="field" style="min-width:100px;">
        <label class="field__label">Fläche A</label>
        <div class="input-group">${inputNumRaw(`detail.raeume[${idx}].bauteile[${j}].A`, b.A || '', 0.1, 0)}<span class="input-group__unit">m²</span></div>
      </div>
      <div class="field bauteil__readout" style="min-width:160px;">
        <label class="field__label">U-Wert ${variant === 'eigener' ? '(manuell)' : variant === 'schichten' ? '(aus Schichten)' : '(auto)'}</label>
        ${eigenerVariant
          ? `<div class="input-group">${inputNumRaw(`detail.raeume[${idx}].bauteile[${j}].u_override`, b.u_override || '', 0.01, 0, '0.40')}<span class="input-group__unit">W/(m²·K)</span></div>`
          : `<div class="bauteil__value" data-readout-u="${idx}-${j}">${fmt(r.u, 2)} <span class="bauteil__unit">W/(m²·K)</span></div>`}
      </div>
      <div class="field bauteil__readout" style="min-width:120px;">
        <label class="field__label">f<sub>RT</sub> (auto)</label>
        <div class="bauteil__value" data-readout-frt="${idx}-${j}">${fmt(r.fRT, 2)}</div>
      </div>
      ${b.anschluss === 'beheizt' ? `
      <div class="field" style="min-width:140px;">
        <label class="field__label">θ Nachbarraum</label>
        <div class="input-group">${inputNumRaw(`detail.raeume[${idx}].bauteile[${j}].theta_nb`, b.theta_nb == null ? '' : b.theta_nb, 1, -20, '20')}<span class="input-group__unit">°C</span></div>
      </div>` : ''}
      <div class="field" style="flex:1;min-width:200px;">
        <label class="field__label">Quelle</label>
        <div class="bauteil__source" data-readout-src="${idx}-${j}">${r.source || '—'}</div>
      </div>
    </div>
    ${b.picker && pickerTypFor(typ)
      ? renderMaterialPicker(idx, j, b, state)
      : (variant === 'schichten' && (typ === 'wand' || typ === 'dach' || typ === 'boden')
          ? renderLayerEditor(`detail.raeume[${idx}].bauteile[${j}]`, b, state)
          : '')}
  </div>`;
}

function syncRoomsCount(state){
  const list = document.getElementById('roomsList');
  if (!list) return;
  const rs = state.detail?.raeume || [];
  const dom = list.querySelectorAll('.room');
  if (dom.length !== rs.length) rebuildRooms(state);
  // Bauteile-Listen synchronisieren
  for (let i = 0; i < rs.length; i++){
    const cont = list.querySelector(`[data-room-bts="${i}"]`);
    if (!cont) continue;
    const bts = rs[i]?.bauteile || [];
    const domBts = cont.querySelectorAll('.bauteil');
    if (domBts.length !== bts.length) rebuildRooms(state);
  }
}

  wandheizung: 'Wandheizung',
  heizkoerper: 'Heizkörper',

      <div class="grid grid--3">

          <label class="field__label">Vorlauf neu T<sub>VL</sub></label>

          <div class="input-group">${inputNumRaw('detail.verteilung.global.tRL_neu', g.tRL_neu, 1, 0, '28')}<span class="input-group__unit">°C</span></div>
          ${infoBox('verteilung.tRL_neu', 'Spreizung wählen')}
        </div>

      <p class="field__hint" id="verteilungGlobalHint" style="margin-top:var(--s-3);">—</p>
    </div>` : '';

  const kreiseBlock = `
    <div class="block">
      <div class="block__head"><h3 class="block__title">Heizkreise</h3><span class="block__hint">Verteiler-Übersicht</span></div>
      <div id="kreiseList">
        ${kreise.map((k, idx) => renderKreisRow(k, idx)).join('')}

      <button class="add-row" type="button" id="btnAddKreis">+ Heizkreis hinzufügen</button>

  const sanierungBlock = `
    <div class="block">
      <label class="chk" style="margin-bottom:var(--s-3);">
        <input type="checkbox" data-path="detail.verteilung.bestand_aktiv" ${vert.bestand_aktiv ? 'checked' : ''}>
        <span><strong>Sanierungs-Plausi:</strong> alte Vorlauftemperatur dokumentieren (Heizungsersatz)</span>
      </label>
      <div class="grid grid--3" id="bestandFields">
        <div class="field">
          <label class="field__label">T<sub>VL,alt</sub></label>
          <div class="input-group">${inputNumRaw('detail.verteilung.global.tVL_alt', g.tVL_alt || '', 1, 0, '70')}<span class="input-group__unit">°C</span></div>
        </div>

          <label class="field__label">T<sub>RL,alt</sub></label>
          <div class="input-group">${inputNumRaw('detail.verteilung.global.tRL_alt', g.tRL_alt || '', 1, 0, '55')}<span class="input-group__unit">°C</span></div>
        </div>
      </div>
    </div>`;

  return `
  <section class="section" id="sec-verteilung">

function rebuildPeriods(state){
  const list = document.getElementById('periodsList');
  if (!list) return;
  const ps = state.heizung.perioden || [];
  list.innerHTML = ps.map((p, idx) => renderPeriod(p, idx)).join('');
}

function renderPeriod(p, idx){
  const h = HEIZWERT[p.energy] || HEIZWERT.erdgas;
  const energyOpts = Object.entries(HEIZWERT).map(([k, v]) => [k, v.name]);
  const etaOpts = (h.etaPresets || []).map(e => [e.key, e.eta != null ? `${e.label} (η ${e.eta})` : e.label]);
  return `
  <div class="period" data-period-idx="${idx}" data-period-energy="${escAttr(p.energy)}">
    <div class="field">
      <label class="field__label">Energieträger</label>
      ${select(`heizung.perioden[${idx}].energy`, p.energy, energyOpts)}
    </div>
    <div class="field">
      <label class="field__label">Von</label>
      <input class="input" type="date" data-path="heizung.perioden[${idx}].von" value="${escAttr(p.von || '')}">
    </div>
    <div class="field">
      <label class="field__label">Bis</label>
      <input class="input" type="date" data-path="heizung.perioden[${idx}].bis" value="${escAttr(p.bis || '')}">
    </div>
    <div class="field">
      <label class="field__label">Menge (${esc(h.unit)}/a)</label>
      <div class="input-group">${inputNumRaw(`heizung.perioden[${idx}].menge`, p.menge || '', 0.1, 0)}<span class="input-group__unit">${esc(h.unit)}</span></div>
    </div>
    <div class="field">
      <label class="field__label">Wirkungsgrad η</label>
      ${select(`heizung.perioden[${idx}].etaPreset`, p.etaPreset, etaOpts)}
    </div>
    <div class="field">
      <label class="field__label">η Override</label>
      ${inputNumRaw(`heizung.perioden[${idx}].etaValue`, p.etaValue || '', 0.01, 0, '0.95')}
    </div>
    <button class="btn btn--ghost" type="button" data-del-period="${idx}" title="Periode löschen">×</button>
  </div>`;
}

function syncPeriodsCount(state){
  const list = document.getElementById('periodsList');
  if (!list) return;
  const ps = state.heizung.perioden || [];
  const dom = list.querySelectorAll('.period');
  if (dom.length !== ps.length){ rebuildPeriods(state); return; }
  // S7-Bugfix: bei Energieträger-Wechsel (Heizöl ↔ Erdgas ↔ Pellets …)
  // muss Unit-Label/Preset-Liste neu gerendert werden — sonst klebt z. B.
  // bei Heizöl noch das alte 'mn³'-Label.
  let needRebuild = false;
  for (let i = 0; i < ps.length; i++){
    const el = dom[i];
    if (!el) { needRebuild = true; break; }
    if (el.getAttribute('data-period-energy') !== String(ps[i].energy)){
      needRebuild = true; break;
    }
  }
  if (needRebuild) rebuildPeriods(state);
}

/* =========================================================================
   EVENT-WIRING
   ========================================================================= */

function attachStaticHandlers(root, stepperEl, getState){
  root.addEventListener('input', (ev) => onInputChange(ev));
  root.addEventListener('change', (ev) => onInputChange(ev));

  root.addEventListener('click', (ev) => {
    const addBtn = ev.target.closest('#btnAddPeriod');
    if (addBtn){
      const st = getState();
      const ps = (st.heizung.perioden || []).slice();
      const id = 'p' + (ps.length ? Math.max(...ps.map(p => parseInt(String(p.id).replace(/\D/g,''),10) || 0)) + 1 : 0);
      ps.push({ id, energy: 'erdgas', von: '', bis: '', menge: 0, etaPreset: 'brennwert', etaValue: '' });
      _set('heizung.perioden', ps);
      return;
    }
    const delBtn = ev.target.closest('[data-del-period]');
    if (delBtn){
      const idx = parseInt(delBtn.getAttribute('data-del-period'), 10);
      const st = getState();
      const ps = (st.heizung.perioden || []).slice();
      ps.splice(idx, 1);
      if (ps.length === 0) ps.push({ id: 'p0', energy: 'erdgas', von: '', bis: '', menge: 0, etaPreset: 'brennwert', etaValue: '' });
      _set('heizung.perioden', ps);
      return;
    }
    // S4 — Räume hinzufügen
    const addRoom = ev.target.closest('#btnAddRoom');
    if (addRoom){
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).slice();
      rs.push({
        name: '', A: 0, l: 0, b: 0, h: (st.objekt && st.objekt.geschosshoehe) || 2.5,
        beheizt: true, theta_int: 20,
        bauteile: [
          { typ: 'wand',    A: 0, u: '', fRT: 1.0 },
          { typ: 'fenster', A: 0, u: '', fRT: 1.0 }
        ]
      });
      _set('detail.raeume', rs);
      return;
    }
    const delRoom = ev.target.closest('[data-del-room]');
    if (delRoom){
      const idx = parseInt(delRoom.getAttribute('data-del-room'), 10);
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).slice();
      rs.splice(idx, 1);
      _set('detail.raeume', rs);
      return;
    }
    const addBt = ev.target.closest('[data-add-bauteil]');
    if (addBt){
      const idx = parseInt(addBt.getAttribute('data-add-bauteil'), 10);
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).map(r => Object.assign({}, r, { bauteile: (r.bauteile || []).slice() }));
      if (!rs[idx]) return;
      rs[idx].bauteile.push({ typ: 'wand', variant: 'unbekannt', anschluss: 'aussenluft', A: 0, picker: {} });
      _set('detail.raeume', rs);
      return;
    }
    const delBt = ev.target.closest('[data-del-bauteil]');
    if (delBt){
      const parts = delBt.getAttribute('data-del-bauteil').split('-').map(n => parseInt(n,10));
      const ri = parts[0], bi = parts[1];
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).map(r => Object.assign({}, r, { bauteile: (r.bauteile || []).slice() }));
      if (!rs[ri]) return;
      rs[ri].bauteile.splice(bi, 1);
      _set('detail.raeume', rs);
      return;
    }
    // S5 — Heizkreis hinzufügen / löschen
    const addKreis = ev.target.closest('#btnAddKreis');
    if (addKreis){
      const st = getState();
      const ks = ((st.detail && st.detail.verteilung && st.detail.verteilung.heizkreise) || []).slice();
      const num = ks.length + 1;
      // Default-VL/RL aus dem Global-Block übernehmen, Typ leer (User wählt).
      const g = st?.detail?.verteilung?.global || {};
      ks.push({ id: 'k' + num, name: 'Heizkreis ' + num, typ: g.typ || 'fbh', tVL: g.tVL_neu || 35, tRL: g.tRL_neu || 28 });
      _set('detail.verteilung.heizkreise', ks);
      return;
    }
    const delKreis = ev.target.closest('[data-del-kreis]');
    if (delKreis){
      const idx = parseInt(delKreis.getAttribute('data-del-kreis'), 10);
      const st = getState();
      const ks = ((st.detail && st.detail.verteilung && st.detail.verteilung.heizkreise) || []).slice();
      ks.splice(idx, 1);
      if (ks.length === 0) ks.push({ id: 'k1', name: 'Heizkreis 1' });
      _set('detail.verteilung.heizkreise', ks);
      return;
    }
    // S5 — Heizfläche pro Raum hinzufügen / löschen
    const addHf = ev.target.closest('[data-add-hf]');
    if (addHf){
      const idx = parseInt(addHf.getAttribute('data-add-hf'), 10);
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).map(r => Object.assign({}, r, { heizflaechen: ((r.heizflaechen) || []).slice() }));
      if (!rs[idx]) return;
      const kreis_id = ((st.detail && st.detail.verteilung && st.detail.verteilung.heizkreise) || [{id:'k1'}])[0].id;
      rs[idx].heizflaechen.push({ typ: 'fbh', A: 0, kreis_id });
      _set('detail.raeume', rs);
      return;
    }
    const delHf = ev.target.closest('[data-del-hf]');
    if (delHf){
      const parts = delHf.getAttribute('data-del-hf').split('-').map(n => parseInt(n,10));
      const ri = parts[0], hi = parts[1];
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).map(r => Object.assign({}, r, { heizflaechen: ((r.heizflaechen) || []).slice() }));
      if (!rs[ri]) return;
      rs[ri].heizflaechen.splice(hi, 1);
      _set('detail.raeume', rs);
      return;
    }
    // S5 — WP auswählen / entfernen
    const pickWp = ev.target.closest('[data-pick-wp]');
    if (pickWp){
      const id = pickWp.getAttribute('data-pick-wp');
      const st = getState();
      const cur = (st.geraet && st.geraet.gewaehlt_id) || null;
      _set('geraet.gewaehlt_id', cur === id ? null : id);
      return;
    }
    const unselWp = ev.target.closest('#btnUnselectWp');
    if (unselWp){
      _set('geraet.gewaehlt_id', null);
      return;
    }
  });

  stepperEl.addEventListener('click', (ev) => {
    const btn = ev.target.closest('[data-step]');
    if (!btn) return;
    const id = btn.getAttribute('data-step');
    const target = document.getElementById(id);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

function onInputChange(ev){
  const el = ev.target;
  if (!el || !el.dataset || !el.dataset.path) return;
  const path = el.dataset.path;
  let value;
  if (el.type === 'checkbox') value = el.checked;
  else if (el.type === 'radio') {
    if (!el.checked) return;
    value = el.value;
  }
  else if (el.type === 'number') {
    if (el.value === '') value = '';
    else value = Number(String(el.value).replace(',', '.'));
  }
  else value = el.value;
  _set(path, value);

  // S7-Auto-Switch (State-only-Pfad): Bei Preset-Wechsel im Dropdown den
  // zugehörigen Override-Wert leeren. Bei Override-Eingabe wird die Variant
  // weiter UNTEN per direktem DOM-Update auf 'eigener' / 'custom' gesetzt
  // (kein _set → kein Rebuild → kein Focus-Loss beim Tippen).
  let m;
  if ((m = path.match(/^heizung\.perioden\[(\d+)\]\.etaPreset$/)) && value !== 'custom'){
    _set(`heizung.perioden[${m[1]}].etaValue`, '');
  }
  if ((m = path.match(/^detail\.huelle\.([a-zA-Z]+)\.variant$/)) && value !== 'eigener'){
    _set(`detail.huelle.${m[1]}.u_user`, '');
  }

  // S7: Strukturelle Bauteil-Änderungen (Typ/Variante/Anschluss/Dach-Form/
  // Fenster-Generation) triggern einen Rebuild der Räume-Liste, weil sich
  // die sichtbaren Felder ändern (Override-Input ↔ Readout, Anschluss ↔ Dach-
  // Form ↔ Fenster-Rahmen). Bauperiode/Sanierungsstand wirken auch auf alle
  // Bauteil-Lookups → Rebuild ebenfalls.
  if (/\.bauteile\[\d+\]\.(typ|variant|anschluss|dach_variant|fenster_gen|fenster_rahmen|layers\.[a-zA-Z]+\.(mat|d_cm))$/.test(path) ||
      path === 'objekt.bauperiode' || path === 'objekt.sanierungsstand' ||
      /^detail\.huelle\.[a-zA-Z]+\.(variant|layers\.[a-zA-Z]+\.(mat|d_cm))$/.test(path)){
    setTimeout(() => {
      const st = _getState ? _getState() : null;
      if (st){
        rebuildRooms(st);
        const huelleBlock = document.getElementById('sec-huelle');
        if (huelleBlock) rebuildHuelleBauteile(st);
        // S7-Kritisch: setState() forciert subscribe → compute → Cockpit-KPIs.
        // Ohne diesen Push aktualisiert sich Q_hl-Hülle nicht zuverlässig
        // wenn Material/Dicke gewechselt wird (Export war richtig, UI hing).
        try {
          const stateMod = window.__heizlast;
          if (stateMod && typeof stateMod.setState === 'function') stateMod.setState(stateMod.getState());
        } catch(_){}
      }
    }, 0);
  }
  // S7-Auto-Switch: bei Preset-Wechsel (Dropdown) Periods rebuilden, damit
  // η-Override-Feld zurückgesetzt sichtbar ist. NICHT bei jeder Tasten-
  // Eingabe in etaValue — sonst geht der Focus verloren und User kann nicht
  // tippen.
  if (/^heizung\.perioden\[\d+\]\.etaPreset$/.test(path)){
    setTimeout(() => {
      const st = _getState ? _getState() : null;
      if (st) rebuildPeriods(st);
    }, 0);
  }
  // Wenn User in etaValue tippt, das Preset-Dropdown direkt im DOM auf
  // 'custom' setzen (ohne Rebuild → Focus bleibt erhalten).
  const mEtaV = path.match(/^heizung\.perioden\[(\d+)\]\.etaValue$/);
  if (mEtaV && value !== '' && value != null && Number(value) > 0){
    const sel = document.querySelector(`[data-path="heizung.perioden[${mEtaV[1]}].etaPreset"]`);
    if (sel && sel.value !== 'custom') sel.value = 'custom';
  }
  // Gleiche Logik für Hülle u_user → variant-Dropdown direkt umstellen
  const mHU = path.match(/^detail\.huelle\.([a-zA-Z]+)\.u_user$/);
  if (mHU && value !== '' && value != null && Number(value) > 0){
    const sel = document.querySelector(`[data-path="detail.huelle.${mHU[1]}.variant"]`);
    if (sel && sel.value !== 'eigener') sel.value = 'eigener';
  }
  // Räume-Bauteil u_override → Variant-Dropdown
  const mBU = path.match(/^detail\.raeume\[(\d+)\]\.bauteile\[(\d+)\]\.u_override$/);
  if (mBU && value !== '' && value != null && Number(value) > 0){
    const sel = document.querySelector(`[data-path="detail.raeume[${mBU[1]}].bauteile[${mBU[2]}].variant"]`);
    if (sel && sel.value !== 'eigener') sel.value = 'eigener';
  }
}

  }

function updateSpeicherSection(s, c){
  const w = s.warmwasser || {};
  // WW-Speicher-Vorschlag vs. Override
  const V_vorschlag_ww = c.VW_Sto || 0;
  const V_user_ww = (w.speicher_v_user === '' || w.speicher_v_user == null) ? null : Number(w.speicher_v_user);
  const V_ww_eff = (w.speicher_aktiv === false) ? 0 : (V_user_ww > 0 ? V_user_ww : V_vorschlag_ww);
  setHTML('speicherWWHint', w.speicher_aktiv === false
    ? '<em>WW-Speicher deaktiviert.</em>'
    : (V_user_ww > 0
        ? `Override: <strong>${fmt(V_user_ww, 0)} l</strong> · Vorschlag (FWS): ${fmt(V_vorschlag_ww, 0)} l`
        : `Vorschlag (FWS §10): <strong>${fmt(V_vorschlag_ww, 0)} l</strong> — gerundet auf 10er-Schritte`));

  // Heizpuffer-Vorschlag (20 L/kW Q_h, gerundet)
  const V_vorschlag_puff = c.VP_Sto || 0;
  const V_user_pf = (w.puffer_v_user === '' || w.puffer_v_user == null) ? null : Number(w.puffer_v_user);
  const V_puffer_eff = w.puffer_aktiv ? (V_user_pf > 0 ? V_user_pf : V_vorschlag_puff) : 0;
  setHTML('pufferHint', !w.puffer_aktiv
    ? '<em>Kein separater Puffer (WP-interner Volumenstrom genügt).</em>'
    : (V_user_pf > 0
        ? `Override: <strong>${fmt(V_user_pf, 0)} l</strong> · Vorschlag: ${fmt(V_vorschlag_puff, 0)} l`
        : `Vorschlag (VDI 4645 · 20 L/kW): <strong>${fmt(V_vorschlag_puff, 0)} l</strong>`));

  // Sicherheitsventil
  const Qh = c.Qh || 0;

    setHTML('kpi-svDN-sub', `Auslösedruck ${fmt(sv.p_ansprech_bar, 1)} bar · für Q<sub>h</sub> = ${fmt(Qh, 1)} kW`);
  } else {
    setHTML('kpi-svDN', '–');
    setHTML('kpi-svDN-sub', 'Q<sub>h</sub> eingeben für Empfehlung');
  }

  // MAG-Berechnung
  const V_speicher_im_HK = (w.puffer_aktiv ? V_puffer_eff : 0); // Pufferspeicher zählt zum Heizkreis
  const Va_user = (w.anlagenvolumen_user === '' || w.anlagenvolumen_user == null) ? null : Number(w.anlagenvolumen_user);
  const V_a = (Va_user > 0) ? Va_user : anlagenvolumenSchaetzung({ Qh_kW: Qh, V_puffer: V_speicher_im_HK });
  const mag = magVolumen({
    V_a,
    deltaT_K: 70,
    p_e: Number(w.mag_pe) || 2.5,
    p_0: Number(w.mag_p0) || 1.0
  });

  setHTML('kpi-magV-sub', mag.V_n > 0
    ? `Berechnet ${fmt(mag.V_n, 1)} l (V<sub>a</sub> ≈ ${fmt(V_a, 0)} l) · Wasservorlage ${fmt(mag.V_v, 1)} l`
    : esc(mag.hinweis || '—'));
}

function updateVerteilungSection(s, c){
  const det = s.detail || {};
  const vert = det.verteilung || {};
  const raeume = det.raeume || [];
  const kreise = vert.heizkreise || [];
  const detailLoad = c && c.detail;
  // S7-Update: pro Heizfläche wird die Kreis-spezifische VL/RL verwendet,
  // wenn die Heizfläche einem Kreis zugeordnet ist und der Kreis tVL/tRL hat.
  // Sonst Fallback auf globale Verteilungs-Werte.
  const tVL_g = Number(vert.global?.tVL_neu) || 35;
  const tRL_g = Number(vert.global?.tRL_neu) || (tVL_g - 7);
  const kreisLookup = {};
  kreise.forEach(k => { if (k && k.id) kreisLookup[k.id] = k; });
  const vlForHf = (h) => {
    const k = h.kreis_id ? kreisLookup[h.kreis_id] : null;
    const tvl = (k && Number(k.tVL) > 0) ? Number(k.tVL) : tVL_g;
    const trl = (k && Number(k.tRL) > 0) ? Number(k.tRL) : (tvl - (tVL_g - tRL_g));
    return { tvl, trl };
  };
  // Max-VL für WP-Auslegung
  const allVLs = kreise.map(k => Number(k.tVL) || 0).filter(v => v > 0);
  const tVL_max = allVLs.length ? Math.max(...allVLs, tVL_g) : tVL_g;
  const hintEl = document.getElementById('verteilungGlobalHint');
  if (hintEl){
    hintEl.innerHTML = kreise.length > 1
      ? `<strong>WP-Auslegungs-Vorlauf = max. T<sub>VL</sub> aller Kreise = ${fmt(tVL_max, 0)} °C</strong> — die WP wird auf den höchsten Vorlauf ausgelegt (limitiert COP/JAZ). Pro Kreis individuell setzen, wenn FBH+HK gemischt.`
      : `Auslegungs-Vorlauf <strong>${fmt(tVL_max, 0)} °C</strong> · Rücklauf <strong>${fmt(tRL_g, 0)} °C</strong>. Mit mehreren Kreisen pro-Kreis-Werte setzen — der höchste zählt für die WP.`;
  }
  for (let i = 0; i < raeume.length; i++){
    const r = raeume[i] || {};
    const tInnen = Number(r.theta_int) || 20;
    const hflaechen = r.heizflaechen || [];
    const rRes = (detailLoad && detailLoad.roomResults) ? detailLoad.roomResults[i] : null;
    const phiHL = rRes ? Number(rRes.phiHL) || 0 : 0;
    const gewichte = hflaechen.map(h => {
      const ref = REF_AUSLEGUNG[h.typ];
      return (ref ? ref.q_W_pro_m2 : 0) * (Number(h.A) || 0);
    });
    const sumG = gewichte.reduce((s, g) => s + g, 0);
    let raumGruen = 0, raumTotal = 0;
    for (let j = 0; j < hflaechen.length; j++){
      const h = hflaechen[j];
      const phi_anteil = (sumG > 0) ? phiHL * (gewichte[j] / sumG) : (hflaechen.length > 0 ? phiHL / hflaechen.length : 0);
      const { tvl, trl } = vlForHf(h);
      const pl = plausibilitaetHeizflaeche({
        phiHL_raum: phi_anteil, A_heizflaeche: Number(h.A) || 0,
        typ: h.typ, tVL_neu: tvl, tRL_neu: trl, tInnen
      });
      const span = document.querySelector(`[data-plausi-hf="${i}-${j}"]`);
      if (span){
        span.classList.remove('ampel--gruen', 'ampel--gelb', 'ampel--rot', 'ampel--grau');
        span.classList.add('ampel--' + pl.ampel);
        const lab = pl.deckungsgrad != null
          ? `${(pl.deckungsgrad * 100).toFixed(0)} %`
          : '—';
        span.innerHTML = `<span class="ampel__dot"></span><span>${lab}</span>`;
      }
      raumTotal += 1;
      if (pl.ampel === 'gruen') raumGruen += 1;
    }
    const sum = document.querySelector(`[data-plausi-raum="${i}"]`);
    if (sum){
      if (raumTotal === 0){
        sum.innerHTML = `<em>Keine Heizfläche zugeordnet — Φ<sub>HL</sub> = ${fmt(phiHL, 0)} W</em>`;
      } else {
        const ok = raumGruen === raumTotal;
        const partial = raumGruen > 0;
        const tag = ok ? 'OK' : (partial ? 'teilweise' : 'unzureichend');
        sum.innerHTML = `Φ<sub>HL</sub> Raum = <strong>${fmt(phiHL, 0)} W</strong> · ${raumGruen}/${raumTotal} Heizflächen grün <em>(${tag})</em>`;
      }
    }
  }
  // Globaler Hinweis (wenn keine Räume)
  const ghint = document.getElementById('verteilungGlobalHint');
  if (ghint){
    if (raeume.length === 0){
      // Bug 2026-04-29: nutzt lokale Variablen tVL_g/tRL_g, nicht das undefinierte
      // tVL/tRL — vorher ReferenceError, der updateUi abbrach und in der Folge
      // updateFoerderung + updateBaubewilligung gar nicht mehr lief.
      const f = leistungsFaktor({ typ: vert.global?.typ || 'fbh', tVL: tVL_g, tRL: tRL_g, tInnen: 20 });
      const ref = REF_AUSLEGUNG[vert.global?.typ || 'fbh'];
      if (f != null){
        ghint.innerHTML = `Auslegung relativ zur Norm (${esc(vert.global?.typ || 'fbh')} bei ${ref.tVL}/${ref.tRL}): <strong>${(f*100).toFixed(0)} %</strong>. Bei niedrigem Faktor ist eine grössere Heizfläche oder höhere VL erforderlich.`;
      } else {
        ghint.innerHTML = '<em>Vorlauf/Rücklauf prüfen.</em>';
      }
    } else {
      ghint.innerHTML = '';
    }
  }
}

function updateGeraetSection(s, c){
  const ger = s.geraet || {};
  const flt = ger.filter || {};
  const Qh = c.Qh || 0;
  const tVL = Number(s?.objekt?.tVLMaxHeizung) || 0;
  const liste = filterWp(_wpDb, {
    Qh_kw: Qh, toleranz_proz: flt.toleranz_proz || 20,
    tVL_max: tVL, aufstellung: flt.aufstellung || 'alle',
    schallklasse_max: flt.schallklasse_max || 0
  });
  const hint = document.getElementById('wpFilterHint');
  if (hint){
    if (Qh <= 0){
      hint.innerHTML = '<em>Q<sub>h</sub> aus Heizlast-Berechnung erforderlich.</em>';
    } else {
      hint.innerHTML = `Q<sub>h</sub> = <strong>${fmt(Qh, 1)} kW</strong> · ±${flt.toleranz_proz || 20} % · ${liste.length} Treffer`;
    }
  }
  const list = document.getElementById('wpListe');
  if (list){
    if (liste.length === 0){
      list.innerHTML = `<p class="field__hint">Keine WP im Filter — Toleranz erhöhen oder Schallpegel anpassen.</p>`;
    } else {
      list.innerHTML = liste.slice(0, 12).map(wp => renderWpCard(wp, ger.gewaehlt_id, Qh)).join('');
    }
  }
  // Ausgewähltes Gerät
  const sel = (ger.gewaehlt_id && _wpDb.find(w => (w.ID || w._id) === ger.gewaehlt_id)) || null;
  const block = document.getElementById('wpSelectedBlock');
  const detail = document.getElementById('wpSelected');
  if (block && detail){
    block.hidden = !sel;
    if (sel) detail.innerHTML = renderWpDetail(sel, Qh, c);
  }
}

function updateFoerderung(s, c){
  const list = document.getElementById('foerderListe');
  const hint = document.getElementById('foerderFilterHint');
  const total = document.getElementById('foerderTotal');
  if (!list) return;
  const p = s.projekt || {};
  const kanton = (p.kanton || '').toUpperCase();
  const massnahme = p.massnahme || 'heizungsersatz';
  const wp_quelle = p.wp_quelle || 'luft';

  if (hint){
    const labelMass = (MASSNAHMEN.find(([k]) => k === massnahme) || [massnahme, massnahme])[1];
    const labelKan  = kanton ? `Kanton ${kanton}` : '<em>(Kanton fehlt)</em>';
    hint.innerHTML = `${labelKan} · Massnahme: <strong>${esc(labelMass)}</strong>${massnahme === 'heizungsersatz' ? ` · WP-Quelle: <strong>${esc((WP_QUELLEN.find(([k])=>k===wp_quelle)||[wp_quelle,wp_quelle])[1])}</strong>` : ''}`;
  }

  if (!_foerderDb){
    list.innerHTML = `<p class="field__hint"><em>Förder-Datenbank nicht geladen — bitte Tool über Webserver öffnen (file:// Fetch wird vom Browser blockiert).</em></p>`;
    if (total) total.textContent = '—';
    return;
  }
  if (!kanton){
    list.innerHTML = `<p class="field__hint">Bitte <strong>Kanton</strong> in den Stammdaten wählen — Liste wird automatisch gefiltert.</p>`;
    if (total) total.textContent = '—';
    return;
  }

  const programme = filterFoerderungen(_foerderDb, { kanton, massnahme, wp_quelle });
  if (programme.length === 0){
    list.innerHTML = `<p class="field__hint">Für Kanton <strong>${esc(kanton)}</strong> und Massnahme <strong>${esc(massnahme)}</strong> sind in der aktuellen Datenbank keine Programme erfasst. Bundesprogramme prüfen — manche Massnahmen werden ausschliesslich kantonal gefördert.</p>`;
    if (total) total.textContent = '—';
    return;
  }

  // Kontext für Beträge — konservativ
  const kontext = {
    Qh_kW: Number(c?.Qh) || 0,
    A_bauteil_m2: 0, // unbekannt — Schätzung nur sinnvoll bei explizitem Eingabe-Wert
    kollektor_m2: 0,
    kWp: 0
  };
  const grouped = gruppiereProgramme(programme, kontext);

  const renderProg = (prog) => {
    const betragGesch = schaetzeBetrag(prog, kontext);
    const ebeneClass = prog.ebene === 'Bund' ? 'foerder-card--bund' : 'foerder-card--kanton';
    const tags = (prog.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    const geschaetztTxt = (betragGesch != null && betragGesch > 0)
      ? `<div class="foerder-card__schaetz">≈ <strong>CHF ${fmt(betragGesch, 0)}</strong> bei Q<sub>h</sub> ${fmt(kontext.Qh_kW, 1)} kW (Richtwert)</div>`
      : '';
    return `
      <article class="foerder-card ${ebeneClass}">
        <header class="foerder-card__head">
          <span class="foerder-card__ebene">${esc(prog.ebene || '')}</span>
          <h4 class="foerder-card__name">${esc(prog.name)}</h4>
          <div class="foerder-card__tags">${tags}</div>
        </header>
        <div class="foerder-card__betrag"><strong>${esc(prog.betrag_text || '—')}</strong></div>
        ${geschaetztTxt}
        <p class="foerder-card__bedingung">${esc(prog.bedingungen || '')}</p>
        <div class="foerder-card__foot">
          ${prog.kombinierbar ? '<span class="badge badge--kombi">kombinierbar</span>' : '<span class="badge badge--solo">nicht kombinierbar</span>'}
          <a class="foerder-card__link" href="${escAttr(prog.antrag_link || '#')}" target="_blank" rel="noopener">Antrag öffnen ↗</a>
        </div>
      </article>`;
  };

  const bundHtml = grouped.bund.length
    ? `<div class="foerder-group"><h3 class="foerder-group__title">Bund</h3>${grouped.bund.map(renderProg).join('')}</div>` : '';
  const kantonHtml = grouped.kanton.length
    ? `<div class="foerder-group"><h3 class="foerder-group__title">Kanton ${esc(kanton)}</h3>${grouped.kanton.map(renderProg).join('')}</div>` : '';
  list.innerHTML = bundHtml + kantonHtml;

  if (total){
    if (grouped.total_geschaetzt != null){
      total.innerHTML = `<strong>Geschätzte kombinierte Fördersumme:</strong> ≈ CHF ${fmt(grouped.total_geschaetzt, 0)} (Richtwert, ohne Gewähr — Q<sub>h</sub> = ${fmt(kontext.Qh_kW, 1)} kW).`;
    } else {
      total.innerHTML = `${programme.length} Programm${programme.length === 1 ? '' : 'e'} gefunden — Beträge teilweise als Pauschale, exakter Wert hängt von Bauteilfläche / Anlage ab.`;
    }
  }
}

function updateCockpit(s, c){
  if (!s?.detail?.aktiv) return;
  const det = c && c.detail;
  const Qhl_norm_kW = det ? (Number(det.Qhl_kW) || 0) : 0;
  const Qhl_fws_kW = Number(c?.Qhl) || 0;

  // Vergleich Norm vs. FWS (pure helper)
  const v = vergleichNormVerbrauch(Qhl_norm_kW, Qhl_fws_kW);
  const abw = v.abweichung_proz;
  const ampelKlasse = v.ampel;
  let hinweis;
  if (abw == null){
    if (Qhl_norm_kW <= 0) hinweis = 'Norm-Heizlast noch 0 — bitte Hülle und Räume eingeben.';
    else if (Qhl_fws_kW <= 0) hinweis = 'FWS-Heizlast noch 0 — bitte Verbrauchs-Methode in Schritt 2 aktivieren.';
    else hinweis = v.hinweis;
  } else {
    hinweis = (ampelKlasse === 'gruen')
      ? v.hinweis
      : `${v.hinweis} (Abweichung ${fmt(abw, 1)} %)`;
