<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thermowerk — Heizlast-Tool</title>
  <style>
/* =========================================================================
   Thermowerk Heizlast-Tool — Design-System (S3)
   Inspiration: Final-Heizlast-Tool (fws-original.html) — slate-Inks + Brand-Teal.
   Eine Farbpalette, eine Button-/Input-/Card-Stilfamilie, mobile-tauglich.
   Print-Stub am Ende.
   ========================================================================= */

:root {
  /* ---- Farbpalette (Inks = neutrale Stufen, Brand = Teal, Accents) ---- */
  --ink-0:   #ffffff;
  --ink-50:  #f7f9fb;
  --ink-100: #eef2f6;
  --ink-200: #e2e8f0;
  --ink-300: #cbd5e1;
  --ink-400: #94a3b8;
  --ink-500: #64748b;
  --ink-600: #475569;
  --ink-700: #334155;
  --ink-800: #1e293b;
  --ink-900: #0f172a;

  /* Thermowerk-CI: Navy + Red — passt zur Hauptseite (Layout.astro) */
  --brand-50:  #eef1f6;
  --brand-100: #d8dde8;
  --brand-300: #243658;   /* navy-light */
  --brand-500: #1B2A4A;   /* navy */
  --brand-600: #111D33;   /* navy-dark */
  --brand-700: #0b1424;

  --accent-500: #D93025;  /* Red — wie auf der Hauptseite */
  --accent-600: #B71C1C;  /* Red hover */

  --ok-500:    #16a34a;
  --warn-500:  #d97706;
  --bad-500:   #D93025;   /* Brand-Red — einheitlich */
  --info-500:  #1B2A4A;

  /* ---- Typografie ---- */
  --ff:       'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --ff-mono:  ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  --fs-xs:    11px;
  --fs-sm:    13px;
  --fs-md:    14px;
  --fs-lg:    16px;
  --fs-xl:    20px;
  --fs-2xl:   28px;
  --fs-3xl:   40px;

  /* ---- Spacing & Radius ---- */
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 20px; --s-6: 24px;
  --s-8: 32px; --s-10: 40px; --s-12: 48px;
  /* Eckig — minimaler Radius (passt zur Hauptseite) */
  --r-xs: 0px; --r-sm: 2px; --r-md: 3px; --r-lg: 3px; --r-xl: 4px;

  --shadow-sm: 0 1px 2px rgba(15,23,42,.06);
  --shadow-md: 0 4px 12px rgba(15,23,42,.08);
  --shadow-lg: 0 10px 32px rgba(15,23,42,.12);

  --c-bg:        var(--ink-50);
  --c-card:      var(--ink-0);
  --c-border:    var(--ink-200);
  --c-border-strong: var(--ink-300);
  --c-text:      var(--ink-900);
  --c-text-mute: var(--ink-500);
  --c-brand:     var(--brand-500);
}

/* ---- Reset / Base ---- */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html {
  -webkit-text-size-adjust: 100%;
  /* Mobile-Fix: iOS-Safe-Area / Rubber-Band-Zone soll Seiten-Background zeigen
     (nicht durchsichtig). var(--c-bg) = light grey wie der Rest der Seite. */
  background: var(--c-bg);
}
body {
  font-family: var(--ff);
  font-size:   var(--fs-md);
  line-height: 1.5;
  color: var(--c-text);
  background: var(--c-bg);
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4, h5 { margin: 0; font-weight: 600; line-height: 1.25; }
p { margin: 0; }
button { font-family: inherit; cursor: pointer; }
a { color: var(--c-brand); text-decoration: none; }
a:hover { text-decoration: underline; }
small { font-size: var(--fs-xs); }
sub, sup { font-size: 0.75em; line-height: 0; }

/* ---- Layout-Container ---- */
.app-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 var(--s-5);
  width: 100%;
}

/* ---- Header / Topbar (FWS-Look: weiss, dezente Icons, 2-Zeilen-Layout) ---- */
.topbar {
  background: var(--ink-0);
  border-bottom: 1px solid var(--c-border);
  position: sticky;
  top: 0;
  z-index: 30;
  box-shadow: var(--shadow-sm);
  /* Mobile-Fix: Safe-Area-Zone zeigt jetzt html-Bg (Seiten-Grau) statt
     unter weisser Topbar verdeckt zu sein. Kein padding-top hier — die
     Topbar startet direkt unter der Safe-Area. */
}
.topbar__brand-row { border-bottom: 1px solid var(--ink-100); background: var(--ink-0); }
.topbar__action-row { background: var(--ink-0); }
.topbar__inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 14px var(--s-5) 12px;
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  width: 100%;
}
.topbar__action-row .topbar__inner {
  padding: 8px var(--s-5);
  justify-content: space-between;
  gap: var(--s-3);
}
.brand {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
}
.brand__logo {
  max-height: 44px;
  width: auto;
  display: block;
}
.brand__firma {
  display: flex;
  flex-direction: column;
  gap: 2px;
  border-left: 1px solid var(--ink-200);
  padding-left: 14px;
  font-size: var(--fs-xs);
  line-height: 1.4;
  color: var(--ink-700);
}
.brand__firma strong {
  font-size: var(--fs-sm);
  color: var(--brand-500);
  font-weight: 700;
}
.brand__firma span { color: var(--ink-500); }
.brand__sub {
  margin-left: auto;
  color: var(--ink-400);
  font-size: var(--fs-sm);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
}
.project-tag {
  display: inline-flex;
  align-items: baseline;
  gap: 8px;
  color: var(--ink-700);
  font-size: var(--fs-sm);
}
.project-tag__label {
  color: var(--ink-400);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: var(--fs-xs);
  font-weight: 600;
}
.project-tag__value {
  font-weight: 600;
  color: var(--ink-900);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 42ch;
}
.actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.actions__divider {
  width: 1px;
  height: 22px;
  background: var(--ink-200);
  margin: 0 6px;
}
.icon { width: 14px; height: 14px; flex: 0 0 14px; stroke-width: 1.75; }
.switch--inline { font-size: var(--fs-sm); color: var(--ink-700); padding: 0 8px; }

/* Mobile: kompakter, Buttons nur Icons */
@media (max-width: 640px) {
  .topbar__brand-row .topbar__inner { padding: 10px var(--s-4) 8px; gap: 10px; }
  .brand__logo { max-height: 32px; }
  .brand__sub { display: none; }
  .topbar__action-row .topbar__inner { padding: 6px var(--s-4); gap: var(--s-2); }
  .actions { gap: 2px; }
  .actions .btn span { display: none; }
  .actions .btn { padding: 6px 8px; }
  .actions__divider { display: none; }
  .switch--inline span:not(.switch__track) { display: none; }
  .project-tag__value { max-width: 18ch; }
}

/* ---- Stepper / Tab-Navigation ----
   Stepper sitzt sticky direkt unter der Topbar. Da die Topbar 2 Zeilen hat
   (Brand-Row + Action-Row) und je nach Viewport unterschiedlich hoch ist,
   wird `--topbar-h` in src/main.mjs:syncStickyOffsets() per JS aus der echten
   Topbar-Höhe gesetzt (auf load + resize). 112 px ist der CSS-Default fuer
   Desktop, falls JS noch nicht gelaufen ist. */
:root { --topbar-h: 112px; }
.stepper {
  background: var(--ink-0);
  border-bottom: 1px solid var(--c-border);
  position: sticky;
  top: var(--topbar-h);
  z-index: 25;
}
.stepper__inner {
  display: flex;
  flex-wrap: wrap;
  gap: var(--s-2);
  /* horizontales Padding muss vom .container kommen — wenn überschrieben,
     ragt der Stepper links über die anderen Container hinaus. */
  padding: var(--s-3) var(--s-5);
}
.step {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: 8px 12px;
  border-radius: var(--r-sm);
  background: var(--c-card);
  border: 1px solid var(--c-border);
  color: var(--ink-700);
  font-size: var(--fs-sm);
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
  box-shadow: var(--shadow-sm);
}
.step:hover {
  background: var(--brand-50);
  color: var(--brand-500);
  border-color: var(--brand-100);
}
.step.is-active {
  background: var(--brand-500);
  color: #fff;
  border-color: var(--brand-500);
  box-shadow: 0 2px 6px rgba(27,42,74,0.25);
}
.step__num {
  width: 22px; height: 22px;
  border-radius: var(--r-sm);
  background: var(--ink-200);
  color: var(--ink-700);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: var(--fs-xs);
  font-weight: 700;
  letter-spacing: 0.02em;
}
.step.is-active .step__num { background: var(--accent-500); color: #fff; }
@media (max-width: 640px) {
  .step { padding: 6px 10px; font-size: var(--fs-xs); }
  .step__num { width: 18px; height: 18px; }
}

/* ---- Main / Sections ---- */
.app-main {
  flex: 1;
  padding: var(--s-6) 0 var(--s-12);
}
.section {
  background: var(--c-card);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: var(--s-5) var(--s-5) var(--s-6);
  margin-bottom: var(--s-5);
  box-shadow: var(--shadow-sm);
  scroll-margin-top: 130px;
}
.section__head {
  display: flex;
  align-items: baseline;
  gap: var(--s-3);
  margin-bottom: var(--s-2);
  flex-wrap: wrap;
}
.section__title {
  font-size: var(--fs-xl);
  font-weight: 700;
  color: var(--ink-900);
}
.section__num {
  font-size: var(--fs-xs);
  font-weight: 700;
  color: var(--brand-500);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: var(--brand-50);
  padding: 2px 8px;
  border-radius: var(--r-xs);
}
.section__intro {
  color: var(--c-text-mute);
  font-size: var(--fs-sm);
  margin-bottom: var(--s-4);
  max-width: 70ch;
}

/* ---- Block (Subgruppe innerhalb section) ---- */
.block {
  border-top: 1px solid var(--c-border);
  padding-top: var(--s-4);
  margin-top: var(--s-4);
}
.block:first-of-type { border-top: 0; padding-top: 0; margin-top: 0; }
.block__head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--s-3);
  margin-bottom: var(--s-3);
  flex-wrap: wrap;
}
.block__title {
  font-size: var(--fs-md);
  font-weight: 600;
  color: var(--ink-800);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.block__hint {
  font-size: var(--fs-xs);
  color: var(--c-text-mute);
}

/* ---- Grid / Field ---- */
.grid { display: grid; gap: var(--s-3) var(--s-4); }
.grid--2 { grid-template-columns: repeat(2, 1fr); }
.grid--3 { grid-template-columns: repeat(3, 1fr); }
.grid--4 { grid-template-columns: repeat(4, 1fr); }
.col-span-2 { grid-column: span 2; }
.col-span-3 { grid-column: span 3; }

.field { display: flex; flex-direction: column; gap: var(--s-1); min-width: 0; }
.field__label {
  font-size: var(--fs-sm);
  font-weight: 500;
  color: var(--ink-700);
}
.field__hint {
  font-size: var(--fs-xs);
  color: var(--c-text-mute);
  line-height: 1.4;
}
.symbol {
  color: var(--c-text-mute);
  font-weight: 400;
  font-size: 0.92em;
}

/* ---- Input / Select / Textarea ---- */
.input, .select, .textarea {
  appearance: none;
  width: 100%;
  font-family: inherit;
  font-size: var(--fs-md);
  color: var(--ink-900);
  background: var(--ink-0);
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-sm);
  padding: 8px 10px;
  line-height: 1.4;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.input:hover, .select:hover, .textarea:hover { border-color: var(--ink-400); }
.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--brand-500);
  box-shadow: 0 0 0 3px var(--brand-100);
}
.input[disabled], .select[disabled] { background: var(--ink-100); color: var(--ink-500); cursor: not-allowed; }
.textarea { min-height: 80px; resize: vertical; }
.select { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='%23475569'><path d='M1 1l5 5 5-5' stroke='%23475569' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 12px 8px;
  padding-right: 32px;
}

.input-group {
  display: flex;
  align-items: stretch;
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-sm);
  overflow: hidden;
  background: var(--ink-0);
  transition: border-color .15s, box-shadow .15s;
}
.input-group:focus-within {
  border-color: var(--brand-500);
  box-shadow: 0 0 0 3px var(--brand-100);
}
.input-group .input {
  border: 0;
  border-radius: 0;
  flex: 1;
  min-width: 0;
}
.input-group .input:focus { box-shadow: none; }
.input-group__unit {
  display: inline-flex;
  align-items: center;
  padding: 0 12px;
  background: var(--ink-100);
  color: var(--ink-600);
  font-size: var(--fs-sm);
  border-left: 1px solid var(--c-border);
  white-space: nowrap;
}

/* ---- Segmented / Radio-Pills ---- */
.seg {
  display: inline-flex;
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-sm);
  overflow: hidden;
  background: var(--ink-0);
  width: 100%;
}
.seg__option { flex: 1; }
.seg__option input { position: absolute; opacity: 0; pointer-events: none; }
.seg__option span {
  display: block;
  text-align: center;
  padding: 8px 10px;
  font-size: var(--fs-sm);
  color: var(--ink-700);
  cursor: pointer;
  border-right: 1px solid var(--c-border);
  transition: background .15s, color .15s;
}
.seg__option:last-child span { border-right: 0; }
.seg__option input:checked + span {
  background: var(--brand-500);
  color: #fff;
  font-weight: 600;
}
.seg__option:hover span { background: var(--ink-100); }
.seg__option input:checked + span:hover { background: var(--brand-600); }

/* ---- Switch (Checkbox als Toggle) ---- */
.switch {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  cursor: pointer;
  user-select: none;
  font-size: var(--fs-sm);
  color: var(--ink-700);
}
.switch input { position: absolute; opacity: 0; pointer-events: none; }
.switch__track {
  width: 38px; height: 22px;
  border-radius: 999px;
  background: var(--ink-300);
  position: relative;
  transition: background .15s;
  flex-shrink: 0;
}
.switch__track::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #fff;
  box-shadow: var(--shadow-sm);
  transition: transform .15s;
}
.switch input:checked + .switch__track { background: var(--brand-500); }
.switch input:checked + .switch__track::after { transform: translateX(16px); }
.switch input[disabled] + .switch__track { opacity: 0.5; cursor: not-allowed; }
.switch:has(input[disabled]) { cursor: not-allowed; color: var(--ink-500); }

/* ---- Checkbox ---- */
.chk { display: inline-flex; align-items: center; gap: var(--s-2); font-size: var(--fs-sm); color: var(--ink-700); cursor: pointer; }
.chk input { width: 16px; height: 16px; accent-color: var(--brand-500); }

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s-2);
  padding: 8px 14px;
  font-size: var(--fs-sm);
  font-weight: 500;
  background: var(--ink-0);
  color: var(--ink-700);
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-sm);
  transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
}
.btn:hover { background: var(--ink-100); border-color: var(--ink-400); color: var(--ink-900); }
.btn:active { background: var(--ink-200); }
.btn:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--brand-100); }
.btn[disabled] { opacity: 0.5; cursor: not-allowed; }
.btn--primary {
  background: var(--accent-500);
  color: #fff;
  border-color: var(--accent-500);
}
.btn--primary:hover { background: var(--accent-600); border-color: var(--accent-600); color: #fff; }
.btn--secondary {
  background: var(--brand-500);
  color: #fff;
  border-color: var(--brand-500);
}
.btn--secondary:hover { background: var(--brand-600); border-color: var(--brand-600); color: #fff; }
.btn--ghost {
  background: transparent;
  border-color: transparent;
  color: var(--c-text-mute);
}
.btn--ghost:hover { background: var(--ink-100); color: var(--ink-800); }
.btn--sm { padding: 4px 10px; font-size: var(--fs-xs); }
.btn--block { width: 100%; }

/* ---- Period-Liste / Add-Button ---- */
.period {
  display: grid;
  grid-template-columns: minmax(140px,1fr) 130px 130px minmax(120px,1fr) minmax(180px,1.4fr) 110px 32px;
  gap: var(--s-2);
  align-items: end;
  padding: var(--s-3);
  border: 1px dashed var(--c-border);
  border-radius: var(--r-md);
  background: var(--ink-50);
  margin-bottom: var(--s-2);
}
.period .field__label { font-size: var(--fs-xs); }
.add-row {
  width: 100%;
  border: 1px dashed var(--c-border-strong);
  background: transparent;
  color: var(--c-text-mute);
  padding: var(--s-3);
  border-radius: var(--r-md);
  font-size: var(--fs-sm);
  margin-top: var(--s-2);
  transition: background .15s, color .15s, border-color .15s;
}
.add-row:hover { background: var(--brand-50); color: var(--brand-700); border-color: var(--brand-300); }
.add-row--sub { padding: var(--s-2); font-size: var(--fs-xs); margin-top: var(--s-2); }

/* ---- Räume-Editor (S4) ---- */
.rooms-list { display: flex; flex-direction: column; gap: var(--s-3); }
.room {
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  background: var(--ink-0);
  padding: var(--s-3) var(--s-4);
}
.room__head {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  margin-bottom: var(--s-3);
  padding-bottom: var(--s-2);
  border-bottom: 1px dashed var(--c-border);
}
.room__head strong { font-size: var(--fs-md); color: var(--brand-700); }
.room__a { color: var(--c-text-mute); font-size: var(--fs-sm); margin-left: auto; }
.room__head .btn--ghost { padding: 2px 10px; font-size: var(--fs-md); line-height: 1; }
.room__bauteile { margin-top: var(--s-3); padding-top: var(--s-3); border-top: 1px dashed var(--c-border); }
.bauteil {
  display: flex;
  flex-wrap: wrap;
  align-items: end;
  gap: var(--s-2);
  padding: var(--s-2);
  border: 1px dashed var(--c-border);
  border-radius: var(--r-sm);
  background: var(--ink-50);
  margin-bottom: var(--s-2);
}
.bauteil .field__label { font-size: var(--fs-xs); margin-bottom: 2px; }
.bauteil .btn--ghost { padding: 2px 10px; font-size: var(--fs-md); line-height: 1; align-self: end; }

/* Detail-Cockpit-Variante */
.kpi--detail {
  background: linear-gradient(135deg, #6d28d9, #4c1d95);
  color: #fff;
  border-color: #4c1d95;
}
.kpi--detail .kpi__label { color: rgba(255,255,255,0.78); }
.kpi--detail .kpi__sub { color: rgba(255,255,255,0.85); }

/* ---- Methods (Akkordeon) ---- */
.method {
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  margin-bottom: var(--s-3);
  background: var(--ink-0);
  overflow: hidden;
}
.method__head {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: var(--s-3) var(--s-4);
  cursor: pointer;
  list-style: none;
}
.method__head::-webkit-details-marker { display: none; }
.method__num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--ink-200);
  color: var(--ink-700);
  font-size: var(--fs-sm);
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.method[open] .method__num { background: var(--brand-500); color: #fff; }
.method__title { font-weight: 600; color: var(--ink-900); flex: 1; }
.method__hint { font-weight: 400; color: var(--c-text-mute); font-size: var(--fs-sm); }
.method__status { font-size: var(--fs-sm); color: var(--ink-700); margin-left: auto; }
.method__chev {
  width: 16px; height: 16px;
  transition: transform .2s;
  color: var(--ink-500);
}
.method[open] .method__chev { transform: rotate(90deg); }
.method__body {
  padding: 0 var(--s-4) var(--s-4);
  border-top: 1px solid var(--c-border);
  padding-top: var(--s-3);
}

/* ---- Result-Cockpit ---- */
.cockpit {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: var(--s-3);
  align-items: stretch;
}
.kpi {
  background: var(--ink-50);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: var(--s-4);
  display: flex;
  flex-direction: column;
  gap: var(--s-1);
}
.kpi--hero {
  background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
  color: #fff;
  border-color: var(--brand-700);
}
.kpi__label {
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--c-text-mute);
  font-weight: 600;
}
.kpi--hero .kpi__label { color: rgba(255,255,255,0.78); }
.kpi__value {
  font-size: var(--fs-2xl);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--ink-900);
  line-height: 1.1;
}
.kpi--hero .kpi__value { font-size: var(--fs-3xl); color: #fff; }
.kpi__unit {
  font-size: var(--fs-md);
  color: var(--c-text-mute);
  margin-left: 4px;
  font-weight: 500;
}
.kpi--hero .kpi__unit { color: rgba(255,255,255,0.78); }
.kpi__sub {
  font-size: var(--fs-xs);
  color: var(--c-text-mute);
  margin-top: var(--s-1);
}
.kpi--hero .kpi__sub { color: rgba(255,255,255,0.7); }

/* ---- Ampel-Indikator ---- */
.ampel {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: 4px 10px;
  border-radius: 999px;
  font-size: var(--fs-xs);
  font-weight: 600;
  background: var(--ink-100);
  color: var(--ink-700);
}
.ampel__dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--ink-400);
}
.ampel--gruen { background: #dcfce7; color: #166534; }
.ampel--gruen .ampel__dot { background: var(--ok-500); }
.ampel--gelb  { background: #fef3c7; color: #92400e; }
.ampel--gelb  .ampel__dot { background: var(--warn-500); }
.ampel--rot   { background: #fee2e2; color: #991b1b; }
.ampel--rot   .ampel__dot { background: var(--bad-500); }
.ampel--grau  { background: var(--ink-100); color: var(--ink-500); }
.ampel--grau  .ampel__dot { background: var(--ink-400); }

/* =========================================================================
   S5 — Wärmeübergabe / Heizkreise / Heizflächen
   ========================================================================= */
.kreis-row {
  display: flex; align-items: end; gap: var(--s-2);
  padding: var(--s-2); border-bottom: 1px dashed var(--c-border);
}
.kreis-row .field { margin-bottom: 0; }
.kreis-row .btn--ghost { padding: 2px 10px; font-size: var(--fs-md); line-height: 1; }

.raum-hf {
  padding: var(--s-3); margin-bottom: var(--s-3);
  border: 1px solid var(--c-border); border-radius: var(--r-sm);
  background: var(--ink-50);
}
.hf-row {
  display: flex; flex-wrap: wrap; align-items: end; gap: var(--s-2);
  padding: var(--s-2) 0;
}
.hf-row .field { margin-bottom: 0; }
.hf-row .ampel { margin-left: auto; }
.hf-row .btn--ghost { padding: 2px 10px; font-size: var(--fs-md); line-height: 1; }
.plausi-line { padding: var(--s-2); background: var(--ink-0); border-radius: var(--r-sm); border: 1px dashed var(--c-border); }

/* =========================================================================
   S5 — Geräte-Karten
   ========================================================================= */
.wp-liste {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--s-3);
}
.wp-card {
  display: flex; flex-direction: column; gap: var(--s-2);
  padding: var(--s-3); border: 1px solid var(--c-border); border-radius: var(--r-sm);
  background: var(--ink-0);
  transition: border-color 120ms, box-shadow 120ms;
}
.wp-card:hover { border-color: var(--brand-500); }
.wp-card--selected { border-color: var(--brand-500); box-shadow: 0 0 0 2px var(--brand-100); }
.wp-card__img {
  height: 140px; display: flex; align-items: center; justify-content: center;
  background: var(--ink-100); border-radius: var(--r-sm); overflow: hidden;
}
.wp-card__img img { max-width: 100%; max-height: 100%; object-fit: contain; }
.wp-card__placeholder {
  font-size: var(--fs-3xl); font-weight: 700; color: var(--ink-400);
}
.wp-card__title { display: flex; flex-direction: column; gap: 2px; }
.wp-card__title strong { color: var(--brand-700); font-size: var(--fs-md); }
.wp-card__title span { color: var(--ink-700); font-size: var(--fs-sm); }
.wp-card__stats {
  display: flex; flex-wrap: wrap; gap: var(--s-2);
  font-size: var(--fs-xs); color: var(--ink-600);
}
.wp-card__stats em { color: var(--ink-500); font-style: normal; }
.wp-detail__head {
  display: flex; flex-wrap: wrap; align-items: center; gap: var(--s-2);
  padding-bottom: var(--s-2); border-bottom: 1px dashed var(--c-border);
  margin-bottom: var(--s-3);
}
.wp-detail__head strong { color: var(--brand-700); }
.wp-detail__head .ampel { margin-left: auto; }

/* ---- Footer ---- */
.app-footer {
  border-top: 1px solid var(--c-border);
  padding: var(--s-5) 0;
  font-size: var(--fs-xs);
  color: var(--c-text-mute);
  background: var(--ink-0);
}
.app-footer__inner {
  display: flex;
  justify-content: space-between;
  gap: var(--s-3);
  flex-wrap: wrap;
}

/* =========================================================================
   S6 — Erklär-Boxen (info-helper)
   ========================================================================= */
.info-box {
  margin-top: var(--s-2);
  border: 1px solid var(--ink-200);
  border-radius: var(--r-sm);
  background: var(--ink-50);
  font-size: var(--fs-sm);
}
.info-box[open] { background: #eff6ff; border-color: #bfdbfe; }
.info-box__sum {
  list-style: none;
  display: flex; align-items: center; gap: var(--s-2);
  padding: 6px 10px;
  cursor: pointer;
  user-select: none;
  color: var(--ink-600);
}
.info-box__sum::-webkit-details-marker { display: none; }
.info-box__sum::after {
  content: '▾';
  margin-left: auto;
  color: var(--ink-400);
  transition: transform 120ms;
}
.info-box[open] .info-box__sum::after { transform: rotate(180deg); }
.info-box__icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--info-500); color: #fff;
  font-size: 11px; font-weight: 700;
}
.info-box__label { font-weight: 500; }
.info-box__body {
  padding: 6px 10px 10px 36px;
  color: var(--ink-700);
  line-height: 1.5;
}

/* =========================================================================
   S6 — Förder-Karten
   ========================================================================= */
.foerder-liste { display: flex; flex-direction: column; gap: var(--s-3); }
.foerder-group { display: flex; flex-direction: column; gap: var(--s-2); }
.foerder-group__title {
  font-size: var(--fs-md); font-weight: 600;
  color: var(--ink-700);
  margin: var(--s-2) 0 var(--s-1);
  border-bottom: 1px solid var(--c-border);
  padding-bottom: 4px;
}
.foerder-card {
  border: 1px solid var(--c-border);
  border-left: 4px solid var(--brand-500);
  border-radius: var(--r-sm);
  background: var(--ink-0);
  padding: var(--s-3);
  display: flex; flex-direction: column; gap: 6px;
}
.foerder-card--bund { border-left-color: var(--info-500); }
.foerder-card--kanton { border-left-color: var(--brand-500); }
.foerder-card__head {
  display: flex; align-items: baseline; gap: var(--s-2);
  flex-wrap: wrap;
}
.foerder-card__ebene {
  font-size: var(--fs-xs); font-weight: 700;
  color: var(--c-brand);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.foerder-card__name {
  font-size: var(--fs-md); font-weight: 600;
  color: var(--ink-900);
  flex: 1;
}
.foerder-card__tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  font-size: var(--fs-xs);
  padding: 2px 6px;
  border-radius: var(--r-xs);
  background: var(--ink-100);
  color: var(--ink-700);
}
.foerder-card__betrag { color: var(--ink-900); font-size: var(--fs-md); }
.foerder-card__schaetz { color: var(--brand-700); font-size: var(--fs-sm); }
.foerder-card__bedingung { color: var(--ink-600); font-size: var(--fs-sm); }
.foerder-card__foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 4px; gap: var(--s-2);
  flex-wrap: wrap;
}
.badge {
  font-size: var(--fs-xs);
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
}
.badge--kombi { background: #dcfce7; color: #166534; }
.badge--solo  { background: #fee2e2; color: #991b1b; }
.foerder-card__link {
  font-size: var(--fs-sm);
  color: var(--c-brand);
  font-weight: 500;
}

/* =========================================================================
   S6 — Baubewilligungs-Boxen
   ========================================================================= */
.bewilligung-box {
  border: 1px solid var(--c-border);
  border-radius: var(--r-sm);
  padding: var(--s-3);
  margin-bottom: var(--s-2);
  background: var(--ink-0);
}
.bewilligung-box--prim {
  border-left: 4px solid var(--warn-500);
  background: #fffbeb;
}
.bewilligung-box__head {
  display: flex; align-items: center; gap: var(--s-2);
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.bewilligung-box__icon { font-size: var(--fs-lg); }
.bewilligung-box__details, .bewilligung-box__frist {
  margin-top: 6px;
  color: var(--ink-700);
  font-size: var(--fs-sm);
}
.bewilligung-pill {
  font-size: var(--fs-xs);
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
  margin-left: auto;
}
.bewilligung-pill--ja { background: #fee2e2; color: #991b1b; }
.bewilligung-pill--nein { background: #dcfce7; color: #166534; }
.bewilligung-foot {
  display: flex; flex-wrap: wrap;
  gap: var(--s-3);
  margin-top: var(--s-3);
  padding-top: var(--s-2);
  border-top: 1px solid var(--c-border);
  font-size: var(--fs-sm);
  align-items: center;
}
.bewilligung-portal {
  background: var(--brand-50);
  color: var(--brand-700);
  padding: 4px 10px;
  border-radius: var(--r-sm);
  font-weight: 500;
}
.bewilligung-kontakt { color: var(--ink-500); margin-left: auto; }

/* =========================================================================
   S6 — Cockpit-Vergleich
   ========================================================================= */
.cockpit--vergleich {
  background: var(--ink-50);
  border: 1px dashed var(--c-border);
  border-radius: var(--r-sm);
  padding: var(--s-3);
}
.kpi--vergleich {
  background: var(--ink-0);
  border-left: 4px solid var(--brand-500);
}
.cockpit-wp { padding: var(--s-2); }
.cockpit-wp__row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--s-2);
  font-size: var(--fs-sm);
}
.cockpit-wp__row > div { padding: 4px 8px; background: var(--ink-50); border-radius: var(--r-xs); }
.cockpit-wp__row > div strong { color: var(--ink-900); }

/* =========================================================================
   Responsive (Mobile-tauglich)
   ========================================================================= */
@media (max-width: 880px) {
  :root { --fs-2xl: 24px; --fs-3xl: 32px; }
  .grid--2, .grid--3, .grid--4 { grid-template-columns: 1fr; }
  .col-span-2, .col-span-3 { grid-column: span 1; }
  .cockpit { grid-template-columns: 1fr 1fr; }
  .cockpit .kpi--hero { grid-column: 1 / -1; }
  .period {
    grid-template-columns: 1fr 1fr;
  }
  .topbar__inner { gap: var(--s-2); }
  /* `top: var(--topbar-h)` aus dem Default-Block übernimmt — JS misst die
     reale Topbar-Höhe nach. Hier nur ein Fallback falls JS deaktiviert ist. */
  .stepper { top: var(--topbar-h); }
}
@media (max-width: 480px) {
  .container { padding: 0 var(--s-3); }
  .section { padding: var(--s-4); }
  .cockpit { grid-template-columns: 1fr; }
  .topbar__group .login-status { display: none; }
}

/* =========================================================================
   Print-Stub (für späteren PDF-Export, S7)
   ========================================================================= */
@media print {
  body { background: #fff; color: #000; }
  .topbar, .stepper, .app-footer, .btn, .add-row { display: none !important; }
  .app-main { padding: 0; }
  .container { max-width: none; padding: 0; }
  .section {
    page-break-inside: avoid;
    box-shadow: none;
    border: 1px solid #ddd;
    margin-bottom: 12px;
  }
  .section__head { border-bottom: 1px solid #ccc; padding-bottom: 4px; }
  .kpi--hero { background: none !important; color: #000 !important; border: 2px solid #000 !important; }
  .kpi--hero .kpi__value, .kpi--hero .kpi__label, .kpi--hero .kpi__unit, .kpi--hero .kpi__sub { color: #000 !important; }
  a { color: #000; text-decoration: underline; }
}


/* =========================================================================
   S7 — Topbar-Actions (Login · Projekte · Export · Neu · Speichern)
   ========================================================================= */
.topbar-actions {
  display: flex;
  gap: var(--s-2);
  align-items: center;
  flex-wrap: wrap;
}
.btn--sm {
  font-size: var(--fs-sm);
  padding: 6px 10px;
  border-radius: var(--r-sm);
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn--danger { color: var(--bad-500); }
.btn--danger:hover { background: rgba(220,38,38,.08); }
.login-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: var(--fs-sm);
  color: var(--c-text-mute);
}
.login-status__dot {
  display: inline-block;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ink-400);
}
.login-status__dot--on { background: var(--ok-500); }

/* =========================================================================
   S7 — Modal
   ========================================================================= */
.modal {
  position: fixed; inset: 0;
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal[hidden] { display: none; }
.modal__backdrop {
  position: absolute; inset: 0;
  background: rgba(15, 23, 42, .55);
  backdrop-filter: blur(2px);
}
.modal__panel {
  position: relative;
  background: var(--c-card);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  width: 480px;
  max-width: 100%;
  max-height: 90vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.modal__panel--wide { width: 880px; }
.modal__head {
  padding: var(--s-4) var(--s-5);
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--c-border);
}
.modal__title { font-size: var(--fs-xl); }
.modal__close {
  background: none; border: none;
  font-size: 24px; line-height: 1;
  color: var(--c-text-mute);
  padding: 4px 8px; border-radius: var(--r-sm);
}
.modal__close:hover { background: var(--ink-100); color: var(--ink-900); }
.modal__body {
  padding: var(--s-5);
  overflow-y: auto;
  flex: 1;
}
.modal__foot {
  padding: var(--s-4) var(--s-5);
  display: flex; gap: var(--s-2); justify-content: flex-end;
  border-top: 1px solid var(--c-border);
  background: var(--ink-50);
}
.modal__foot--export .btn { min-width: 120px; }
body.modal-open { overflow: hidden; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink-900);
  color: var(--ink-0);
  padding: 10px 18px;
  border-radius: var(--r-sm);
  font-size: var(--fs-sm);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms, transform 200ms;
  box-shadow: var(--shadow-lg);
}
.toast--show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Field error */
.field__error { color: var(--bad-500); font-size: var(--fs-sm); min-height: 1em; margin-top: var(--s-1); }
.input--inline { width: auto; min-width: 220px; padding: 6px 10px; }
.input--ta { font-family: var(--ff); resize: vertical; min-height: 64px; }
.grid--1 { display: grid; grid-template-columns: 1fr; gap: var(--s-3); }

/* =========================================================================
   S7 — Projekte-Modal
   ========================================================================= */
.proj-toolbar {
  display: flex; flex-wrap: wrap; gap: var(--s-3);
  justify-content: space-between; align-items: center;
  margin-bottom: var(--s-4);
  padding-bottom: var(--s-3);
  border-bottom: 1px solid var(--c-border);
}
.proj-toolbar__left {
  display: flex; align-items: center; gap: var(--s-2); flex-wrap: wrap;
}
.proj-toolbar__name { font-size: var(--fs-sm); color: var(--c-text-mute); }
.auth-pill {
  display: inline-block; padding: 4px 10px;
  border-radius: 14px; font-size: var(--fs-xs); font-weight: 600;
  background: var(--ink-200); color: var(--ink-700);
  letter-spacing: .3px; text-transform: uppercase;
}
.auth-pill--on { background: var(--ok-500); color: #fff; }

.proj-list {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
  gap: var(--s-3);
}
.proj-empty {
  text-align: center; color: var(--c-text-mute); font-size: var(--fs-md);
  padding: var(--s-8) 0;
}
.proj-card {
  background: var(--ink-50);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: var(--s-4);
  display: flex; flex-direction: column;
  gap: var(--s-2);
}
.proj-card__head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: var(--s-2);
}
.proj-card__title {
  font-size: var(--fs-md); font-weight: 600; margin: 0;
}
.proj-card__meta {
  display: flex; flex-direction: column; gap: 2px;
  font-size: var(--fs-xs); color: var(--c-text-mute);
}
.proj-card__time { font-style: italic; }
.proj-card__kpi {
  display: flex; gap: var(--s-3); flex-wrap: wrap;
  font-size: var(--fs-xs); padding: var(--s-2) 0;
  border-top: 1px dashed var(--c-border);
  border-bottom: 1px dashed var(--c-border);
  color: var(--ink-700);
}
.proj-card__actions {
  display: flex; gap: var(--s-2); flex-wrap: wrap;
}
.proj-badge {
  display: inline-block;
  font-size: var(--fs-xs); padding: 2px 8px;
  border-radius: var(--r-xs);
  font-weight: 600; letter-spacing: .3px; text-transform: uppercase;
}
.proj-badge--cloud { background: #1e3a8a; color: #fff; }
.proj-badge--local { background: var(--ink-200); color: var(--ink-700); }

/* =========================================================================
   S7 — Export-Modal
   ========================================================================= */
.export-opts { display: flex; flex-direction: column; gap: var(--s-2); }
/* Im Export-Modal sollen Checkboxen volle Breite nutzen und nicht inline-flex
   bleiben (sonst kann der Checkbox-Button am linken Rand des Modal-Bodys
   abgeschnitten wirken). */
.export-opts .chk {
  display: flex;
  align-items: flex-start;
  padding: 8px 4px;
  gap: var(--s-2);
}
.export-opts .chk input { margin-top: 2px; flex-shrink: 0; }
.export-opts .chk span { flex: 1 1 auto; }


/* =========================================================================
   S7 — Restyle: Navy/Red CI + eckig (Hauptseiten-konform)
   ========================================================================= */

/* Topbar-Action-Buttons (auf dunklem Navy-Grund) */
.topbar-actions .btn {
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: var(--r-sm);
  font-weight: 500;
}
.topbar-actions .btn:hover {
  background: rgba(255,255,255,0.16);
  border-color: rgba(255,255,255,0.28);
  color: #fff;
}
.topbar-actions .btn--primary {
  background: var(--accent-500);
  border-color: var(--accent-500);
  color: #fff;
}
.topbar-actions .btn--primary:hover {
  background: var(--accent-600);
  border-color: var(--accent-600);
}

/* Modal eckig + Navy-Akzent */
.modal__panel {
  border-radius: var(--r-md) !important;
  border-top: 3px solid var(--brand-500);
}
.modal__head {
  background: var(--brand-50);
}
.modal__title { color: var(--brand-500); font-weight: 700; }
.modal__close { border-radius: var(--r-sm); }

/* ==========================================================================

/** Robust number coerce (akzeptiert auch '1,5'). */
function num(v){
  if (v==='' || v==null) return 0;
  const n = typeof v==='number' ? v : parseFloat(String(v).replace(',','.'));
  return Number.isFinite(n) ? n : 0;
}

function periodDays(p){
  if (!p?.von || !p?.bis) return 365;
  const dv = new Date(p.von), db = new Date(p.bis);
  if (isNaN(dv) || isNaN(db)) return 365;
  const diff = Math.round((db - dv) / 86400000) + 1;
  return diff>0 ? diff : 365;
}

function periodMonths(p){
  return periodDays(p) / 30.4375;
}

/** Effektive η einer Periode: Preset oder Override. */
function periodEta(p){
  const h = HEIZWERT[p?.energy];
  if (!h) return 0;
  const ovRaw = p.etaValue;
  const ov = num(ovRaw);
  if (ovRaw!=='' && ovRaw!=null && ov>0) return ov;
  const ps = (h.etaPresets||[]).find(x=>x.key===p.etaPreset);
  if (ps && ps.eta!=null) return ps.eta;
  const fall = (h.etaPresets||[]).find(x=>x.eta!=null);
  return fall ? fall.eta : 1.0;
}

/* ==========================================================================
   PRIMITIV-FORMELN (ohne State)
   ========================================================================== */

/** FWS §8: Qn,WW Jahres-Kompaktformel.
 *  V [l/d] · cp · ΔT/3600 · Π(1+f) · 365 [kWh/a] */
function qnwwJahr({ V_l_d, cp = 4.2, dT = 50, fSpeicher = 0, fZirk = 0, fAusstoss = 0 }){
  if (!(V_l_d > 0)) return 0;
  const base = V_l_d * cp * dT / 3600 * 365;
  const factor = (1 + fSpeicher/100) * (1 + fZirk/100) * (1 + fAusstoss/100);
  return base * factor;
}

/** FWS §3: Qhl = Qn,H / tvoll. */
function qhlAusQn({ QnH, tvoll }){
  if (!(tvoll > 0) || !(QnH > 0)) return 0;
  return QnH / tvoll;
}

/** FWS §9: Qw — WW-Zuschlag.
 *  td = QWW_Tag/Qhl, geclampt auf [0, 12]; Qw = Qhl·(24/(24-td) − 1). */
function qwDetail({ Qhl, QnWW }){
  if (!(Qhl > 0) || !(QnWW > 0)) return { Qw: 0, td: 0, tdRaw: 0, tdClamped: false };
  const QWW_Tag = QnWW / 365;
  const tdRaw = QWW_Tag / Qhl;
  const td = Math.max(0, Math.min(12, tdRaw));
  const tdClamped = tdRaw > 12;
  const Qw = Qhl * (24/(24 - td) - 1);
  return { Qw, td, tdRaw, tdClamped };
}

/** FWS §4: Qoff — Sperrzeit-Zuschlag (toff in h/d). */
function qoffFormel({ Qhl, toff }){
  if (!(Qhl > 0) || !(toff > 0)) return 0;
  if (toff >= 23.5) return Qhl * 10;
  return Qhl * (24/(24 - toff) - 1);
}

/** FWS §10: WW-Speichervolumen [l], gerundet 10-L-Schritte aufwärts.
 *  V = QWW_Tag / (cp·ΔT/3600), · fSto. */
function speichervolumen({ QWW_Tag, cp = 4.2, dT = 50, fSto = 1.0 }){
  if (!(QWW_Tag > 0) || !(dT > 0)) return 0;
  const V = QWW_Tag / (cp * dT / 3600);
  return Math.ceil(V * fSto / 10) * 10;
}

/** FWS §7 / §12.4: Plausi-Ampel gegen SPEZ_BAND. */
function plausiAmpel({ specWm2, bauperiode, gebaeudetyp }){
  const bp = SPEZ_BAND[bauperiode];
  if (!bp) return { ampel:'grau', band:null, mean:0 };
  const band = bp[gebaeudetyp] || bp.efh;
  const mean = (band[0] + band[1]) / 2;
  let ampel = 'gruen';
  if (specWm2 < band[0]*0.8 || specWm2 > band[1]*1.2) ampel = 'rot';
  else if (specWm2 < band[0] || specWm2 > band[1]) ampel = 'gelb';
  return { ampel, band, mean };
}

/** Annualisierte Energie aus Brennstoff-Perioden.
 *  Qn = Σ [ Menge_Periode × (365/Tage_Periode) × Hi × η_Periode ]
 *  Heizwert (Hi) ist konsistent mit suissetec-FWS-Online-Tool. */
function computeQnVerbrauch(s){
  let Qn = 0;
  (s?.heizung?.perioden || []).forEach(p => {
    const h = HEIZWERT[p.energy];
    if (!h) return;
    const menge = num(p.menge);
    if (menge <= 0) return;
    const d = periodDays(p);
    const annual = menge * (365 / d);
    const eta = periodEta(p);
    Qn += annual * h.Hi * eta;
  });
  return Qn;
}

/** WW-Tagesvolumen aus state (modus 'direkt' oder 'personen'). */
function effectiveVWu(s){
  const ww = s?.warmwasser || {};
  if (ww.modus === 'personen'){
    const pers = num(ww.personen);
    const lp   = num(ww.lProPerson) || 40;
    return pers * lp;
  }
  return num(ww.VW_u);
}

/** Rohe WW-Jahresenergie ohne Sektion-3-Gate. */
function computeQnWWRaw(s){
  const V = effectiveVWu(s);
  if (V <= 0) return 0;
  const ww = s?.warmwasser || {};
  return qnwwJahr({
    V_l_d: V,
    cp: 4.2,
    dT: num(ww.dT) || 50,
    fSpeicher: num(ww.speicherverluste),
    fZirk: num(ww.zirkulation),
    fAusstoss: num(ww.ausstoss)
  });
}

/** Qn,WW für Sektion-3-Auswertungen (Qw, Speicher). 0 wenn Gate AUS. */
function computeQnWW(s){
  if (!s?.warmwasser?.aktiv) return 0;
  return computeQnWWRaw(s);
}

/** tvoll automatisch aus Lage × Gebäudetyp. */
function tvollAuto(s){
  const lage = TVOLL_TABLE[s?.objekt?.lage] || TVOLL_TABLE.mittelland;
  return lage[s?.objekt?.typ] || lage.efh;
}

/** Effektive tvoll mit Override-Logik. */
function effectiveTvoll(s){
  const ov = num(s?.heizung?.tvollOverride);
  return ov > 0 ? ov : tvollAuto(s);
}

function sanierungAnteil(s, m){
  const eintraege = Array.isArray(m.zeitEintraege) ? m.zeitEintraege : [];
  if (!eintraege.length){
    return Math.min(1, Math.max(0, num(m.anteilEffective)));
  }
  let totalMonths = 0, withSanTotal = 0;
  eintraege.forEach(e => {
    const p = (s?.heizung?.perioden || []).find(x => x.id === e.periodeId);
    if (!p) return;
    const months = periodMonths(p);
    if (months <= 0) return;
    const withSan = Math.min(months, Math.max(0, num(e.monateMitSan)));
    totalMonths += months;
    withSanTotal += withSan;
  });
  if (totalMonths <= 0) return 0;
  return Math.min(1, withSanTotal / totalMonths);
}

function measureFactor(s, m){
  const p = num(m.proz) / 100;
  if (p <= 0) return 1;
  const zt = m.zeitpunkt || 'zukunft';
  if (zt === 'vergangenheit'){
    const a = sanierungAnteil(s, m);
    const denom = 1 - a*p;
    return denom > 0 ? (1 - p) / denom : 1;
  }
  return 1 - p;
}

/** Qhl,korr = Qhl,roh · Π (Korrekturfaktor_i). */
function sanFactor(s){
  let f = 1;
  (s?.heizung?.sanierungen || []).forEach(m => { f *= measureFactor(s, m); });
  return f;
}

function measureSavingKW(s, m, Qhl_roh){
  if (!Qhl_roh) return 0;
  return Qhl_roh * (1 - measureFactor(s, m));
}

/* --- Methoden für Qhl_roh --- */

function computeMethodVerbrauch(s){
  if (!s?.heizung?.verbrauchAktiv) return null;
  const Qn = computeQnVerbrauch(s);
  if (Qn <= 0) return null;
  const QnWW = s.heizung.verbrauchInklWW ? computeQnWWRaw(s) : 0;
  const QnH = Math.max(0, Qn - QnWW);
  const tv = effectiveTvoll(s);
  const Qhl_roh = qhlAusQn({ QnH, tvoll: tv });
  const spar = sanFactor(s);
  const Qhl = Qhl_roh * spar;
  return { key:'verbrauch', label:'Aus Brennstoff-Verbrauch', Qn, QnWW, QnH, tvoll:tv, Qhl_roh, sparFactor:spar, Qhl };
}

function computeMethodBstd(s){
  if (!s?.heizung?.betriebsstundenAktiv) return null;
  const kwh = num(s.heizung.bstd_kwh);
  const std = num(s.heizung.bstd_stunden);
  const cop = num(s.heizung.bstd_cop) || 1;
  if (kwh <= 0 || std <= 0) return null;
  const QnH = kwh * cop;
  const tv = std;
  const Qhl_roh = QnH / tv;
  const spar = sanFactor(s);
  const Qhl = Qhl_roh * spar;
  return { key:'betriebsstunden', label:'Aus WP-Betriebsstunden', QnH, tvoll:tv, Qhl_roh, sparFactor:spar, Qhl };
}

function computeMethodKwh(s){
  if (!s?.heizung?.kwhAktiv) return null;
  const QnH = num(s.heizung.kwhManual);
  if (QnH <= 0) return null;
  const tv = effectiveTvoll(s);
  const Qhl_roh = qhlAusQn({ QnH, tvoll: tv });
  const spar = sanFactor(s);
  const Qhl = Qhl_roh * spar;
  return { key:'kwh', label:'Aus kWh/a direkt', QnH, tvoll:tv, Qhl_roh, sparFactor:spar, Qhl };
}

function computeMethodBauperiode(s){
  const bp = BAUPERIODE_KWH[s?.objekt?.bauperiode];
  const ebf = num(s?.objekt?.ebf);
  if (!bp || ebf <= 0) return null;
  const band = bp[s.objekt.typ] || bp.efh;
  const mean = (band[0] + band[1]) / 2;
  const QnH = mean * ebf;
  const tv = effectiveTvoll(s);
  const Qhl_roh = qhlAusQn({ QnH, tvoll: tv });
  const spar = sanFactor(s);
  const Qhl = Qhl_roh * spar;
  return { key:'bauperiode', label:'Aus Bauperiode (Referenz)', QnH,
           bandMin: band[0]*ebf, bandMax: band[1]*ebf, tvoll:tv,
           Qhl_roh, sparFactor:spar, Qhl, bandSpec: band };
}

/* --- Cascade-Helpers --- */

function computeQwDetail(Qhl, s){
  const QnWW = computeQnWW(s);
  return qwDetail({ Qhl, QnWW });
}

function computeQw(Qhl, s){
  return computeQwDetail(Qhl, s).Qw;
}

function computeQoff(Qhl, s){
  if (!s?.zuschlaege?.sperrzeitAktiv) return 0;
  const ov = num(s.zuschlaege.toffOverride);
  const toff = ov > 0 ? ov : (TOFF_DEFAULTS[s.zuschlaege.sperrzeitTyp] || 0);
  return qoffFormel({ Qhl, toff });
}

function resolveFSto(s){
  const key = s?.speicher?.fStoPreset;
  const p = F_STO_PRESETS.find(x => x.key === key);
  return p ? p.fSto : 1.25;
}

function resolveAWTFactor(s){
  const key = s?.speicher?.awtPreset;
  const p = A_WT_PRESETS.find(x => x.key === key);
  return p ? p.faktor : 0.65;
}

function computeVWSto(s){
  if (!s?.warmwasser?.aktiv) return 0;
  const QnWW = computeQnWW(s);
  if (QnWW <= 0) return 0;
  const QWW_Tag = QnWW / 365;
  const dT = num(s?.speicher?.dT) || 50;
  const fSto = resolveFSto(s);
  return speichervolumen({ QWW_Tag, cp: 4.2, dT, fSto });
}

function computePlausi(spez, s){
  return plausiAmpel({
    specWm2: spez,
    bauperiode: s?.objekt?.bauperiode,
    gebaeudetyp: s?.objekt?.typ
  });
}

/** Hauptkaskade — ein State rein, Resultat-Bundle raus.
 *  Optionales `opts.phiHuelle` (kW) ersetzt das Verbrauchs-Q_hl als
 *  Auslegungsgrundlage (für Hülle/Mixed-Mode-Bericht, AUDIT 3.12).
 *  Q_w / Q_off / Q_h und spez/plausi werden dann mit phiHuelle gerechnet. */
function compute(s, opts = {}){
  const m = {
    verbrauch:        computeMethodVerbrauch(s),
    betriebsstunden:  computeMethodBstd(s),
    kwh:              computeMethodKwh(s)
  };
  const mList = Object.values(m).filter(Boolean);
  let primary = mList[0] || null;
  let fallback = null;
  if (!primary){
    fallback = computeMethodBauperiode(s);
    if (fallback) primary = fallback;
  }
  // AUDIT 3.12 — phiHuelle-Override: wenn der Aufrufer einen Hüllen-Q_hl in kW
  // mitgibt, ersetzt er den Verbrauchs-Q_hl als Auslegungsgrundlage.
  const phiHuelleOv = Number(opts.phiHuelle);
  const usePhiHuelle = Number.isFinite(phiHuelleOv) && phiHuelleOv > 0;
  const Qhl = usePhiHuelle ? phiHuelleOv : (primary ? primary.Qhl : 0);
  const qwDet = computeQwDetail(Qhl, s);
  const Qw   = qwDet.Qw;
  const Qoff = computeQoff(Qhl, s);
  const Qas  = s?.zuschlaege?.verbundenAktiv ? num(s.zuschlaege.qas) : 0;
  const Qh   = Qhl + Qw + Qoff + Qas;
  const ebf  = num(s?.objekt?.ebf);
  const spez = ebf > 0 ? (Qhl * 1000 / ebf) : 0;
  const plausi = computePlausi(spez, s);
  const VW_Sto = computeVWSto(s);
  const QnWW = computeQnWW(s);
  const ref = computeMethodBauperiode(s);
  // Heizungs-Pufferspeicher Richtwert ~20 L/kW Qh, aufgerundet 10 L (VDI 4645).
  const VP_Sto = Qh > 0 ? Math.ceil(Qh * 20 / 10) * 10 : 0;
  // Diskrepanz zwischen Methoden
  let maxDev = 0;
  mList.forEach(x => {
    if (primary && x !== primary && primary.Qhl > 0){
      const d = Math.abs(x.Qhl - primary.Qhl) / primary.Qhl;
      if (d > maxDev) maxDev = d;
    }
  });
  const awtFactor = resolveAWTFactor(s);
  const A_WT = Qh > 0 ? Qh * awtFactor : 0;
  return {
    methods: m, methodList: mList, primary, fallback, ref,
    Qhl, Qw, qwDetail: qwDet, Qoff, Qas, Qh,
    spez, plausi, VW_Sto, VP_Sto, QnWW, maxDev, A_WT, awtFactor,
    phiHuelleUsed: usePhiHuelle
  };
}

  const HT_bauteile = sumHT(bauteile);
  const A_um = Number(raumOpt.A_umfassung) || 0;
  const deltaU_pausch = Number(raumOpt.deltaU_WB_pauschal) || 0;
  const HT = HT_bauteile + deltaU_pausch * A_um;

  // 2) Lüftung
  const V_inf  = vInf({ V, n50: raumOpt.n50, e_wind: raumOpt.e_wind, epsilon: raumOpt.epsilon ?? 1.0 });
  const V_minR = vMin({ V, n_min: raumOpt.n_min });
  const V_dot  = vTherm({ V_inf, V_min: V_minR });
  const HV = hVRaum(V_dot);

  // 3) Φ_T, Φ_V, Φ_HL
  const phiT = HT * dT;
  const phiV = HV * dT;
  const phiHL = phiT + phiV;

  // 4) Wiederaufheiz-Zuschlag Φ_RH = A · f_RH
  const f_RH = Number(raumOpt.f_RH_W_pro_m2) || 0;
  const phiRH = A * f_RH;

  // 5) Auslegungsleistung (Standard fx=1.0; Sanierungs-/Unsicherheits-Aufschläge optional)
  const fx = Number(raumOpt.f_x) || 1.0;
  const phiAuslg = (phiHL + phiRH) * fx;

  return { HT, HV, V_inf, V_min: V_minR, V_dot, dT, phiT, phiV, phiHL, phiRH, phiAuslg };
}

/* ==========================================================================
   GEBÄUDE-AGGREGATION
   ========================================================================== */

/** Aggregiert eine Liste Raum-Resultate (Output von computeRoomHeatload).
 *  Liefert Σ phiHL, Σ phiRH, Σ phiAuslg, Anzahl Räume. */
function aggregateBuilding(roomResults){
  if (!Array.isArray(roomResults) || roomResults.length === 0){
    return { phiHL: 0, phiRH: 0, phiAuslg: 0, n: 0 };
  }
  let phiHL = 0, phiRH = 0, phiAuslg = 0;
  for (const r of roomResults){
    phiHL    += Number(r?.phiHL)    || 0;
    phiRH    += Number(r?.phiRH)    || 0;
    phiAuslg += Number(r?.phiAuslg) || 0;
  }
  return { phiHL, phiRH, phiAuslg, n: roomResults.length };
}

/* ==========================================================================
   VEREINFACHTES VERFAHREN (Schnell-Schätzung Φ' [W/m²], B1 LF07 S.443)
   ========================================================================== */

/** Φ_HL_geb ≈ Φ' · A_N. */
function phiVereinfacht({ phiSpez, A_N }){
  return (Number(phiSpez) || 0) * (Number(A_N) || 0);
}

const PHI_SPEZ_BAND = {
  'unsaniert_vor1975':       [130, 180],
  '1976_1994':               [70, 100],
  '1995_2001_WSVO':          [60, 90],
  'EnEV2009_GEGsaniert':     [30, 50],
  'Niedrigenergie':          [25, 40],
  'Passivhaus_MinergieP':    [10, 15]

/* ==========================================================================
   S4 — DETAIL-MODUS: BUILDING-LOAD AUS STATE
   ==========================================================================
   computeBuildingDetailLoad(state) — Misch-Logik:
   - Wenn Räume erfasst → raumweise computeRoomHeatload pro Raum

   - phiHL_total = Σ raumweise + phi_rest_pauschal

/** Synthetisiert pauschal-Anteil für Restfläche A_rest mit Global-U-Werten.
 *  Vereinfacht: 1 m² Wand + 0.15 m² Fenster + 1/n_geschosse Dach/Boden je m² Restfläche,
 *  Volumen = A_rest * h, Lüftung n_min = 0.5.
 *  uHuelle = { wand, fenster, dach, boden, tueren } (Zahlen).
 */
function computePauschalRest({
  A_rest, h, n_geschosse = 2, uHuelle = {},
  theta_int = 20, theta_e = -8,
  n_min = 0.5,
  // AUDIT 3.4 — Lüftungs-Infiltration nach EN 12831:
  //   V_inf = 2 · V · n50 · e_wind · ε ; V_dot = max(V_inf, V_min)
  //   Defaults für Bestand: n50 = 4 (mässig dicht), e_wind = 0.02, ε = 1.0.
  n50 = 4, e_wind = 0.02, epsilon = 1.0
}){
  const A = Number(A_rest) || 0;
  if (A <= 0) return { phiHL: 0, HT: 0, HV: 0, V: 0, V_inf: 0, V_min: 0, V_dot: 0, dT: 0 };
  const hh = Number(h) || 2.5;
  const ng = Math.max(1, Number(n_geschosse) || 1);
  const dT = (Number(theta_int) || 20) - (Number(theta_e) || -8);
  const V  = A * hh;
  const u_w = Number(uHuelle.wand) || 0;
  const u_f = Number(uHuelle.fenster) || 0;
  const u_d = Number(uHuelle.dach) || 0;
  const u_b = Number(uHuelle.boden) || 0;
  // Bauteilflächen-Schätzung pro m² Restfläche (typisch CH-Wohnbau)
  const A_w = A * 1.0;          // Aussenwand-Anteil
  const A_f = A * 0.15;         // Fensteranteil 15%
  const A_d = A / ng;           // Dachfläche-Anteil
  const A_b = A / ng;           // Bodenfläche-Anteil
  const HT = u_w * A_w + u_f * A_f + u_d * A_d + u_b * A_b * 0.5; // Boden mit fRT≈0.5 (Erdreich)
  // Lüftung: V_inf vs V_min — der grössere Anteil dominiert.
  const V_inf = 2 * V * (Number(n50) || 0) * (Number(e_wind) || 0) * (Number(epsilon) || 1);
  const V_min = V * (Number(n_min) || 0.5);
  const V_dot = Math.max(V_inf, V_min);
  const HV = 0.34 * V_dot;
  const phiHL = (HT + HV) * dT;
  return { phiHL, HT, HV, V, V_inf, V_min, V_dot, dT };
}

/** Hauptfunktion S4: Detail-Heizlast aus state.
 *  Erwartet state mit objekt.{ebf, geschosshoehe, tAussenAuslegung} und
 *  detail.{huelle, raeume, misch}.
 *  uHuelleResolved = { wand, fenster, dach, boden, tueren } — bereits aufgelöste Zahlen.
 */
function computeBuildingDetailLoad(state, uHuelleResolved = {}){
  const det = state?.detail || {};
  if (!det.aktiv) return null;
  const obj = state?.objekt || {};
  const theta_e = Number(obj.tAussenAuslegung);
  const ebf = Number(obj.ebf) || 0;
  const h = Number(obj.geschosshoehe) || 2.5;
  const n_geschosse = Number(obj.anzahl_geschosse) || (obj.typ === 'mfh' ? 4 : 2);

  // Raumweise
  const raeume = Array.isArray(det.raeume) ? det.raeume : [];
  const roomResults = [];
  let A_raeume = 0;
  for (const r of raeume){
    if (!r) continue;
    const A = Number(r.A) || (Number(r.l) > 0 && Number(r.b) > 0 ? Number(r.l) * Number(r.b) : 0);
    const hr = Number(r.h) || h;
    const beheizt = r.beheizt !== false; // Default true
    A_raeume += A;
    if (!beheizt){
      // Raum unbeheizt → kein Heizlast-Anteil, aber A trotzdem von Restfläche abziehen
      roomResults.push({ name: r.name || '–', A, beheizt: false, phiHL: 0, phiRH: 0, phiAuslg: 0 });
      continue;
    }
    // Bauteile aus r.bauteile (Auswahl referenziert Hülle)
    const bauteile = (r.bauteile || []).map(b => {
      const u_default = Number(uHuelleResolved[b.typ]) || 0;
      const u = (b.u != null && b.u !== '') ? Number(b.u) : u_default;
      return {
        u, deltaUWb: Number(b.deltaUWb) || 0,
        A: Number(b.A) || 0,
        fRT: (b.fRT != null && b.fRT !== '') ? Number(b.fRT) : 1.0
      };
    });
    const res = computeRoomHeatload({
      bauteile,
      geometrie: { A, h: hr, V: A * hr },
      klima: { theta_e },
      raumOpt: {
        theta_int: Number(r.theta_int) || 20,
        n_min: Number(r.n_min) || 0.5,
        n50: Number(r.n50) || 4,
        e_wind: Number(r.e_wind) || 0.02,
        epsilon: 1.0,
        f_RH_W_pro_m2: Number(r.f_RH) || 0,
        f_x: 1.0
      }
    });
    roomResults.push(Object.assign({ name: r.name || ('Raum ' + (roomResults.length+1)), A, beheizt: true }, res));
  }
  const phi_raeume = roomResults.reduce((s, r) => s + (Number(r.phiHL) || 0), 0);

  const A_rest = Math.max(0, ebf - A_raeume);
  let phi_rest = 0;
  let restDetail = null;
  if (det.misch && det.misch.rest_global !== false && A_rest > 0){
    // AUDIT 3.4: n50/e_wind aus state.objekt (oder Mittelwert über Räume)
    //  als Default für Pauschal-Rest. Falls nicht gesetzt, EN 12831 Bestand-
    //  Default 4 / 0.02 (siehe computePauschalRest).
    const n50_eff = Number(obj.n50) || 4;
    const e_wind_eff = Number(obj.e_wind) || 0.02;
    restDetail = computePauschalRest({
      A_rest, h, n_geschosse, uHuelle: uHuelleResolved,
      theta_int: 20, theta_e,
      n50: n50_eff, e_wind: e_wind_eff
    });
    phi_rest = restDetail.phiHL;
  }
  const phiHL_total = phi_raeume + phi_rest;
  return {
    phiHL_total, phi_raeume, phi_rest, A_raeume, A_rest,
    roomResults, restDetail,
    Qhl_kW: phiHL_total / 1000
  };
}

__mods__["./calc/heatload.mjs"] = { htBauteil, sumHT, vInf, vMin, vTherm, hVRaum, fRT_fromAnschluss, computeRoomHeatload, aggregateBuilding, phiVereinfacht, computePauschalRest, computeBuildingDetailLoad, PHI_SPEZ_BAND };

// Quelle: FWS Modul 3 §11 (Wärmeübergabe), VDI 6030 (Heizkörper-Auslegung),
//         Heizflächen-Korrekturkurven Q ∝ ΔT_log^n.
//
// Pure Funktionen — kein DOM-/FS-Zugriff.
//
// Modell:
//   Q(ΔT) = Q_norm · (ΔT_log,neu / ΔT_log,norm)^n
//   ΔT_log = (ΔT1 − ΔT2) / ln(ΔT1/ΔT2),  ΔTi = tWasser − tInnen
//   n = 1.30  Heizkörper (Konvektor-/Plattenheizkörper)
//   n = 1.10  Konvektor / spez. Bauart
//   n = 1.00  Fussbodenheizung
//   n = 1.05  Wandheizung
//
// Spez. Norm-Leistung (W/m² Heizflächen-Bezugsfläche) nach Gerätetyp,
// jeweils bei Norm-Auslegung der Heizfläche:
//   FBH  bei 35/28/20  → ca.  80 W/m² (Bodenfläche)
//   Wand bei 35/28/20  → ca.  80 W/m² (Heizfläche)
//   HK   bei 75/65/20  → ca. 1000 W/m² (HK-Frontfläche)
//
// Plausi-Ampel (Sanierungs-Frage „reicht alte HF bei niedrigerem VL?"):
//   deckungsgrad ≥ 1.00 → grün
//   0.85 ≤ deckungsgrad < 1.00 → gelb
//   deckungsgrad < 0.85 → rot
//
// Heizkreis-Aggregation: Liste { kreis, raeume[], A_total, Q_total } —
// nutzt der UI für Verteiler-Übersicht.

   KONSTANTEN
   ========================================================================== */

const N_EXPONENT = {
  fbh: 1.00,
  wandheizung: 1.05,
  heizkoerper: 1.30,
  konvektor: 1.10
};

/** Norm-Auslegung pro Heizflächentyp (Referenzpunkt der Korrekturkurve). */
const REF_AUSLEGUNG = {
  fbh:         { tVL: 35, tRL: 28, tInnen: 20, q_W_pro_m2:   80 },
  wandheizung: { tVL: 35, tRL: 28, tInnen: 20, q_W_pro_m2:   80 },
  heizkoerper: { tVL: 75, tRL: 65, tInnen: 20, q_W_pro_m2: 1000 },
  konvektor:   { tVL: 75, tRL: 65, tInnen: 20, q_W_pro_m2: 1500 }
};

/* ==========================================================================

   ========================================================================== */

/** Logarithmische Mitteltemperatur-Differenz Heizfläche ↔ Raum [K].
 *  Wenn dT1 ≈ dT2 → arithmetisches Mittel (Limes der ln-Formel).
 *  Liefert 0 wenn eines der dT ≤ 0 (Heizfläche kann dann nicht heizen). */
function dTm({ tVL, tRL, tInnen = 20 } = {}){
  const a = Number(tVL) - Number(tInnen);
  const b = Number(tRL) - Number(tInnen);
  if (!Number.isFinite(a) || !Number.isFinite(b)) return 0;
  if (a <= 0 || b <= 0) return 0;
  if (Math.abs(a - b) < 0.01) return (a + b) / 2;
  return (a - b) / Math.log(a / b);
}

/** Leistungsfaktor f = (ΔT_neu / ΔT_ref)^n (relativ zur Norm-Auslegung).
 *  null wenn Heizflächentyp unbekannt oder ΔT_ref nicht berechenbar. */
function leistungsFaktor({ typ, tVL, tRL, tInnen = 20 } = {}){
  const ref = REF_AUSLEGUNG[typ];
  if (!ref) return null;
  const dT_neu = dTm({ tVL, tRL, tInnen });
  const dT_ref = dTm(ref);
  if (!(dT_ref > 0)) return null;
  if (!(dT_neu > 0)) return 0;
  const n = N_EXPONENT[typ] || 1.3;
  return Math.pow(dT_neu / dT_ref, n);

/** Ampel-Klassifikation aus Deckungsgrad. */

  if (d == null || !Number.isFinite(d)) return 'grau';
  if (d >= 1.00) return 'gruen';
  if (d >= 0.85) return 'gelb';
  return 'rot';

 *  reicht die Heizfläche?
 *
 *  @param {object} args
 *  @param {number} args.phiHL_raum       Heizlast Raum [W]
 *  @param {number} args.A_heizflaeche    Heizfläche [m²]
 *  @param {string} args.typ              'fbh' | 'wandheizung' | 'heizkoerper' | 'konvektor'
 *  @param {number} args.tVL_neu          Geplante neue Vorlauftemperatur [°C]
 *  @param {number} [args.tRL_neu]        Geplante Rücklauftemperatur [°C] (Default: tVL−7 für FBH/Wand, tVL−10 für HK/Konv)
 *  @param {number} [args.tInnen=20]      Innentemperatur [°C]
 *  @param {number} [args.q_norm_W_pro_m2] Override für spez. Norm-Leistung
 *  @returns {{ ampel, deckungsgrad, faktor, Q_real, hinweis }}
 */
function plausibilitaetHeizflaeche({
  phiHL_raum, A_heizflaeche, typ,
  tVL_neu, tRL_neu, tInnen = 20, q_norm_W_pro_m2
} = {}){
  const ref = REF_AUSLEGUNG[typ];
  if (!ref) return { ampel: 'grau', deckungsgrad: null, faktor: null, Q_real: 0, hinweis: 'Unbekannter Heizflächentyp' };
  const phi = Number(phiHL_raum) || 0;
  const A = Number(A_heizflaeche) || 0;
  const tVL = Number(tVL_neu);
  const dT_default = (typ === 'fbh' || typ === 'wandheizung') ? 7 : 10;
  const tRL = (tRL_neu == null || tRL_neu === '') ? (tVL - dT_default) : Number(tRL_neu);
  if (!(A > 0) || !(phi > 0)){
    return { ampel: 'grau', deckungsgrad: null, faktor: null, Q_real: 0, hinweis: 'Heizfläche oder Heizlast fehlt' };
  }
  const f = leistungsFaktor({ typ, tVL, tRL, tInnen });
  if (f == null){
    return { ampel: 'grau', deckungsgrad: null, faktor: null, Q_real: 0, hinweis: 'Vorlauf-/Rücklauftemperatur ungültig' };
  }
  const q_norm = Number(q_norm_W_pro_m2) || ref.q_W_pro_m2;
  const Q_real = q_norm * f * A;
  const deckungsgrad = Q_real / phi;

  if (ampel === 'gruen') hinweis = 'Heizfläche reicht aus';
  else if (ampel === 'gelb') hinweis = 'Knapp — bei kalten Tagen evtl. Boost erforderlich';
  else hinweis = 'Heizfläche zu klein — Vergrösserung oder höhere VL nötig';
  return { ampel, deckungsgrad, faktor: f, Q_real, hinweis };

   MAX. VORLAUFTEMPERATUR BEI GEGEBENER HEIZFLÄCHE
   ========================================================================== */

/** Wieviel Vorlauftemperatur ist bei gegebener Heizfläche und Heizlast nötig?
 *  Iterative Lösung: dT_log_erforderlich = dT_ref · (Q_HL / (q_norm · A))^(1/n)
 *  Daraus über Annahme tRL = tVL − Spreizung → tVL.
 *  @returns {{ tVL_max, tRL_max, dT_log_req, dT_logSpan }} oder null bei ungültigen Inputs
 */
function maxVorlauftemperatur({
  phiHL_raum, A_heizflaeche, typ, tInnen = 20,
  spreizung = null, q_norm_W_pro_m2
} = {}){
  const ref = REF_AUSLEGUNG[typ];
  if (!ref) return null;
  const phi = Number(phiHL_raum) || 0;
  const A = Number(A_heizflaeche) || 0;
  if (!(phi > 0) || !(A > 0)) return null;
  const q_norm = Number(q_norm_W_pro_m2) || ref.q_W_pro_m2;
  const n = N_EXPONENT[typ] || 1.3;
  const dT_ref = dTm(ref);
  if (!(dT_ref > 0)) return null;
  // Q = q_norm · A · (dT/dT_ref)^n  →  dT = dT_ref · (Q/(q_norm·A))^(1/n)
  const factor = phi / (q_norm * A);
  if (!(factor > 0)) return null;

  const tVL_max = Number(tInnen) + dT_req + span / 2;

    grp.raeume.push({
      raumId: h.raumId ?? null,
      raumName: h.raumName || '',
      A: Number(h.A) || 0,
      typ: h.typ || '',
      phiHL: Number(h.phiHL) || 0

    grp.phi_total += Number(h.phiHL) || 0;

function bivalenzpunkt({ Qh_geb, kennlinie = [], T_N = -8, T_HG = 15 } = {}){

  let T_biv = null, Q_biv = 0;

    if (wp.Qh_wp >= QL){

      Q_biv = QL;

  // Energie_total ∝ ∫(T_HG−T)dT von T_N bis T_HG, Defizit ∝ ∫(QL−Q_WP)dT von T_N bis T_biv.

  if (ratio >= 0.75 && ratio <= 1.20)      { ampel = 'gruen'; hinweis = 'Modulation gut, kein Takten'; }

 *  '1978_1994', '1995_2000', '2001_2009', '2010_2015', '2016_heute', 'minergie'. */
function bauklasseFromBaujahr(baujahr){
  const y = Number(baujahr);
  if (!Number.isFinite(y) || y <= 0) return null;
  if (y < 1946) return 'vor1945';
  if (y <= 1960) return '1946_1960';
  if (y <= 1977) return '1961_1977';
  if (y <= 1994) return '1978_1994';
  if (y <= 2000) return '1995_2000';
  if (y <= 2009) return '2001_2009';

 *  Bauklassen-Schwerpunkt '1961_1977', '1986-1990' den '1978_1994' usw.). */

function applySanierung(bauklasse, sanierungsstand){

    case 'saniert':     return '2010_2015';

 *  bauteile = [{ typ:'AW'|'AF'|'DE'|'FB'|'IW'|'IT', A:[m²] }, ...] */
function aggregateAreas(bauteile){
  const out = {};
  if (!Array.isArray(bauteile)) return out;
  for (const b of bauteile){
    const A = Number(b?.A);
    if (!Number.isFinite(A) || A <= 0) continue;
    const key = String(b.typ || 'unbekannt');
    out[key] = (out[key] || 0) + A;
  }
  return out;
}

/** Umfassungsfläche A_um = Σ A für Bauteile, die als Hülle zählen. */
function huellflaeche(bauteile, includeTypes = ['AW','AF','DE','FB','AT']){
  if (!Array.isArray(bauteile)) return 0;
  return bauteile.reduce((s, b) => {
    if (!includeTypes.includes(b?.typ)) return s;
    const A = Number(b?.A);
    return s + (Number.isFinite(A) && A > 0 ? A : 0);
  }, 0);
}

/** Volumen aus Geometrie. Akzeptiert {V} oder {A,h} oder {l,b,h}. */
function raumVolumen(g){
  if (!g) return 0;
  const V = Number(g.V);
  if (Number.isFinite(V) && V > 0) return V;
  const A = Number(g.A);
  const h = Number(g.h);
  if (Number.isFinite(A) && A > 0 && Number.isFinite(h) && h > 0) return A * h;
  const l = Number(g.l), b = Number(g.b);
  if (Number.isFinite(l) && Number.isFinite(b) && Number.isFinite(h) && l > 0 && b > 0 && h > 0){
    return l * b * h;
  }
  return 0;
}

/** Fläche aus Geometrie. Akzeptiert {A} oder {l,b}. */
function raumFlaeche(g){
  if (!g) return 0;
  const A = Number(g.A);
  if (Number.isFinite(A) && A > 0) return A;
  const l = Number(g.l), b = Number(g.b);
  if (Number.isFinite(l) && Number.isFinite(b) && l > 0 && b > 0) return l * b;
  return 0;
}

/* --------------------------------------------------------------------------
   uWertAusSchichten — vereinfachte Schicht-API der Default-Kaskade.
   Schichten von innen nach aussen, je entweder
     { material: 'mineralwolle' | ... , d: m }   (Lookup in DAEMMSTOFFE), oder
     { lambda: W/mK,                  d: m }   (Tragschicht / Putz, direkt).
   Verwendet die Tool-eigene RSI_RSE-Tabelle (Rsi/Rse Camel-Case).
   -------------------------------------------------------------------------- */
function uWertAusSchichten(schichten, opts = {}) {
  const dir = opts.direction || 'horizontal';
  const rsiRse = RSI_RSE[dir] || RSI_RSE.horizontal;
  const list = Array.isArray(schichten) ? schichten : [];
  let sumR = 0;
  const enriched = list.map((s, i) => {
    let lambda = null, label = null, materialKey = null;
    if (s && typeof s === 'object') {
      if (typeof s.material === 'string' && DAEMMSTOFFE[s.material]) {
        materialKey = s.material;
        lambda = DAEMMSTOFFE[s.material].lambda;
        label = DAEMMSTOFFE[s.material].label;
      } else if (typeof s.lambda === 'number' && isFinite(s.lambda)) {
        lambda = s.lambda;
        label = s.label || null;
      }
    }
    const d = Number(s && s.d) || 0;
    let r = 0;
    if (lambda > 0 && d > 0) r = d / lambda;
    sumR += r;
    return { idx: i, material: materialKey, label, lambda, d, r };
  });
  const rTotal = rsiRse.Rsi + sumR + rsiRse.Rse;
  const U = rTotal > 0 ? 1 / rTotal : null;
  const marker = opts.markerSource || 'baujahr';
  return { U, lambdaTotalReziprok: rTotal, marker, schichten: enriched };
}
