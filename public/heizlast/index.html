function rebuildPeriods(state){
  const list = document.getElementById('periodsList');
  if (!list) return;
  const ps = state.heizung.perioden || [];
  list.innerHTML = ps.map((p, idx) => renderPeriod(p, idx)).join('');
}

function renderPeriod(p, idx){
  const h = HEIZWERT[p.energy] || HEIZWERT.erdgas;
  const energyOpts = Object.entries(HEIZWERT).map(([k, v]) => [k, v.name]);
  const etaOpts = (h.etaPresets || []).map(e => [e.key, e.eta != null ? `${e.label} (η ${e.eta})` : e.label]);
  return `
  <div class="period" data-period-idx="${idx}">
    <div class="field">
      <label class="field__label">Energieträger</label>
      ${select(`heizung.perioden[${idx}].energy`, p.energy, energyOpts)}
    </div>
    <div class="field">
      <label class="field__label">Von</label>
      <input class="input" type="date" data-path="heizung.perioden[${idx}].von" value="${escAttr(p.von || '')}">
    </div>
    <div class="field">
      <label class="field__label">Bis</label>
      <input class="input" type="date" data-path="heizung.perioden[${idx}].bis" value="${escAttr(p.bis || '')}">
    </div>
    <div class="field">
      <label class="field__label">Menge (${esc(h.unit)}/a)</label>
      <div class="input-group">${inputNumRaw(`heizung.perioden[${idx}].menge`, p.menge || '', 0.1, 0)}<span class="input-group__unit">${esc(h.unit)}</span></div>
    </div>
    <div class="field">
      <label class="field__label">Wirkungsgrad η</label>
      ${select(`heizung.perioden[${idx}].etaPreset`, p.etaPreset, etaOpts)}
    </div>
    <div class="field">
      <label class="field__label">η Override</label>
      ${inputNumRaw(`heizung.perioden[${idx}].etaValue`, p.etaValue || '', 0.01, 0, '0.95')}
    </div>
    <button class="btn btn--ghost" type="button" data-del-period="${idx}" title="Periode löschen">×</button>
  </div>`;
}

function syncPeriodsCount(state){
  const list = document.getElementById('periodsList');
  if (!list) return;
  const ps = state.heizung.perioden || [];
  const dom = list.querySelectorAll('.period');
  if (dom.length !== ps.length) rebuildPeriods(state);
}

/* =========================================================================
   EVENT-WIRING
   ========================================================================= */

function attachStaticHandlers(root, stepperEl, getState){
  root.addEventListener('input', (ev) => onInputChange(ev));
  root.addEventListener('change', (ev) => onInputChange(ev));

  root.addEventListener('click', (ev) => {
    const addBtn = ev.target.closest('#btnAddPeriod');
    if (addBtn){
      const st = getState();
      const ps = (st.heizung.perioden || []).slice();
      const id = 'p' + (ps.length ? Math.max(...ps.map(p => parseInt(String(p.id).replace(/\D/g,''),10) || 0)) + 1 : 0);
      ps.push({ id, energy: 'erdgas', von: '', bis: '', menge: 0, etaPreset: 'brennwert', etaValue: '' });
      _set('heizung.perioden', ps);
      return;
    }
    const delBtn = ev.target.closest('[data-del-period]');
    if (delBtn){
      const idx = parseInt(delBtn.getAttribute('data-del-period'), 10);
      const st = getState();
      const ps = (st.heizung.perioden || []).slice();
      ps.splice(idx, 1);
      if (ps.length === 0) ps.push({ id: 'p0', energy: 'erdgas', von: '', bis: '', menge: 0, etaPreset: 'brennwert', etaValue: '' });
      _set('heizung.perioden', ps);
      return;
    }
    // S4 — Räume hinzufügen
    const addRoom = ev.target.closest('#btnAddRoom');
    if (addRoom){
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).slice();
      rs.push({
        name: '', A: 0, l: 0, b: 0, h: (st.objekt && st.objekt.geschosshoehe) || 2.5,
        beheizt: true, theta_int: 20,
        bauteile: [
          { typ: 'wand',    A: 0, u: '', fRT: 1.0 },
          { typ: 'fenster', A: 0, u: '', fRT: 1.0 }
        ]
      });
      _set('detail.raeume', rs);
      return;
    }
    const delRoom = ev.target.closest('[data-del-room]');
    if (delRoom){
      const idx = parseInt(delRoom.getAttribute('data-del-room'), 10);
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).slice();
      rs.splice(idx, 1);
      _set('detail.raeume', rs);
      return;
    }
    const addBt = ev.target.closest('[data-add-bauteil]');
    if (addBt){
      const idx = parseInt(addBt.getAttribute('data-add-bauteil'), 10);
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).map(r => Object.assign({}, r, { bauteile: (r.bauteile || []).slice() }));
      if (!rs[idx]) return;
      rs[idx].bauteile.push({ typ: 'wand', A: 0, u: '', fRT: 1.0 });
      _set('detail.raeume', rs);
      return;
    }
    const delBt = ev.target.closest('[data-del-bauteil]');
    if (delBt){
      const parts = delBt.getAttribute('data-del-bauteil').split('-').map(n => parseInt(n,10));
      const ri = parts[0], bi = parts[1];
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).map(r => Object.assign({}, r, { bauteile: (r.bauteile || []).slice() }));
      if (!rs[ri]) return;
      rs[ri].bauteile.splice(bi, 1);
      _set('detail.raeume', rs);
      return;
    }
    // S5 — Heizkreis hinzufügen / löschen
    const addKreis = ev.target.closest('#btnAddKreis');
    if (addKreis){
      const st = getState();
      const ks = ((st.detail && st.detail.verteilung && st.detail.verteilung.heizkreise) || []).slice();
      const num = ks.length + 1;
      ks.push({ id: 'k' + num, name: 'Heizkreis ' + num });
      _set('detail.verteilung.heizkreise', ks);
      return;
    }
    const delKreis = ev.target.closest('[data-del-kreis]');
    if (delKreis){
      const idx = parseInt(delKreis.getAttribute('data-del-kreis'), 10);
      const st = getState();
      const ks = ((st.detail && st.detail.verteilung && st.detail.verteilung.heizkreise) || []).slice();
      ks.splice(idx, 1);
      if (ks.length === 0) ks.push({ id: 'k1', name: 'Heizkreis 1' });
      _set('detail.verteilung.heizkreise', ks);
      return;
    }
    // S5 — Heizfläche pro Raum hinzufügen / löschen
    const addHf = ev.target.closest('[data-add-hf]');
    if (addHf){
      const idx = parseInt(addHf.getAttribute('data-add-hf'), 10);
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).map(r => Object.assign({}, r, { heizflaechen: ((r.heizflaechen) || []).slice() }));
      if (!rs[idx]) return;
      const kreis_id = ((st.detail && st.detail.verteilung && st.detail.verteilung.heizkreise) || [{id:'k1'}])[0].id;
      rs[idx].heizflaechen.push({ typ: 'fbh', A: 0, kreis_id });
      _set('detail.raeume', rs);
      return;
    }
    const delHf = ev.target.closest('[data-del-hf]');
    if (delHf){
      const parts = delHf.getAttribute('data-del-hf').split('-').map(n => parseInt(n,10));
      const ri = parts[0], hi = parts[1];
      const st = getState();
      const rs = (st.detail && st.detail.raeume || []).map(r => Object.assign({}, r, { heizflaechen: ((r.heizflaechen) || []).slice() }));
      if (!rs[ri]) return;
      rs[ri].heizflaechen.splice(hi, 1);
      _set('detail.raeume', rs);
      return;
    }
    // S5 — WP auswählen / entfernen
    const pickWp = ev.target.closest('[data-pick-wp]');
    if (pickWp){
      const id = pickWp.getAttribute('data-pick-wp');
      const st = getState();
      const cur = (st.geraet && st.geraet.gewaehlt_id) || null;
      _set('geraet.gewaehlt_id', cur === id ? null : id);
      return;
    }
    const unselWp = ev.target.closest('#btnUnselectWp');
    if (unselWp){
      _set('geraet.gewaehlt_id', null);
      return;
    }
  });

  stepperEl.addEventListener('click', (ev) => {
    const btn = ev.target.closest('[data-step]');
    if (!btn) return;
    const id = btn.getAttribute('data-step');
    const target = document.getElementById(id);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

function onInputChange(ev){
  const el = ev.target;
  if (!el || !el.dataset || !el.dataset.path) return;
  const path = el.dataset.path;
  let value;
  if (el.type === 'checkbox') value = el.checked;
  else if (el.type === 'radio') {
    if (!el.checked) return;
    value = el.value;
  }
  else if (el.type === 'number') {
    if (el.value === '') value = '';
    else value = Number(String(el.value).replace(',', '.'));
  }
  else value = el.value;
  _set(path, value);
}

function updateResult(s, c){
  setText('kpi-Qh',   fmtKW(c.Qh));
  setText('kpi-Qhl',  fmtKW(c.Qhl));
  setText('kpi-Qzus', fmtKW(c.Qw + c.Qoff));
  setText('kpi-spez', fmt(c.spez, 1));
  setText('kpi-QnWW', fmtKWh(c.QnWW));
  setText('kpi-VWSto', fmtL(c.VW_Sto));
  setText('kpi-VPSto', fmtL(c.VP_Sto));

  const primary = c.primary;
  const heroSub = primary
    ? `Methode: ${esc(primary.label)} · t<sub>voll</sub> = ${fmt(primary.tvoll, 0)} h`
    : (c.fallback ? `Schätzung aus Bauperiode (Methode aktivieren für genauere Werte)` : 'Werte eingeben für Berechnung');
  setHTML('kpi-Qh-sub', heroSub);
  setHTML('kpi-Qhl-sub', primary
    ? `aus ${fmtKWh(primary.QnH)} kWh/a · t<sub>voll</sub> ${fmt(primary.tvoll, 0)} h`
    : '—');
  setHTML('kpi-Qzus-sub', `Q<sub>w</sub> ${fmtKW(c.Qw)} + Q<sub>off</sub> ${fmtKW(c.Qoff)} kW${c.Qas > 0 ? ` (+ Q<sub>as</sub> ${fmtKW(c.Qas)})` : ''}`);

  const ampelEl = document.getElementById('kpi-ampel');
  if (ampelEl){
    const a = c.plausi || { ampel: 'grau', band: null };
    ampelEl.classList.remove('ampel--gruen', 'ampel--gelb', 'ampel--rot');
    if (a.ampel === 'gruen') ampelEl.classList.add('ampel--gruen');
    else if (a.ampel === 'gelb') ampelEl.classList.add('ampel--gelb');
    else if (a.ampel === 'rot') ampelEl.classList.add('ampel--rot');
    const label = a.band ? `${a.ampel.toUpperCase()} · Band ${a.band[0]}–${a.band[1]} W/m²` : 'kein Band';
    ampelEl.innerHTML = `<span class="ampel__dot"></span><span>${esc(label)}</span>`;
  }
}

function updateMethodStatus(s, c){
  const fmtStatus = (m, fallbackText) => {
    if (!m) return `<em style="color:var(--ink-400)">${fallbackText}</em>`;
    return `Q<sub>hl</sub> = <strong>${fmtKW(m.Qhl)} kW</strong>`;
  };
  setHTML('mA-status', fmtStatus(c.methods.verbrauch,       '— Eingaben fehlen'));
  setHTML('mB-status', fmtStatus(c.methods.betriebsstunden, '— inaktiv'));
  setHTML('mC-status', fmtStatus(c.methods.kwh,             '— inaktiv'));

  // S7-Bugfix: live sichtbar machen, was die "Verbrauch enthält WW"-Toggle aktuell bewirkt.
  // Math-konform mit FWS — wenn V_W,u = 0 hat der Toggle keinen Effekt (User merkt es).
  const hint = document.getElementById('wwDeductHint');
  if (hint){
    const m = c.methods.verbrauch;
    if (!s.heizung.verbrauchInklWW){
      hint.innerHTML = `<em>WW wird nicht abgezogen.</em>`;
    } else if (m && m.QnWW > 0){
      hint.innerHTML = `Aktuell <strong>${fmtKWh(m.QnWW)} kWh/a</strong> Warmwasser-Anteil aus dem Verbrauch abgezogen → Q<sub>n,H</sub> = ${fmtKWh(m.QnH)} kWh/a.`;
    } else if (s.heizung.verbrauchInklWW){
      hint.innerHTML = `<em style="color:var(--warn-500)">Aktuell <strong>0 kWh/a</strong> abgezogen — bitte in <a href="#sec-ww">Schritt 3 (Warmwasser)</a> Personen oder V<sub>W,u</sub> erfassen, damit der Abzug greift.</em>`;
    } else {
      hint.innerHTML = '—';
    }
  }
}

function updateHints(s, c){
  setHTML('tvollHint', computeTvollHint(s));
  const ov = Number(s.heizung.tvollOverride) || 0;
  const auto = (TVOLL_TABLE[s.objekt.lage] || TVOLL_TABLE.mittelland)[s.objekt.typ] || 2000;
  const ovHint = document.getElementById('tvollOverrideHint');
  if (ovHint) ovHint.textContent = ov > 0 ? `Aktiv: ${ov} h/a (überschreibt ${auto} h/a Lookup).` : `Leer → Lookup-Wert ${auto} h/a (${esc(s.objekt.lage)} · ${esc(s.objekt.typ.toUpperCase())}).`;

  const ww = s.warmwasser;
  const wwHintEl = document.getElementById('wwHint');
  if (wwHintEl){
    const V = ww.modus === 'personen' ? (Number(ww.personen) || 0) * (Number(ww.lProPerson) || 40) : (Number(ww.VW_u) || 0);
    if (!ww.aktiv) wwHintEl.innerHTML = `<em>WW-Berechnung deaktiviert.</em>`;
    else if (V <= 0) wwHintEl.innerHTML = `<em>V<sub>W,u</sub> eingeben für Q<sub>n,WW</sub>-Berechnung.</em>`;
    else wwHintEl.innerHTML = `Effektiv: <strong>${fmt(V,0)} l/d</strong> · Q<sub>n,WW</sub> = <strong>${fmtKWh(c.QnWW)} kWh/a</strong>`;
  }
}

function updateDetailHints(s, c){
  if (!s || !s.detail || !s.detail.aktiv) return;
  const r = resolveHuelleUWerte(s);
  for (const key of ['wand','fenster','dach','boden','tueren']){
    const hint = document.querySelector(`[data-huelle-hint="${key}"]`);
    if (!hint) continue;
    const h = r.hints[key];
    const autoTxt = (h.auto != null) ? `Auto: ${fmt(h.auto, 2)} W/(m²·K)` : 'Auto: – (Bauklasse fehlt)';
    const eff = (h.eff != null) ? fmt(h.eff, 2) : '–';
    hint.innerHTML = `${autoTxt} · effektiv: <strong>${eff}</strong>`;
  }
  setText('huelleBk', r.bauklasse || '–');

  const rs = s.detail.raeume || [];
  const A_sum = rs.reduce((sum, ro) => sum + (Number(ro.A) || (Number(ro.l)*Number(ro.b)) || 0), 0);
  const ebf = Number(s.objekt && s.objekt.ebf) || 0;
  const A_rest = Math.max(0, ebf - A_sum);
  const summary = document.getElementById('roomsSummary');
  if (summary){
    summary.innerHTML = `Σ Räume: <strong>${fmt(A_sum, 1)} m²</strong> · EBF: <strong>${fmt(ebf, 1)} m²</strong> · Restfläche: <strong>${fmt(A_rest, 1)} m²</strong> ${A_rest > 0 && (s.detail.misch && s.detail.misch.rest_global !== false) ? '(pauschal mit Global-U-Werten)' : ''}`;
  }

  const det = c && c.detail;
  if (det){
    setText('kpi-QhlNorm', fmt(det.Qhl_kW, 2));
    setText('kpi-phiR',    fmt(det.phi_raeume / 1000, 2));
    setText('kpi-phiRest', fmt(det.phi_rest / 1000, 2));
    setText('kpi-QhlFWS',  fmt(c.Qhl, 2));
    setHTML('kpi-QhlNorm-sub', `Σ Räume ${fmt(det.A_raeume, 1)} m² + Rest ${fmt(det.A_rest, 1)} m²`);
    setHTML('kpi-phiR-sub', `${rs.length} Räume`);
    setHTML('kpi-phiRest-sub', det.A_rest > 0 && (s.detail.misch && s.detail.misch.rest_global !== false) ? `pauschal · ${fmt(det.A_rest, 1)} m²` : '—');
  }
}

function updateSpeicherSection(s, c){
  const w = s.warmwasser || {};
  // WW-Speicher-Vorschlag vs. Override
  const V_vorschlag_ww = c.VW_Sto || 0;
  const V_user_ww = (w.speicher_v_user === '' || w.speicher_v_user == null) ? null : Number(w.speicher_v_user);
  const V_ww_eff = (w.speicher_aktiv === false) ? 0 : (V_user_ww > 0 ? V_user_ww : V_vorschlag_ww);
  setHTML('speicherWWHint', w.speicher_aktiv === false
    ? '<em>WW-Speicher deaktiviert.</em>'
    : (V_user_ww > 0
        ? `Override: <strong>${fmt(V_user_ww, 0)} l</strong> · Vorschlag (FWS): ${fmt(V_vorschlag_ww, 0)} l`
        : `Vorschlag (FWS §10): <strong>${fmt(V_vorschlag_ww, 0)} l</strong> — gerundet auf 10er-Schritte`));

  // Heizpuffer-Vorschlag (20 L/kW Q_h, gerundet)
  const V_vorschlag_puff = c.VP_Sto || 0;
  const V_user_pf = (w.puffer_v_user === '' || w.puffer_v_user == null) ? null : Number(w.puffer_v_user);
  const V_puffer_eff = w.puffer_aktiv ? (V_user_pf > 0 ? V_user_pf : V_vorschlag_puff) : 0;
  setHTML('pufferHint', !w.puffer_aktiv
    ? '<em>Kein separater Puffer (WP-interner Volumenstrom genügt).</em>'
    : (V_user_pf > 0
        ? `Override: <strong>${fmt(V_user_pf, 0)} l</strong> · Vorschlag: ${fmt(V_vorschlag_puff, 0)} l`
        : `Vorschlag (VDI 4645 · 20 L/kW): <strong>${fmt(V_vorschlag_puff, 0)} l</strong>`));

  // Sicherheitsventil
  const Qh = c.Qh || 0;
  const sv = sicherheitsventilEmpfehlung(Qh);
  if (sv){
    setHTML('kpi-svDN', `${esc(sv.dn)} · ${esc(sv.anschluss)}`);
    setHTML('kpi-svDN-sub', `Auslösedruck ${fmt(sv.p_ansprech_bar, 1)} bar · für Q<sub>h</sub> = ${fmt(Qh, 1)} kW`);
  } else {
    setHTML('kpi-svDN', '–');
    setHTML('kpi-svDN-sub', 'Q<sub>h</sub> eingeben für Empfehlung');
  }

  // MAG-Berechnung
  const V_speicher_im_HK = (w.puffer_aktiv ? V_puffer_eff : 0); // Pufferspeicher zählt zum Heizkreis
  const Va_user = (w.anlagenvolumen_user === '' || w.anlagenvolumen_user == null) ? null : Number(w.anlagenvolumen_user);
  const V_a = (Va_user > 0) ? Va_user : anlagenvolumenSchaetzung({ Qh_kW: Qh, V_puffer: V_speicher_im_HK });
  const mag = magVolumen({
    V_a,
    deltaT_K: 70,
    p_e: Number(w.mag_pe) || 2.5,
    p_0: Number(w.mag_p0) || 1.0
  });
  setHTML('kpi-magV', mag.V_n_markt > 0 ? fmt(mag.V_n_markt, 0) : '–');
  setHTML('kpi-magV-sub', mag.V_n > 0
    ? `Berechnet ${fmt(mag.V_n, 1)} l (V<sub>a</sub> ≈ ${fmt(V_a, 0)} l) · Wasservorlage ${fmt(mag.V_v, 1)} l`
    : esc(mag.hinweis || '—'));
}

function updateVerteilungSection(s, c){
  const det = s.detail || {};
  const vert = det.verteilung || {};
  const raeume = det.raeume || [];
  const detailLoad = c && c.detail;
  // Pro Heizfläche: Plausi-Faktor & Ampel
  const tVL = Number(vert.global?.tVL_neu) || 35;
  const tRL = Number(vert.global?.tRL_neu) || (tVL - 7);
  for (let i = 0; i < raeume.length; i++){
    const r = raeume[i] || {};
    const tInnen = Number(r.theta_int) || 20;
    const hflaechen = r.heizflaechen || [];
    const rRes = (detailLoad && detailLoad.roomResults) ? detailLoad.roomResults[i] : null;
    const phiHL = rRes ? Number(rRes.phiHL) || 0 : 0;
    // Gewichte
    const gewichte = hflaechen.map(h => {
      const ref = REF_AUSLEGUNG[h.typ];
      return (ref ? ref.q_W_pro_m2 : 0) * (Number(h.A) || 0);
    });
    const sumG = gewichte.reduce((s, g) => s + g, 0);
    let raumGruen = 0, raumTotal = 0;
    for (let j = 0; j < hflaechen.length; j++){
      const h = hflaechen[j];
      const phi_anteil = (sumG > 0) ? phiHL * (gewichte[j] / sumG) : (hflaechen.length > 0 ? phiHL / hflaechen.length : 0);
      const pl = plausibilitaetHeizflaeche({
        phiHL_raum: phi_anteil, A_heizflaeche: Number(h.A) || 0,
        typ: h.typ, tVL_neu: tVL, tRL_neu: tRL, tInnen
      });
      const span = document.querySelector(`[data-plausi-hf="${i}-${j}"]`);
      if (span){
        span.classList.remove('ampel--gruen', 'ampel--gelb', 'ampel--rot', 'ampel--grau');
        span.classList.add('ampel--' + pl.ampel);
        const lab = pl.deckungsgrad != null
          ? `${(pl.deckungsgrad * 100).toFixed(0)} %`
          : '—';
        span.innerHTML = `<span class="ampel__dot"></span><span>${lab}</span>`;
      }
      raumTotal += 1;
      if (pl.ampel === 'gruen') raumGruen += 1;
    }
    const sum = document.querySelector(`[data-plausi-raum="${i}"]`);
    if (sum){
      if (raumTotal === 0){
        sum.innerHTML = `<em>Keine Heizfläche zugeordnet — Φ<sub>HL</sub> = ${fmt(phiHL, 0)} W</em>`;
      } else {
        const ok = raumGruen === raumTotal;
        const partial = raumGruen > 0;
        const tag = ok ? 'OK' : (partial ? 'teilweise' : 'unzureichend');
        sum.innerHTML = `Φ<sub>HL</sub> Raum = <strong>${fmt(phiHL, 0)} W</strong> · ${raumGruen}/${raumTotal} Heizflächen grün <em>(${tag})</em>`;
      }
    }
  }
  // Globaler Hinweis (wenn keine Räume)
  const ghint = document.getElementById('verteilungGlobalHint');
  if (ghint){
    if (raeume.length === 0){
      const f = leistungsFaktor({ typ: vert.global?.typ || 'fbh', tVL, tRL, tInnen: 20 });
      const ref = REF_AUSLEGUNG[vert.global?.typ || 'fbh'];
      if (f != null){
        ghint.innerHTML = `Auslegung relativ zur Norm (${esc(vert.global?.typ || 'fbh')} bei ${ref.tVL}/${ref.tRL}): <strong>${(f*100).toFixed(0)} %</strong>. Bei niedrigem Faktor ist eine grössere Heizfläche oder höhere VL erforderlich.`;
      } else {
        ghint.innerHTML = '<em>Vorlauf/Rücklauf prüfen.</em>';
      }
    } else {
      ghint.innerHTML = '';
    }
  }
}

function updateGeraetSection(s, c){
  const ger = s.geraet || {};
  const flt = ger.filter || {};
  const Qh = c.Qh || 0;
  const tVL = Number(s?.objekt?.tVLMaxHeizung) || 0;
  const liste = filterWp(_wpDb, {
    Qh_kw: Qh, toleranz_proz: flt.toleranz_proz || 20,
    tVL_max: tVL, aufstellung: flt.aufstellung || 'alle',
    schallklasse_max: flt.schallklasse_max || 0
  });
  const hint = document.getElementById('wpFilterHint');
  if (hint){
    if (Qh <= 0){
      hint.innerHTML = '<em>Q<sub>h</sub> aus Heizlast-Berechnung erforderlich.</em>';
    } else {
      hint.innerHTML = `Q<sub>h</sub> = <strong>${fmt(Qh, 1)} kW</strong> · ±${flt.toleranz_proz || 20} % · ${liste.length} Treffer`;
    }
  }
  const list = document.getElementById('wpListe');
  if (list){
    if (liste.length === 0){
      list.innerHTML = `<p class="field__hint">Keine WP im Filter — Toleranz erhöhen oder Schallpegel anpassen.</p>`;
    } else {
      list.innerHTML = liste.slice(0, 12).map(wp => renderWpCard(wp, ger.gewaehlt_id, Qh)).join('');
    }
  }
  // Ausgewähltes Gerät
  const sel = (ger.gewaehlt_id && _wpDb.find(w => (w.ID || w._id) === ger.gewaehlt_id)) || null;
  const block = document.getElementById('wpSelectedBlock');
  const detail = document.getElementById('wpSelected');
  if (block && detail){
    block.hidden = !sel;
    if (sel) detail.innerHTML = renderWpDetail(sel, Qh, c);
  }
}

function updateFoerderung(s, c){
  const list = document.getElementById('foerderListe');
  const hint = document.getElementById('foerderFilterHint');
  const total = document.getElementById('foerderTotal');
  if (!list) return;
  const p = s.projekt || {};
  const kanton = (p.kanton || '').toUpperCase();
  const massnahme = p.massnahme || 'heizungsersatz';
  const wp_quelle = p.wp_quelle || 'luft';

  if (hint){
    const labelMass = (MASSNAHMEN.find(([k]) => k === massnahme) || [massnahme, massnahme])[1];
    const labelKan  = kanton ? `Kanton ${kanton}` : '<em>(Kanton fehlt)</em>';
    hint.innerHTML = `${labelKan} · Massnahme: <strong>${esc(labelMass)}</strong>${massnahme === 'heizungsersatz' ? ` · WP-Quelle: <strong>${esc((WP_QUELLEN.find(([k])=>k===wp_quelle)||[wp_quelle,wp_quelle])[1])}</strong>` : ''}`;
  }

  if (!_foerderDb){
    list.innerHTML = `<p class="field__hint"><em>Förder-Datenbank nicht geladen — bitte Tool über Webserver öffnen (file:// Fetch wird vom Browser blockiert).</em></p>`;
    if (total) total.textContent = '—';
    return;
  }
  if (!kanton){
    list.innerHTML = `<p class="field__hint">Bitte <strong>Kanton</strong> in den Stammdaten wählen — Liste wird automatisch gefiltert.</p>`;
    if (total) total.textContent = '—';
    return;
  }

  const programme = filterFoerderungen(_foerderDb, { kanton, massnahme, wp_quelle });
  if (programme.length === 0){
    list.innerHTML = `<p class="field__hint">Für Kanton <strong>${esc(kanton)}</strong> und Massnahme <strong>${esc(massnahme)}</strong> sind in der aktuellen Datenbank keine Programme erfasst. Bundesprogramme prüfen — manche Massnahmen werden ausschliesslich kantonal gefördert.</p>`;
    if (total) total.textContent = '—';
    return;
  }

  // Kontext für Beträge — konservativ
  const kontext = {
    Qh_kW: Number(c?.Qh) || 0,
    A_bauteil_m2: 0, // unbekannt — Schätzung nur sinnvoll bei explizitem Eingabe-Wert
    kollektor_m2: 0,
    kWp: 0
  };
  const grouped = gruppiereProgramme(programme, kontext);

  const renderProg = (prog) => {
    const betragGesch = schaetzeBetrag(prog, kontext);
    const ebeneClass = prog.ebene === 'Bund' ? 'foerder-card--bund' : 'foerder-card--kanton';
    const tags = (prog.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    const geschaetztTxt = (betragGesch != null && betragGesch > 0)
      ? `<div class="foerder-card__schaetz">≈ <strong>CHF ${fmt(betragGesch, 0)}</strong> bei Q<sub>h</sub> ${fmt(kontext.Qh_kW, 1)} kW (Richtwert)</div>`
      : '';
    return `
      <article class="foerder-card ${ebeneClass}">
        <header class="foerder-card__head">
          <span class="foerder-card__ebene">${esc(prog.ebene || '')}</span>
          <h4 class="foerder-card__name">${esc(prog.name)}</h4>
          <div class="foerder-card__tags">${tags}</div>
        </header>
        <div class="foerder-card__betrag"><strong>${esc(prog.betrag_text || '—')}</strong></div>
        ${geschaetztTxt}
        <p class="foerder-card__bedingung">${esc(prog.bedingungen || '')}</p>
        <div class="foerder-card__foot">
          ${prog.kombinierbar ? '<span class="badge badge--kombi">kombinierbar</span>' : '<span class="badge badge--solo">nicht kombinierbar</span>'}
          <a class="foerder-card__link" href="${escAttr(prog.antrag_link || '#')}" target="_blank" rel="noopener">Antrag öffnen ↗</a>
        </div>
      </article>`;
  };

  const bundHtml = grouped.bund.length
    ? `<div class="foerder-group"><h3 class="foerder-group__title">Bund</h3>${grouped.bund.map(renderProg).join('')}</div>` : '';
  const kantonHtml = grouped.kanton.length
    ? `<div class="foerder-group"><h3 class="foerder-group__title">Kanton ${esc(kanton)}</h3>${grouped.kanton.map(renderProg).join('')}</div>` : '';
  list.innerHTML = bundHtml + kantonHtml;

  if (total){
    if (grouped.total_geschaetzt != null){
      total.innerHTML = `<strong>Geschätzte kombinierte Fördersumme:</strong> ≈ CHF ${fmt(grouped.total_geschaetzt, 0)} (Richtwert, ohne Gewähr — Q<sub>h</sub> = ${fmt(kontext.Qh_kW, 1)} kW).`;
    } else {
      total.innerHTML = `${programme.length} Programm${programme.length === 1 ? '' : 'e'} gefunden — Beträge teilweise als Pauschale, exakter Wert hängt von Bauteilfläche / Anlage ab.`;
    }
  }
}

function updateBaubewilligung(s){
  const block = document.getElementById('baubewilligungBlock');
  const hint  = document.getElementById('baubewilligungHint');
  if (!block) return;
  const p = s.projekt || {};
  const kanton = (p.kanton || '').toUpperCase();

  if (!_bauDb){
    block.innerHTML = `<p class="field__hint"><em>Bewilligungs-Datenbank nicht geladen — bitte Tool über Webserver öffnen.</em></p>`;
    return;
  }
  if (!kanton){
    block.innerHTML = `<p class="field__hint">Kanton in den Stammdaten wählen — kantonale Auflagen erscheinen automatisch.</p>`;
    return;
  }
  const k = lookupBaubewilligung(_bauDb, kanton);
  if (!k){
    block.innerHTML = `<p class="field__hint">Für Kanton <strong>${esc(kanton)}</strong> ist in der Datenbank noch kein Eintrag erfasst — bitte direkt beim kantonalen Energieamt nachfragen.</p>`;
    return;
  }
  const he = k.heizungsersatz || {};
  const es = k.erdsonden || {};
  const lw = k.lwwp_aussen || {};
  const massnahme = p.massnahme || 'heizungsersatz';

  // Hauptbox: Heizungsersatz-Hinweis prominent, wenn aktive Massnahme
  const heMain = (massnahme === 'heizungsersatz') ? `
    <div class="bewilligung-box bewilligung-box--prim">
      <div class="bewilligung-box__head">
        <span class="bewilligung-box__icon">⚖</span>
        <strong>Heizungsersatz in Kanton ${esc(k.kanton_name || kanton)}</strong>
        <span class="bewilligung-pill ${he.bewilligungspflichtig ? 'bewilligung-pill--ja' : 'bewilligung-pill--nein'}">
          ${he.bewilligungspflichtig ? 'Bewilligungspflichtig' : 'Meldepflichtig'}
        </span>
      </div>
      <p>${esc(he.kurz || '')}</p>
      ${he.details ? `<p class="bewilligung-box__details">${esc(he.details)}</p>` : ''}
      ${he.frist  ? `<p class="bewilligung-box__frist"><strong>Frist:</strong> ${esc(he.frist)}</p>` : ''}
      ${infoBox('baubewilligung.zh', 'Was bedeutet das konkret?')}
    </div>` : '';

  const luftBox = (massnahme === 'heizungsersatz' && (p.wp_quelle === 'luft' || !p.wp_quelle)) ? `
    <div class="bewilligung-box">
      <div class="bewilligung-box__head"><span class="bewilligung-box__icon">🔇</span><strong>Luft/Wasser-WP — Aussenaufstellung</strong></div>
      <p>${esc(lw.details || 'Schallnachweis nach LSV erforderlich.')}</p>
      ${infoBox('baubewilligung.lwwp', 'LSV-Hintergrund')}
    </div>` : '';

  const erdBox = (massnahme === 'heizungsersatz' && (p.wp_quelle === 'sole')) ? `
    <div class="bewilligung-box">
      <div class="bewilligung-box__head"><span class="bewilligung-box__icon">⛏</span><strong>Erdsonde — Bohrung</strong> ${es.bewilligungspflichtig ? '<span class="bewilligung-pill bewilligung-pill--ja">Bewilligungspflichtig</span>' : ''}</div>
      <p>${esc(es.details || '')}</p>
    </div>` : '';

  // Wenn andere Massnahme: kurzer Allg.-Hinweis
  const allgemein = (massnahme !== 'heizungsersatz') ? `
    <div class="bewilligung-box">
      <div class="bewilligung-box__head"><strong>Kanton ${esc(k.kanton_name || kanton)} — Allgemein</strong></div>
      <p>Die meisten Sanierungs-Massnahmen sind in CH bewilligungs- oder mindestens meldepflichtig.
      Konkrete Vorgaben hängen von Massnahme + Gemeinde ab — vor Baubeginn beim
      <a href="${escAttr(k.portal || '#')}" target="_blank" rel="noopener">${esc(k.portal_label || 'Bauamt')}</a> abklären.</p>
    </div>` : '';

  block.innerHTML = `
    ${heMain}
    ${luftBox}
    ${erdBox}
    ${allgemein}
    <div class="bewilligung-foot">
      <a class="bewilligung-portal" href="${escAttr(k.portal || '#')}" target="_blank" rel="noopener">${esc(k.portal_label || 'Kantonales Portal')} ↗</a>
      ${k.energieportal ? `<a class="bewilligung-portal" href="${escAttr(k.energieportal)}" target="_blank" rel="noopener">Energie-Förderportal ↗</a>` : ''}
      ${k.kontakt ? `<span class="bewilligung-kontakt">${esc(k.kontakt)}</span>` : ''}
    </div>`;
}

function updateCockpit(s, c){
  if (!s?.detail?.aktiv) return;
  const det = c && c.detail;
  const Qhl_norm_kW = det ? (Number(det.Qhl_kW) || 0) : 0;
  const Qhl_fws_kW = Number(c?.Qhl) || 0;

  // Vergleich Norm vs. FWS (pure helper)
  const v = vergleichNormVerbrauch(Qhl_norm_kW, Qhl_fws_kW);
  const abw = v.abweichung_proz;
  const ampelKlasse = v.ampel;
  let hinweis;
  if (abw == null){
    if (Qhl_norm_kW <= 0) hinweis = 'Norm-Heizlast noch 0 — bitte Hülle und Räume eingeben.';
    else if (Qhl_fws_kW <= 0) hinweis = 'FWS-Heizlast noch 0 — bitte Verbrauchs-Methode in Schritt 2 aktivieren.';
    else hinweis = v.hinweis;
  } else {
    hinweis = (ampelKlasse === 'gruen')
      ? v.hinweis
      : `${v.hinweis} (Abweichung ${fmt(abw, 1)} %)`;
  }

  setText('kpi-vergleichProz', abw == null ? '–' : fmt(abw, 1));
  const ampelEl = document.getElementById('kpi-vergleichAmpel');

    if (ampelKlasse !== 'grau') ampelEl.classList.add('ampel--' + ampelKlasse);
    const lbl = abw == null ? '— Werte fehlen' : (ampelKlasse === 'gruen' ? 'OK' : ampelKlasse === 'gelb' ? 'Prüfen' : 'Konflikt');
    ampelEl.innerHTML = `<span class="ampel__dot"></span><span>${esc(lbl)}</span>`;
  }
  setText('kpi-QnWW2', fmtKWh(c.QnWW));
  setHTML('kpi-QnWW2-sub', `${fmt((c.QnWW||0)/365, 1)} kWh/Tag · Q<sub>w</sub> = ${fmt(c.Qw, 2)} kW`);
  setText('kpi-Qh2', fmt(c.Qh, 2));
  setHTML('kpi-Qh2-sub', `Q<sub>hl</sub> ${fmt(c.Qhl, 2)} + Q<sub>w</sub> ${fmt(c.Qw, 2)} + Q<sub>off</sub> ${fmt(c.Qoff, 2)} kW`);
  setText('kpi-Vstos', `${fmtL(c.VW_Sto)} / ${fmtL(c.VP_Sto)}`);

  setHTML('detailHint', hinweis);

  // WP-Block
  const wpBlock = document.getElementById('cockpitWp');
  const wpHint = document.getElementById('cockpitWpHint');
  if (wpBlock){
    const ger = s.geraet || {};
    const sel = (ger.gewaehlt_id && _wpDb.find(w => (w.ID || w._id) === ger.gewaehlt_id)) || null;
    if (!sel){
      wpBlock.innerHTML = `<p class="field__hint">In Schritt 9 (Gerät) eine WP wählen — Eckwerte werden hier angezeigt.</p>`;
      if (wpHint) wpHint.textContent = 'noch nicht gewählt';
    } else {
      const Qn = nennleistungA7W35(sel) || 0;
      const tVL = maxVorlauf(sel) || '—';
      const auf = wpAufstellung(sel) || '—';
      const sch = wpSchallTag(sel);
      const cop = copA2W35(sel);
      const ratio = (c.Qh > 0 && Qn > 0) ? (Qn / c.Qh) : null;
      const ratioCls = ratio == null ? 'grau' : (ratio >= 0.75 && ratio <= 1.20 ? 'gruen' : ratio < 0.75 ? 'rot' : 'gelb');
      wpBlock.innerHTML = `
        <div class="cockpit-wp__row">

function filterWp(db, k){
  const list = Array.isArray(db) ? db : [];
  const Qh = Number(k.Qh_kw) || 0;
  const tol = (Number(k.toleranz_proz) || 20) / 100;
  const tVL = Number(k.tVL_max) || 0;
  const auf = k.aufstellung && k.aufstellung !== 'alle' ? k.aufstellung : null;
  const schall = Number(k.schallklasse_max) || 0;
  const out = list.filter(wp => {
    const Q = nennleistungA7W35(wp);
    if (Qh > 0){
      const Qmin = Qh * (1 - tol);
      const Qmax = Qh * (1 + tol);
      if (Q < Qmin || Q > Qmax) return false;
    }
    if (tVL > 0){
      const m = maxVorlauf(wp);
      if (m > 0 && m < tVL) return false;
    }
    if (auf){
      const a = wpAufstellung(wp);
      if (a && a !== auf) return false;
    }
    if (schall > 0){
      const sd = wpSchallTag(wp);
      if (sd != null && sd > schall) return false;
    }
    return true;
  });
  out.sort((a, b) => Math.abs(nennleistungA7W35(a) - Qh) - Math.abs(nennleistungA7W35(b) - Qh));
  return out;
}

function initActiveStepObserver(stepperEl){
  const targets = STEPS.map(s => document.getElementById(s.id)).filter(Boolean);
  if (!targets.length) return;
  const obs = new IntersectionObserver(entries => {
    let bestEntry = null;
    entries.forEach(e => {
      if (e.isIntersecting && (!bestEntry || e.intersectionRatio > bestEntry.intersectionRatio)) bestEntry = e;
    });
    if (bestEntry){
      const id = bestEntry.target.id;
      stepperEl.querySelectorAll('.step').forEach(b => {
        b.classList.toggle('is-active', b.getAttribute('data-step') === id);
      });
    }
  }, { rootMargin: '-30% 0px -60% 0px', threshold: [0, 0.25, 0.5, 0.75, 1] });
  targets.forEach(t => obs.observe(t));
  stepperEl.querySelector('.step') && stepperEl.querySelector('.step').classList.add('is-active');
}

(function(){
// src/persistence.mjs
// Session 7 — localStorage + Cloud-Sync (FWS-Endpoints) + Auth.
// Pattern (übernommen aus public/heizlast/index.html, FWS-Single-File):
//   * STORAGE_KEY hält Liste {meta, state}-Hüllen.
//   * ACTIVE_KEY hält das aktuell geladene Projekt (gleiche Hülle).
//   * Cloud-Backend: POST /api/heizlast-projects (UPSERT D1) +
//                    GET /api/heizlast-projects (Liste) +
//                    GET ?id=…  (Einzelladen) +
//                    DELETE ?id=… (Hard-Delete).
//   * Auth: POST /api/heizlast-auth (Login) · DELETE (Logout) · GET (Probe).
//   * Mirror-Flag (meta.cloudMirror = true) markiert lokale Kopien einer
//     Cloud-Version → Drift-Cleanup beim Fetch entfernt verwaiste Spiegel.
//   * Auto-Sync: visibilitychange + focus.
//
// Bewusst frei von DOM-Zugriff abgesehen von Browser-Globals
// (localStorage, window, fetch, document.visibilityState).
// UI-Toast wird über onToast-Callback nach aussen gereicht.

   Konstanten
   ====================================================== */
const STORAGE_KEY = 'thermowerk-heizlasttool-projects-v1';
const ACTIVE_KEY  = 'thermowerk-heizlasttool-active-v1';
const AUTH_PROBE_URL = '/api/heizlast-auth';
const PROJECTS_URL   = '/api/heizlast-projects';

/* ======================================================
   Module-State
   ====================================================== */
let _isAuthenticated = false;
let _cloudProjects   = [];
let _activeMeta      = freshMeta();
let _onToast         = null; // (msg:string) => void
let _onAuthChange    = null; // (authed:bool) => void
let _onProjectsChange= null; // () => void
let _onLoaded        = null; // (state) => void  (für UI-Refresh)

/* ======================================================
   Helpers
   ====================================================== */
function uuid(){
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'x' + Date.now().toString(16) + '-' + Math.random().toString(36).slice(2, 10);
}

function freshMeta(){
  const t = Date.now();
  return { id: uuid(), name: 'Neues Projekt', created: t, updated: t };
}

function toast(msg){
  if (typeof _onToast === 'function') {
    try { _onToast(msg); } catch(_) {}
  } else if (typeof console !== 'undefined') {
    console.log('[heizlast]', msg);
  }
}

function safeNum(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

/* ======================================================
   localStorage I/O
   ====================================================== */
function listProjects(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch(e){ return []; }
}

function writeProjects(arr){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.isArray(arr) ? arr : [])); }
  catch(e){ /* Quota etc. — leise */ }
}

function markLocalAsCloudMirror(id){
  if (!id) return;
  const arr = listProjects();
  const i = arr.findIndex(p => p && p.meta && p.meta.id === id);
  if (i < 0) return;
  arr[i].meta = arr[i].meta || {};
  if (arr[i].meta.cloudMirror === true) return;
  arr[i].meta.cloudMirror = true;
  writeProjects(arr);
}

/* ======================================================
   Active-Projekt (das gerade geladene)
   ====================================================== */
function getActiveMeta(){ return _activeMeta; }

function setActiveMeta(meta){
  _activeMeta = Object.assign(freshMeta(), meta || {});
}

function saveActive(){
  try {
    const env = { meta: _activeMeta, state: getState() };
    localStorage.setItem(ACTIVE_KEY, JSON.stringify(env));
  } catch(e){}
}

function loadActive(){
  try {
    const raw = localStorage.getItem(ACTIVE_KEY);
    if (!raw) return false;
    const env = JSON.parse(raw);
    if (!env || !env.state) return false;
    _activeMeta = Object.assign(freshMeta(), env.meta || {});
    setState(deepMerge(freshState(), env.state));
    return true;
  } catch(e){ return false; }
}

/* ======================================================
   Projekte: speichern / laden / löschen / neu
   ====================================================== */
async function saveProject(){
  const arr = listProjects();
  const meta = Object.assign({}, _activeMeta);
  meta.updated = Date.now();
  const env = { meta, state: deepClone(getState()) };
  const i = arr.findIndex(p => p && p.meta && p.meta.id === meta.id);
  if (i >= 0) arr[i] = env; else arr.push(env);
  writeProjects(arr);
  _activeMeta = meta;
  saveActive();
  if (_isAuthenticated){
    const ok = await cloudSave(false);
    if (ok) markLocalAsCloudMirror(meta.id);
    toast(ok ? 'Projekt gespeichert (lokal + Cloud).' : 'Lokal gespeichert (Cloud fehlgeschlagen).');
  } else {
    toast('Projekt lokal gespeichert.');
  }
  if (typeof _onProjectsChange === 'function') _onProjectsChange();

function loadProjectLocal(id){
  const arr = listProjects();
  const env = arr.find(p => p && p.meta && p.meta.id === id);
  if (!env) { toast('Projekt nicht gefunden.'); return false; }
  _activeMeta = Object.assign(freshMeta(), env.meta || {});
  const next = deepMerge(freshState(), env.state || {});
  setState(next);
  saveActive();
  if (typeof _onLoaded === 'function') _onLoaded(getState());
  toast('Projekt geladen.');
  return true;
}

function deleteProjectLocal(id){
  const arr = listProjects().filter(p => !(p && p.meta && p.meta.id === id));
  writeProjects(arr);
  if (typeof _onProjectsChange === 'function') _onProjectsChange();
}

function duplicateProjectLocal(id){
  const arr = listProjects();
  const src = arr.find(p => p && p.meta && p.meta.id === id);
  if (!src) return null;
  const newMeta = Object.assign({}, src.meta, {
    id: uuid(),
    name: (src.meta.name || 'Projekt') + ' (Kopie)',
    created: Date.now(),
    updated: Date.now(),
    cloudMirror: false
  });
  const env = { meta: newMeta, state: deepClone(src.state || {}) };
  arr.push(env);
  writeProjects(arr);
  if (typeof _onProjectsChange === 'function') _onProjectsChange();
  return newMeta.id;
}

function resetActive(){
  _activeMeta = freshMeta();
  setState(freshState());
  try { localStorage.removeItem(ACTIVE_KEY); } catch(e){}
  if (typeof _onLoaded === 'function') _onLoaded(getState());
  toast('Zurückgesetzt.');

function setActiveName(name){

/* ======================================================
   Cloud-Sync: Auth
   ====================================================== */
function isAuthed(){ return _isAuthenticated; }

async function probeAuth(){
  try {
    const r = await fetch(AUTH_PROBE_URL, { credentials: 'same-origin' });
    if (!r.ok){ _setAuth(false); return false; }
    const j = await r.json().catch(()=>({ authed:false }));
    const auth = !!j.authed;
    _setAuth(auth);
    if (auth) await cloudList().catch(()=>{});
    return auth;
  } catch(e){
    _setAuth(false);
    return false;
  }
}

async function doLogin(password){
  try {
    const r = await fetch(AUTH_PROBE_URL, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const j = await r.json().catch(()=>({}));
    if (!r.ok || !j.success){
      return { ok: false, error: j.error || 'Anmeldung fehlgeschlagen.' };
    }
    _setAuth(true);
    toast('Angemeldet.');
    await cloudList().catch(()=>{});
    return { ok: true };
  } catch(e){
    return { ok: false, error: 'Verbindung fehlgeschlagen.' };
  }
}

async function doLogout(){
  try {
    await fetch(AUTH_PROBE_URL, { method: 'DELETE', credentials: 'same-origin' });
  } catch(e){}
  _setAuth(false);
  _cloudProjects = [];
  if (typeof _onProjectsChange === 'function') _onProjectsChange();
  toast('Abgemeldet.');
}

function _setAuth(authed){
  const changed = (_isAuthenticated !== !!authed);
  _isAuthenticated = !!authed;
  if (changed && typeof _onAuthChange === 'function') {
    try { _onAuthChange(_isAuthenticated); } catch(_){}
  }
}

/* ======================================================
   Cloud-Sync: Projekte
   ====================================================== */
function getCloudProjects(){ return _cloudProjects; }

function buildProjectPayload(state, calc){
  const meta = _activeMeta;
  const projekt = state.projekt || {};
  const objekt  = state.objekt  || {};
  const plzOrt  = [projekt.plz, projekt.ort].filter(Boolean).join(' ');
  const addr    = [projekt.strasse, plzOrt].filter(Boolean).join(', ');
  const projName = projekt.name || meta.name || 'Unbenanntes Projekt';
  return {
    id: meta.id,
    projectName:  projName,
    customerName: projekt.bauherrschaft || '',
    address:      addr,
    qhl: calc && Number.isFinite(calc.Qhl) ? +calc.Qhl.toFixed(3) : 0,
    qh:  calc && Number.isFinite(calc.Qh)  ? +calc.Qh.toFixed(3)  : 0,
    ebf: safeNum(objekt.ebf),
    stateJson: JSON.stringify(state),
    status: 'offen',
    notes:  projekt.notizen || '',
    createdAt: meta.created ? new Date(meta.created).toISOString() : undefined
  };
}

async function cloudList(){
  if (!_isAuthenticated){ _cloudProjects = []; return []; }
  try {
    const r = await fetch(PROJECTS_URL, { credentials: 'same-origin' });
    if (r.status === 401){ _setAuth(false); _cloudProjects = []; return []; }
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    _cloudProjects = Array.isArray(j.projects) ? j.projects : [];

    // Drift-Cleanup: lokale Mirror-Einträge entfernen, die nicht mehr in Cloud sind.
    const cloudIds = new Set(_cloudProjects.map(p => p._id));
    const locals = listProjects();
    const remaining = locals.filter(p =>
      !(p && p.meta && p.meta.cloudMirror === true && !cloudIds.has(p.meta.id))
    );
    if (remaining.length !== locals.length){
      writeProjects(remaining);
    }
    if (typeof _onProjectsChange === 'function') _onProjectsChange();
    return _cloudProjects;
  } catch(e){
    toast('Cloud-Liste konnte nicht geladen werden.');
    return [];
  }
}

async function cloudSave(asNew, calc){
  if (!_isAuthenticated) return false;
  if (asNew){
    _activeMeta = freshMeta();
    saveActive();
  }
  try {
    const payload = buildProjectPayload(getState(), calc || null);
    const r = await fetch(PROJECTS_URL, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (r.status === 401){
      _setAuth(false);
      toast('Sitzung abgelaufen — erneut anmelden.');
      return false;
    }
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json().catch(()=>({}));
    if (j.id && j.id !== _activeMeta.id){
      _activeMeta.id = j.id;
      saveActive();
    }
    await cloudList().catch(()=>{});
    return true;
  } catch(e){
    toast('Cloud-Speichern fehlgeschlagen.');
    return false;
  }
}

async function cloudLoad(id){
  if (!_isAuthenticated) return false;
  try {
    const r = await fetch(PROJECTS_URL + '?id=' + encodeURIComponent(id), { credentials: 'same-origin' });
    if (r.status === 401){ _setAuth(false); toast('Sitzung abgelaufen.'); return false; }
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    const p = j.project;
    if (!p || !p.stateJson){ toast('Projekt ohne Zustand — nicht ladbar.'); return false; }
    let loaded;
    try { loaded = JSON.parse(p.stateJson); } catch(e){ toast('Projekt-Daten beschädigt.'); return false; }
    _activeMeta = {
      id:      p._id || uuid(),
      name:    p.projectName || 'Cloud-Projekt',
      created: p.createdAt ? Date.parse(p.createdAt) : Date.now(),
      updated: p.updatedAt ? Date.parse(p.updatedAt) : Date.now(),
      cloudMirror: true
    };
    setState(deepMerge(freshState(), loaded));
    saveActive();
    // Lokalen Mirror persistieren (damit er bei Drift-Cleanup nicht entfernt wird).
    const arr = listProjects();
    const i = arr.findIndex(x => x && x.meta && x.meta.id === _activeMeta.id);
    const env = { meta: Object.assign({}, _activeMeta), state: deepClone(getState()) };
    if (i >= 0) arr[i] = env; else arr.push(env);
    writeProjects(arr);
    if (typeof _onLoaded === 'function') _onLoaded(getState());
    if (typeof _onProjectsChange === 'function') _onProjectsChange();
    toast('Cloud-Projekt geladen.');
    return true;
  } catch(e){
    toast('Cloud-Laden fehlgeschlagen.');
    return false;
  }
}

async function cloudDelete(id){
  if (!_isAuthenticated) return false;
  try {
    const r = await fetch(PROJECTS_URL + '?id=' + encodeURIComponent(id), {
      method: 'DELETE',
      credentials: 'same-origin'
    });
    if (r.status === 401){ _setAuth(false); return false; }
    if (!r.ok) throw new Error('HTTP '+r.status);
    _cloudProjects = _cloudProjects.filter(p => p._id !== id);
    // Asymmetrisch: Cloud-Delete entfernt auch lokalen Eintrag mit gleicher ID.
    const localArr = listProjects();
    const filtered = localArr.filter(p => !(p && p.meta && p.meta.id === id));
    let alsoLocal = false;
    if (filtered.length < localArr.length){
      writeProjects(filtered);
      alsoLocal = true;
    }
    if (typeof _onProjectsChange === 'function') _onProjectsChange();
    toast(alsoLocal ? 'Projekt gelöscht (Cloud + lokal).' : 'Cloud-Projekt gelöscht.');
    return true;
  } catch(e){
    toast('Cloud-Löschen fehlgeschlagen.');
    return false;
  }
}

/* ======================================================
   Konsolidierte Liste (Lokal + Cloud, ohne Doppel)
   ====================================================== */
function consolidatedProjects(){
  // Match über meta.id ⇔ _id. Wenn Mirror-Eintrag lokal vorhanden, zeigen wir
  // nur den Cloud-Eintrag (ist hochstand). Reine Cloud-Einträge ohne lokalen
  // Mirror erscheinen ebenfalls. Reine Lokal-Einträge bleiben mit Lokal-Badge.
  const cloud = _cloudProjects.slice();
  const cloudIds = new Set(cloud.map(p => p._id));
  const locals = listProjects();

  const out = [];
  cloud.forEach(p => {
    out.push({
      id: p._id,
      name: p.projectName || '(ohne Name)',
      customer: p.customerName || '',
      address: p.address || '',
      qhl: p.qhl, qh: p.qh, ebf: p.ebf,
      updated: p.updatedAt ? Date.parse(p.updatedAt) : 0,
      source: 'cloud'
    });
  });
  locals.forEach(env => {
    if (!env || !env.meta) return;
    if (cloudIds.has(env.meta.id)) return; // schon als Cloud-Eintrag drin
    out.push({
      id: env.meta.id,
      name: env.meta.name || (env.state && env.state.projekt && env.state.projekt.name) || '(ohne Name)',
      customer: (env.state && env.state.projekt && env.state.projekt.bauherrschaft) || '',
      address: _addrFromState(env.state),
      qhl: null, qh: null, ebf: (env.state && env.state.objekt && env.state.objekt.ebf) || null,
      updated: env.meta.updated || 0,
      source: 'local'
    });
  });
  out.sort((a,b) => (b.updated || 0) - (a.updated || 0));
  return out;
}

function _addrFromState(state){
  if (!state || !state.projekt) return '';
  const plzOrt = [state.projekt.plz, state.projekt.ort].filter(Boolean).join(' ');
  return [state.projekt.strasse, plzOrt].filter(Boolean).join(', ');
}

/* ======================================================
   Auto-Sync: visibilitychange + focus
   ====================================================== */
function installAutoSync(){
  if (typeof window === 'undefined') return;
  let syncing = false;
  const trigger = async () => {
    if (syncing || !_isAuthenticated) return;
    syncing = true;
    try { await cloudList(); } catch(e){}
    syncing = false;
  };
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') trigger();
  });
  window.addEventListener('focus', trigger);
}

/* ======================================================
   Utilities
   ====================================================== */
function deepClone(obj){
  try { return JSON.parse(JSON.stringify(obj)); } catch(e){ return obj; }
}

function deepMerge(target, src){
  if (src == null) return target;
  if (typeof target !== 'object' || target === null) return src;
  if (Array.isArray(src)) return src.slice(); // Arrays werden ersetzt, nicht gemerged
  const out = Array.isArray(target) ? target.slice() : Object.assign({}, target);
  Object.keys(src).forEach(k => {
    const v = src[k];
    if (v && typeof v === 'object' && !Array.isArray(v)){
      out[k] = deepMerge(out[k] || {}, v);
    } else {
      out[k] = v;
    }
  });
  return out;
}

/* ======================================================

   ====================================================== */
function openModal(id){
  const m = document.getElementById(id);
  if (!m) return;
  m.hidden = false;
  document.body.classList.add('modal-open');
  if (id === 'modalProjects') refreshProjectsList();
  if (id === 'modalLogin'){
    const pw = document.getElementById('f-login-pw');
    if (pw){ pw.value = ''; setTimeout(()=>pw.focus(), 30); }
  }
}
function closeModal(id){
  const m = document.getElementById(id);
  if (!m) return;
  m.hidden = true;
  if (!document.querySelector('.modal:not([hidden])')) document.body.classList.remove('modal-open');
}

/* ======================================================
   Wiring (vom main.mjs aufgerufen)
   ====================================================== */
function initProjectsUi(){
  // Persistence-Hooks
  onToast(showToast);
  onAuthChange(applyAuthUi);
  onProjectsChange(refreshProjectsList);

  // Topbar-Buttons
  document.addEventListener('click', (ev) => {
    const t = ev.target.closest('button, [data-close]');
    if (!t) return;

    const closeId = t.getAttribute('data-close');
    if (closeId){ closeModal(closeId); return; }

    if (t.id === 'btnLogin'){
      if (isAuthed()) doLogout();
      else openModal('modalLogin');
    }
    else if (t.id === 'btnDoLogin') triggerLogin();
    else if (t.id === 'btnProjects') openModal('modalProjects');
    else if (t.id === 'btnNewProj' || t.id === 'btnNewFromModal'){
      newProject();
      closeModal('modalProjects');
    }
    else if (t.id === 'btnSaveProj' || t.id === 'btnSaveActive'){
      const inp = document.getElementById('activeProjectName');
      if (inp && inp.value) setActiveName(inp.value);
      saveProject();
    }
    else if (t.id === 'btnSaveAs'){
      const def = (document.getElementById('activeProjectName')?.value || getActiveMeta().name || 'Projekt') + ' (Kopie)';
      const name = prompt('Neuer Projektname?', def);
      if (name) saveProjectAs(name);
    }
    else if (t.dataset.action === 'load-cloud') cloudLoad(t.dataset.id);
    else if (t.dataset.action === 'load-local') loadProjectLocal(t.dataset.id);
    else if (t.dataset.action === 'del-cloud'){
      if (confirm('Cloud-Projekt löschen?')) cloudDelete(t.dataset.id);
    }
    else if (t.dataset.action === 'del-local'){
      if (confirm('Lokales Projekt löschen?')) deleteProjectLocal(t.dataset.id);
    }
    else if (t.dataset.action === 'dup-local') duplicateProjectLocal(t.dataset.id);
  });

  // Login-Form: Enter
  document.addEventListener('keydown', (ev) => {
    if (ev.key === 'Escape'){
      ['modalLogin','modalProjects','modalExport'].forEach(closeModal);
    }
    if (ev.key === 'Enter'){
      const pw = document.getElementById('f-login-pw');
      if (pw && document.activeElement === pw) triggerLogin();
    }
  });

  // Aktueller Projekt-Name → live in active-meta spiegeln
  document.addEventListener('input', (ev) => {
    if (ev.target && ev.target.id === 'activeProjectName'){
      setActiveName(ev.target.value);
    }
  });

  applyAuthUi(isAuthed());
}

async function triggerLogin(){
  const pw = document.getElementById('f-login-pw');
  const err = document.getElementById('loginError');
  if (err) err.textContent = '';
  const val = pw ? pw.value : '';
  if (!val){ if (err) err.textContent = 'Passwort eingeben.'; return; }
  const res = await doLogin(val);
  if (!res.ok){
    if (err) err.textContent = res.error || 'Anmeldung fehlgeschlagen.';
    return;
  }
  closeModal('modalLogin');
}

  list.innerHTML = items.map(renderProjectRow).join('');

/* ======================================================

function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// src/export.mjs

//

const { getState } = __mods__["./state.mjs"];
const { compute } = __mods__["./calc/fws.mjs"];
const { computeBuildingDetailLoad } = __mods__["./calc/heatload.mjs"];

const { filterFoerderungen, lookupBaubewilligung, schaetzeBetrag, gruppiereProgramme, vergleichNormVerbrauch } = __mods__["./calc/foerderung.mjs"];
const { getActiveMeta } = __mods__["./persistence.mjs"];

/* ======================================================
   Modal-Skelett
   ====================================================== */
function renderExportModal(){
  return `
  <div class="modal" id="modalExport" hidden>
    <div class="modal__backdrop" data-close="modalExport"></div>

      </footer>

}

/* ======================================================
   Wiring
   ====================================================== */
function initExportUi(){
  document.addEventListener('click', (ev) => {
    const t = ev.target.closest('button');
    if (!t) return;
    if (t.id === 'btnExport') openExportModal();
    else if (t.id === 'btnExportPdf')  doExport('pdf');
    else if (t.id === 'btnExportHtml') doExport('html');
    else if (t.id === 'btnExportJson') doExport('json');
  });
}

function openExportModal(){
  const m = document.getElementById('modalExport');
  if (!m) return;
  // Detail-Modus-Optionen je nach State sichtbar lassen.
  const detail = !!getState()?.detail?.aktiv;
  const v = document.getElementById('opt-vergleich-wrap');
  const g = document.getElementById('opt-geraet-wrap');
  if (v) v.style.display = detail ? '' : 'none';
  if (g) g.style.display = detail ? '' : 'none';
  m.hidden = false;
  document.body.classList.add('modal-open');
}

function closeExportModal(){
  const m = document.getElementById('modalExport');
  if (m) m.hidden = true;
  if (!document.querySelector('.modal:not([hidden])')) document.body.classList.remove('modal-open');
}

function readOptions(){
  return {
    rechenweg: !!document.getElementById('opt-rechenweg')?.checked,
    notizen:   !!document.getElementById('opt-notizen')?.checked,
    foerder:   !!document.getElementById('opt-foerder')?.checked,
    vergleich: !!document.getElementById('opt-vergleich')?.checked,
    geraet:    !!document.getElementById('opt-geraet')?.checked
  };
}

/* ======================================================
   Hauptfunktion: Export ausführen
   ====================================================== */
function doExport(format){
  const state = getState();
  const calc  = computeFullCalc(state);
  const opts  = readOptions();
  const meta  = getActiveMeta();

  if (format === 'json'){
    const payload = {
      meta,
      state,
      calc: stripFunctions(calc),
      exportedAt: new Date().toISOString(),
      options: opts
    };
    download(blob(JSON.stringify(payload, null, 2), 'application/json;charset=utf-8'),
             buildFilename(meta, 'json'));
    closeExportModal();
    return;
  }

  const html = buildHtml(state, calc, opts, meta);
  if (format === 'html'){
    download(blob(html, 'text/html;charset=utf-8'), buildFilename(meta, 'html'));
    closeExportModal();
    return;
  }

  if (format === 'pdf'){
    // Browser-Print über versteckten iframe — print-CSS aus Style-Block.
    const w = window.open('', '_blank', 'width=900,height=1200');
    if (!w){ alert('Pop-up blockiert — bitte für PDF-Export erlauben.'); return; }
    w.document.open();
    w.document.write(html);
    w.document.close();
    // Etwas Zeit fürs Layout, dann Print-Dialog.
    setTimeout(() => { try { w.focus(); w.print(); } catch(_){} }, 350);
    closeExportModal();
    return;
  }
}

/* ======================================================
   Calc-Wrapper (gleiche Pipeline wie main.mjs)
   ====================================================== */
function computeFullCalc(state){
  const calc = compute(state);
  if (state.detail && state.detail.aktiv){
    try {
      const { uHuelle } = resolveHuelleUWerte(state);
      calc.detail = computeBuildingDetailLoad(state, uHuelle);
    } catch(e){ calc.detail = null; }
    try { calc.distribution = computeDistribution(state, calc.detail); }
    catch(e){ calc.distribution = null; }
    try { calc.heatpump = computeHeatpumpResult(state, getWpDb(), calc.Qh); }
    catch(e){ calc.heatpump = null; }
  }
  return calc;
}

/* ======================================================
   HTML-Output (selbsttragend, Print-CSS inline)
   ====================================================== */
function buildHtml(state, calc, opts, meta){
  const detail = !!state?.detail?.aktiv;
  const today  = new Date().toLocaleDateString('de-CH', { year:'numeric', month:'long', day:'numeric' });
  const projName = state.projekt?.name || meta.name || 'Heizlast-Berechnung';
  const title    = `Heizlast-Bericht · ${esc(projName)}`;

  const sections = [];
  sections.push(renderStammdatenSec(state));
  sections.push(renderErgebnisSec(state, calc));
  if (opts.rechenweg) sections.push(renderRechenwegSec(state, calc));
  if (detail && opts.vergleich) sections.push(renderVergleichSec(state, calc));
  if (detail && opts.geraet)    sections.push(renderGeraetSec(state, calc));
  if (opts.foerder)             sections.push(renderFoerderSec(state, calc));
  if (opts.notizen)             sections.push(renderNotizenSec(state));

  return `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>${title}</title>
<style>${PRINT_CSS}</style>
</head>
<body>
<header class="rep-head">

  </div>
  <div class="rep-head__brand">
    <div class="rep-head__mark">T</div>
    <div>
      <div><strong>Gebäudetechnik Coltouan</strong></div>
      <div>Rankstrasse 18 · 8413 Neftenbach</div>
      <div>+41 76 504 03 68 · info@thermowerk.ch</div>
    </div>
  </div>
</header>

${sections.join('\n')}

<footer class="rep-foot">
  <p>Erstellt mit dem Thermowerk Heizlast-Tool. FWS-Methode (AWB WP-Kurs Modul 3) und EN 12831 / SIA 384.201 raumweise. Förder-Beträge sind Stand <strong>${esc(today)}</strong> — verbindlich nur über die Antragsportale der Programme.</p>
</footer>
</body>
</html>`;
}

function renderRechenwegSec(s, c){
  const rows = [];
  rows.push(['Methode aktiv', c.method ? c.method.label : '—']);
  if (c.method){
    if (c.method.Qn != null)        rows.push(['Q<sub>n</sub> (Brennstoff annualisiert)', fmt(c.method.Qn,0) + ' kWh/a']);
    if (c.method.QnWW != null)      rows.push(['Q<sub>n,WW</sub> aus Verbrauch abgezogen', fmt(c.method.QnWW,0) + ' kWh/a']);
    if (c.method.QnH != null)       rows.push(['Q<sub>n,H</sub> (Heizen, ohne WW)', fmt(c.method.QnH,0) + ' kWh/a']);
    if (c.method.tvoll != null)     rows.push(['t<sub>voll</sub>', fmt(c.method.tvoll,0) + ' h/a']);
    if (c.method.Qhl_roh != null)   rows.push(['Q<sub>hl,roh</sub>', fmt(c.method.Qhl_roh,2) + ' kW']);
    if (c.method.sparFactor != null) rows.push(['Sanierungsfaktor', fmt(c.method.sparFactor,3)]);
  }
  rows.push(['Q<sub>hl</sub> (FWS)', fmt(c.Qhl,2) + ' kW']);
  if (c.Qw  != null) rows.push(['Q<sub>w</sub> (WW-Zuschlag)',     fmt(c.Qw,2)  + ' kW']);
  if (c.Qoff != null) rows.push(['Q<sub>off</sub> (EVU-Sperrzeit)', fmt(c.Qoff,2)+ ' kW']);

  }
  return `

  <h2>Rechenweg</h2>

function renderVergleichSec(s, c){

  const v = vergleichNormVerbrauch(Qnorm, Qfws);
  const ampelTxt = (v.ampel || 'grau').toUpperCase();

function renderGeraetSec(s, c){
  const wpId = s.geraet && s.geraet.gewaehlt_id;

  const rows = [
    ['Marke / Modell', `${esc(wp.marke || wp.brand || '')} ${esc(wp.modell || wp.name || wp.id || '')}`],

    ['T<sub>VL,max</sub>', wp.tvl_max != null ? fmt(wp.tvl_max,0) + ' °C' : '—'],

function renderFoerderSec(s, c){
  const db = getFoerderDb();
  const bauDb = getBauDb();
  const ctx = {
    Qh: c.Qh || 0,
    objekt: { ebf: s.objekt && +s.objekt.ebf || 0 },
    detail: { huelle: {} }
  };
  let progs = [];
  let total = 0;
  let bewBox = '';
  try {
    if (db){
      progs = filterFoerderungen(db, {
        kanton:   s.projekt && s.projekt.kanton,
        massnahme: s.projekt && s.projekt.massnahme,
        wp_quelle: s.projekt && s.projekt.wp_quelle
      });
      const grouped = gruppiereProgramme(progs, ctx);
      total = grouped.total_geschaetzt || 0;
    }
  } catch(e){}
  if (!progs.length){
    return `<section class="rep-sec"><h2>Förderungs-Übersicht</h2><p>Keine passenden Programme — Kanton oder Massnahme prüfen.</p></section>`;
  }
  const rows = progs.map(p => {
    const betr = (typeof schaetzeBetrag === 'function' && p.beitrag && p.beitrag.struktur)
      ? schaetzeBetrag(p, ctx) : null;
    return `<tr>
      <td>${esc(p.ebene === 'bund' ? 'Bund' : (p.kanton || ''))}</td>
      <td>${esc(p.name)}</td>
      <td>${esc(p.beitrag?.text || '—')}</td>
      <td>${betr != null && betr > 0 ? '≈ CHF ' + fmt(betr,0) : '—'}</td>
      <td>${esc((p.bedingungen || []).join('; ')) || '—'}</td>
    </tr>`;
  }).join('');
  // Baubewilligung
  if (bauDb && s.projekt && s.projekt.kanton){
    const b = lookupBaubewilligung(bauDb, s.projekt.kanton);
    if (b){
      bewBox = `
<div class="rep-callout">
  <h3>Baubewilligung — ${esc(b.kanton_name || s.projekt.kanton)}</h3>
  <p><strong>Heizungsersatz:</strong> ${b.heizungsersatz?.bewilligung ? 'bewilligungspflichtig' : 'frei'} ${b.heizungsersatz?.bedingungen ? '· ' + esc(b.heizungsersatz.bedingungen) : ''}</p>
  <p><strong>Erdsonde:</strong> ${b.erdsonde?.bewilligung ? 'bewilligungspflichtig (ANU/AWA/AUE)' : 'frei'} ${b.erdsonde?.hinweis ? '· ' + esc(b.erdsonde.hinweis) : ''}</p>
  <p><strong>Luft/Wasser-WP (LSV):</strong> ${esc(b.lwwp?.hinweis || '—')}</p>
  ${b.portal_link ? `<p>Portal: ${esc(b.portal_link)}</p>` : ''}
  ${b.energie_link ? `<p>Energie-Portal: ${esc(b.energie_link)}</p>` : ''}
</div>`;
    }
  }
  return `
<section class="rep-sec">
  <h2>Förderungs-Übersicht</h2>
  <table class="rep-tbl rep-tbl--wide">
    <thead><tr><th>Ebene</th><th>Programm</th><th>Beitrag</th><th>Schätzung</th><th>Bedingungen</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  ${total > 0 ? `<p class="rep-total"><strong>Total Schätzung:</strong> ≈ CHF ${fmt(total,0)} (Bund + Kanton, kombinierbar)</p>` : ''}
  ${bewBox}
  <p class="rep-fine">Förder-Beträge sind Stand der Datenbank-Aktualisierung. Verbindlich nur über das jeweilige Antragsportal. Antrag VOR Baubeginn stellen.</p>
</section>`;
}

function renderNotizenSec(s){
  const n = s.notes || {};
  const items = [
    ['1. Stammdaten / Projekt', n.s1],
    ['2. Heizlast / Methodik',  n.s2],

@media print {

/* ======================================================
   Helpers
   ====================================================== */
function fmt(v, d = 2){
  const n = Number(v);
  if (!Number.isFinite(n)) return '–';
  return n.toLocaleString('de-CH', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function blob(content, mime){
  return new Blob([content], { type: mime });
}
function download(blob, filename){
  const a = document.createElement('a');
  const url = URL.createObjectURL(blob);
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
}
function buildFilename(meta, ext){
  const safe = (meta.name || 'Heizlast').replace(/[^\wäöüÄÖÜß\-]+/g, '_').slice(0, 40) || 'Heizlast';
  const today = new Date().toISOString().slice(0, 10);
  return `${safe}_${today}.${ext}`;
}
function stripFunctions(obj){
  // Remove non-serializable values from calc-result.
  try { return JSON.parse(JSON.stringify(obj)); } catch(_){ return null; }
}

  };
  return map[key] || (key || '—');
}
function wpQuelleLabel(key){

  return map[key] || key;
}

// === ./main.mjs ===
(function(){
// src/main.mjs
// Bootstrap-Modul: verdrahtet state ↔ ui ↔ calc/fws + S4 Detail-Modus + S7 Persistenz/Export.
// Datenfluss: Eingabe → state.set → compute(state) [+ computeBuildingDetailLoad]
// → updateUi → autosave Active.

const { getState, setState, set, subscribe, freshState } = __mods__["./state.mjs"];
const { compute } = __mods__["./calc/fws.mjs"];
const { computeBuildingDetailLoad } = __mods__["./calc/heatload.mjs"];
const { computeDistribution } = __mods__["./calc/distribution.mjs"];
const { computeHeatpumpResult } = __mods__["./calc/heatpump.mjs"];
const { initUi, updateUi, rebuildOnDetailToggle, setUWerteData, setWpDb, getWpDb, setFoerderDb, getFoerderDb, setBauDb, getBauDb, resolveHuelleUWerte } = __mods__["./ui.mjs"];
const { filterFoerderungen, lookupBaubewilligung, schaetzeBetrag, gruppiereProgramme } = __mods__["./calc/foerderung.mjs"];
// S7 — Persistenz + Modale
const { loadActive, autosaveActive, installAutoSync, onLoaded } = __mods__["./persistence.mjs"];
const { renderTopbarActions, renderModals, bootProjectsUi } = __mods__["./projects.mjs"];
const { renderExportModal, initExportUi } = __mods__["./export.mjs"];

const root      = document.getElementById('app');
const stepperEl = document.getElementById('stepper');
const modalRoot = document.getElementById('modalRoot');
const topbarActions = document.getElementById('topbarActions');

// U-Werte-Daten asynchron laden — danach UI initialisieren.
let _booted = false;
async function boot(){
  if (_booted) return; _booted = true;

  // S7 — Topbar-Buttons + Modale ins DOM einfügen, BEVOR initUi/probeAuth läuft
  // (damit globaler Click-Handler die Buttons findet).
  if (topbarActions) topbarActions.innerHTML = renderTopbarActions();
  if (modalRoot) modalRoot.innerHTML = renderModals() + renderExportModal();

  // Daten-Files laden (relative Pfade — funktioniert sowohl in /src/ wie auch
  // in /heizlast/ Deploy, weil bundler die Pfade auf './data/...' umschreibt).
  await loadDataFiles();

  if (!root || !stepperEl){
    console.error('[main] #app oder #stepper im DOM nicht gefunden.');
    return;
  }
  initUi({ root, stepperEl, set, getState });

  // S7 — Aktive Session aus localStorage wiederherstellen, BEVOR der Render-
  // Tick angestossen wird. Wenn nichts da ist: freshState bleibt aktiv.
  const wasLoaded = loadActive();
  // Wenn das geladene Projekt im Detail-Modus war: UI komplett neu rendern,
  // damit die Detail-Sektionen sichtbar sind (initUi rendert sonst nur
  // fresh-state-Layout).
  if (wasLoaded){
    rebuildOnDetailToggle(getState());
  }

  // S7 — Wenn ein Projekt geladen wird (lokal/cloud), UI komplett neu rendern.
  onLoaded((state) => {
    rebuildOnDetailToggle(state);
    const tgl = document.getElementById('toggleDetail');
    if (tgl) tgl.checked = !!state?.detail?.aktiv;
  });

  // Subscribe: bei jeder State-Änderung neu rechnen + UI aktualisieren + autosave.
  let _lastDetailFlag = getState().detail && getState().detail.aktiv;
  subscribe((state) => {
    const calc = compute(state);
    if (state.detail && state.detail.aktiv){
      const { uHuelle } = resolveHuelleUWerte(state);
      calc.detail = computeBuildingDetailLoad(state, uHuelle);
      calc.distribution = computeDistribution(state, calc.detail);
      try {
        const db = getWpDb();
        calc.heatpump = computeHeatpumpResult(state, db, calc.Qh);
      } catch (_) { calc.heatpump = null; }
    } else {
      calc.detail = null; calc.distribution = null; calc.heatpump = null;
    }
    const cur = state.detail && state.detail.aktiv;
    if (_lastDetailFlag !== cur){
      _lastDetailFlag = cur;
      rebuildOnDetailToggle(state);
    }
    updateUi(state, calc);
    autosaveActive();
  });

  // Initialer Render-Tick.
  setState(getState());

  // S7 — Login-Probe + Projekte/Export-UI scharf schalten + Auto-Sync.
  await bootProjectsUi();
  initExportUi();
  installAutoSync();

  // Initial Detail-Toggle aus geladenem Active-State spiegeln.
  const tgl = document.getElementById('toggleDetail');
  if (tgl) tgl.checked = !!getState()?.detail?.aktiv;
}

async function loadDataFiles(){
  const tries = [
    ['./data/u-werte.json',         (d) => setUWerteData(d)],
    ['../data/u-werte.json',        (d) => setUWerteData(d)],
    ['./data/waermepumpen.json',    (d) => setWpDb(extractWpList(d))],
    ['../data/waermepumpen.json',   (d) => setWpDb(extractWpList(d))],
    ['./data/foerderungen.json',    (d) => setFoerderDb(d)],
    ['../data/foerderungen.json',   (d) => setFoerderDb(d)],
    ['./data/baubewilligungen.json',(d) => setBauDb(d)],
    ['../data/baubewilligungen.json',(d) => setBauDb(d)]
  ];
  // Pro „Themen-File" einmal versuchen, in der Reihenfolge ./ dann ../.
  const buckets = [
    [tries[0], tries[1]],
    [tries[2], tries[3]],
    [tries[4], tries[5]],
    [tries[6], tries[7]]
  ];
  for (const bucket of buckets){
    for (const [url, apply] of bucket){
      try {
        const res = await fetch(url);
        if (res.ok){
          const data = await res.json();
          apply(data);
          break;
        }
      } catch(_){ /* try next */ }
    }
  }
}
function extractWpList(d){
  if (Array.isArray(d?.hauptgeraete)) return d.hauptgeraete;
  if (Array.isArray(d?.heatPumps))    return d.heatPumps;
  return Array.isArray(d) ? d : [];
}

// Detail-Modus-Toggle.
const toggleDetail = document.getElementById('toggleDetail');
if (toggleDetail){
  toggleDetail.disabled = false;
  toggleDetail.addEventListener('change', (ev) => {
    set('detail.aktiv', ev.target.checked);
  });
}

// Devtool: globaler Zugriff für Debugging in der Konsole.
if (typeof window !== 'undefined'){
  window.__heizlast = {
    getState, setState, set, freshState, compute, computeBuildingDetailLoad,
    computeDistribution, computeHeatpumpResult, getWpDb,
    getFoerderDb, getBauDb,
    filterFoerderungen, lookupBaubewilligung, schaetzeBetrag, gruppiereProgramme
  };
}

boot();

__mods__["./main.mjs"] = {  };
})();
// === bundle ende ===
</script>
