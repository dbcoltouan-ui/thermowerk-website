<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thermowerk — Heizlast-Tool</title>
  <style>
/* =========================================================================
   Thermowerk Heizlast-Tool — Design-System (S3)
   Inspiration: Final-Heizlast-Tool (fws-original.html) — slate-Inks + Brand-Teal.
   Eine Farbpalette, eine Button-/Input-/Card-Stilfamilie, mobile-tauglich.
   Print-Stub am Ende.
   ========================================================================= */

:root {
  /* ---- Farbpalette (Inks = neutrale Stufen, Brand = Teal, Accents) ---- */
  --ink-0:   #ffffff;
  --ink-50:  #f7f9fb;
  --ink-100: #eef2f6;
  --ink-200: #e2e8f0;
  --ink-300: #cbd5e1;
  --ink-400: #94a3b8;
  --ink-500: #64748b;
  --ink-600: #475569;
  --ink-700: #334155;
  --ink-800: #1e293b;
  --ink-900: #0f172a;

  --brand-50:  #ecfeff;
  --brand-100: #cffafe;
  --brand-300: #67e8f9;
  --brand-500: #0e7490;
  --brand-600: #0a5e75;
  --brand-700: #0a4d61;

  --ok-500:    #16a34a;
  --warn-500:  #d97706;
  --bad-500:   #dc2626;
  --info-500:  #2563eb;

  /* ---- Typografie ---- */
  --ff:       'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --ff-mono:  ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  --fs-xs:    11px;
  --fs-sm:    13px;
  --fs-md:    14px;
  --fs-lg:    16px;
  --fs-xl:    20px;
  --fs-2xl:   28px;
  --fs-3xl:   40px;

  /* ---- Spacing & Radius ---- */
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 20px; --s-6: 24px;
  --s-8: 32px; --s-10: 40px; --s-12: 48px;
  --r-xs: 4px; --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;

  --shadow-sm: 0 1px 2px rgba(15,23,42,.06);
  --shadow-md: 0 4px 12px rgba(15,23,42,.08);
  --shadow-lg: 0 10px 32px rgba(15,23,42,.12);

  --c-bg:        var(--ink-50);
  --c-card:      var(--ink-0);
  --c-border:    var(--ink-200);
  --c-border-strong: var(--ink-300);
  --c-text:      var(--ink-900);
  --c-text-mute: var(--ink-500);
  --c-brand:     var(--brand-500);
}

/* ---- Reset / Base ---- */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--ff);
  font-size:   var(--fs-md);
  line-height: 1.5;
  color: var(--c-text);
  background: var(--c-bg);
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4, h5 { margin: 0; font-weight: 600; line-height: 1.25; }
p { margin: 0; }
button { font-family: inherit; cursor: pointer; }
a { color: var(--c-brand); text-decoration: none; }
a:hover { text-decoration: underline; }
small { font-size: var(--fs-xs); }
sub, sup { font-size: 0.75em; line-height: 0; }

/* ---- Layout-Container ---- */
.app-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 var(--s-5);
  width: 100%;
}

/* ---- Header / Topbar ---- */
.topbar {
  background: var(--ink-0);
  border-bottom: 1px solid var(--c-border);
  position: sticky;
  top: 0;
  z-index: 30;
  box-shadow: var(--shadow-sm);
}
.topbar__inner {
  display: flex;
  align-items: center;
  gap: var(--s-4);
  padding: var(--s-3) 0;
  flex-wrap: wrap;
}
.brand {
  display: inline-flex;
  align-items: baseline;
  gap: var(--s-2);
  font-weight: 700;
  color: var(--ink-900);
  font-size: var(--fs-lg);
  letter-spacing: -0.01em;
}
.brand__mark {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 800;
  font-size: 14px;
  align-self: center;
}
.brand__sub {
  color: var(--c-text-mute);
  font-weight: 500;
  font-size: var(--fs-sm);
}
.topbar__spacer { flex: 1; }
.topbar__group {
  display: inline-flex;
  align-items: center;
  gap: var(--s-3);
  flex-wrap: wrap;
}
.login-status {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  font-size: var(--fs-sm);
  color: var(--c-text-mute);
  padding: var(--s-1) var(--s-3);
  border-radius: 999px;
  background: var(--ink-100);
}
.login-status__dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ink-400);
}
.login-status.is-auth .login-status__dot { background: var(--ok-500); }

/* ---- Stepper / Tab-Navigation ---- */
.stepper {
  background: var(--ink-0);
  border-bottom: 1px solid var(--c-border);
  position: sticky;
  top: 60px;
  z-index: 25;
}
.stepper__inner {
  display: flex;
  gap: var(--s-1);
  overflow-x: auto;
  padding: var(--s-2) 0;
  scrollbar-width: thin;
}
.step {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: var(--s-2) var(--s-3);
  border-radius: var(--r-md);
  background: transparent;
  border: 1px solid transparent;
  color: var(--c-text-mute);
  font-size: var(--fs-sm);
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
}
.step:hover { background: var(--ink-100); color: var(--ink-800); }
.step.is-active {
  background: var(--brand-50);
  color: var(--brand-700);
  border-color: var(--brand-100);
}
.step__num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--ink-200);
  color: var(--ink-700);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: var(--fs-xs);
  font-weight: 700;
}
.step.is-active .step__num { background: var(--brand-500); color: #fff; }

/* ---- Main / Sections ---- */
.app-main {
  flex: 1;
  padding: var(--s-6) 0 var(--s-12);
}
.section {
  background: var(--c-card);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: var(--s-5) var(--s-5) var(--s-6);
  margin-bottom: var(--s-5);
  box-shadow: var(--shadow-sm);
  scroll-margin-top: 130px;
}
.section__head {
  display: flex;
  align-items: baseline;
  gap: var(--s-3);
  margin-bottom: var(--s-2);
  flex-wrap: wrap;
}
.section__title {
  font-size: var(--fs-xl);
  font-weight: 700;
  color: var(--ink-900);
}
.section__num {
  font-size: var(--fs-xs);
  font-weight: 700;
  color: var(--brand-500);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  background: var(--brand-50);
  padding: 2px 8px;
  border-radius: var(--r-xs);
}
.section__intro {
  color: var(--c-text-mute);
  font-size: var(--fs-sm);
  margin-bottom: var(--s-4);
  max-width: 70ch;
}

/* ---- Block (Subgruppe innerhalb section) ---- */
.block {
  border-top: 1px solid var(--c-border);
  padding-top: var(--s-4);
  margin-top: var(--s-4);
}
.block:first-of-type { border-top: 0; padding-top: 0; margin-top: 0; }
.block__head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--s-3);
  margin-bottom: var(--s-3);
  flex-wrap: wrap;
}
.block__title {
  font-size: var(--fs-md);
  font-weight: 600;
  color: var(--ink-800);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.block__hint {
  font-size: var(--fs-xs);
  color: var(--c-text-mute);
}

/* ---- Grid / Field ---- */
.grid { display: grid; gap: var(--s-3) var(--s-4); }
.grid--2 { grid-template-columns: repeat(2, 1fr); }
.grid--3 { grid-template-columns: repeat(3, 1fr); }
.grid--4 { grid-template-columns: repeat(4, 1fr); }
.col-span-2 { grid-column: span 2; }
.col-span-3 { grid-column: span 3; }

.field { display: flex; flex-direction: column; gap: var(--s-1); min-width: 0; }
.field__label {
  font-size: var(--fs-sm);
  font-weight: 500;
  color: var(--ink-700);
}
.field__hint {
  font-size: var(--fs-xs);
  color: var(--c-text-mute);
  line-height: 1.4;
}
.symbol {
  color: var(--c-text-mute);
  font-weight: 400;
  font-size: 0.92em;
}

/* ---- Input / Select / Textarea ---- */
.input, .select, .textarea {
  appearance: none;
  width: 100%;
  font-family: inherit;
  font-size: var(--fs-md);
  color: var(--ink-900);
  background: var(--ink-0);
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-sm);
  padding: 8px 10px;
  line-height: 1.4;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.input:hover, .select:hover, .textarea:hover { border-color: var(--ink-400); }
.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--brand-500);
  box-shadow: 0 0 0 3px var(--brand-100);
}
.input[disabled], .select[disabled] { background: var(--ink-100); color: var(--ink-500); cursor: not-allowed; }
.textarea { min-height: 80px; resize: vertical; }
.select { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='%23475569'><path d='M1 1l5 5 5-5' stroke='%23475569' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 12px 8px;
  padding-right: 32px;
}

.input-group {
  display: flex;
  align-items: stretch;
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-sm);
  overflow: hidden;
  background: var(--ink-0);
  transition: border-color .15s, box-shadow .15s;
}
.input-group:focus-within {
  border-color: var(--brand-500);
  box-shadow: 0 0 0 3px var(--brand-100);
}
.input-group .input {
  border: 0;
  border-radius: 0;
  flex: 1;
  min-width: 0;
}
.input-group .input:focus { box-shadow: none; }
.input-group__unit {
  display: inline-flex;
  align-items: center;
  padding: 0 12px;
  background: var(--ink-100);
  color: var(--ink-600);
  font-size: var(--fs-sm);
  border-left: 1px solid var(--c-border);
  white-space: nowrap;
}

/* ---- Segmented / Radio-Pills ---- */
.seg {
  display: inline-flex;
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-sm);
  overflow: hidden;
  background: var(--ink-0);
  width: 100%;
}
.seg__option { flex: 1; }
.seg__option input { position: absolute; opacity: 0; pointer-events: none; }
.seg__option span {
  display: block;
  text-align: center;
  padding: 8px 10px;
  font-size: var(--fs-sm);
  color: var(--ink-700);
  cursor: pointer;
  border-right: 1px solid var(--c-border);
  transition: background .15s, color .15s;
}
.seg__option:last-child span { border-right: 0; }
.seg__option input:checked + span {
  background: var(--brand-500);
  color: #fff;
  font-weight: 600;
}
.seg__option:hover span { background: var(--ink-100); }
.seg__option input:checked + span:hover { background: var(--brand-600); }

/* ---- Switch (Checkbox als Toggle) ---- */
.switch {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  cursor: pointer;
  user-select: none;
  font-size: var(--fs-sm);
  color: var(--ink-700);
}
.switch input { position: absolute; opacity: 0; pointer-events: none; }
.switch__track {
  width: 38px; height: 22px;
  border-radius: 999px;
  background: var(--ink-300);
  position: relative;
  transition: background .15s;
  flex-shrink: 0;
}
.switch__track::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #fff;
  box-shadow: var(--shadow-sm);
  transition: transform .15s;
}
.switch input:checked + .switch__track { background: var(--brand-500); }
.switch input:checked + .switch__track::after { transform: translateX(16px); }
.switch input[disabled] + .switch__track { opacity: 0.5; cursor: not-allowed; }
.switch:has(input[disabled]) { cursor: not-allowed; color: var(--ink-500); }

/* ---- Checkbox ---- */
.chk { display: inline-flex; align-items: center; gap: var(--s-2); font-size: var(--fs-sm); color: var(--ink-700); cursor: pointer; }
.chk input { width: 16px; height: 16px; accent-color: var(--brand-500); }

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s-2);
  padding: 8px 14px;
  font-size: var(--fs-sm);
  font-weight: 500;
  background: var(--ink-0);
  color: var(--ink-700);
  border: 1px solid var(--c-border-strong);
  border-radius: var(--r-sm);
  transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
}
.btn:hover { background: var(--ink-100); border-color: var(--ink-400); color: var(--ink-900); }
.btn:active { background: var(--ink-200); }
.btn:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--brand-100); }
.btn[disabled] { opacity: 0.5; cursor: not-allowed; }
.btn--primary {
  background: var(--brand-500);
  color: #fff;
  border-color: var(--brand-500);
}
.btn--primary:hover { background: var(--brand-600); border-color: var(--brand-600); color: #fff; }
.btn--ghost {
  background: transparent;
  border-color: transparent;
  color: var(--c-text-mute);
}
.btn--ghost:hover { background: var(--ink-100); color: var(--ink-800); }
.btn--sm { padding: 4px 10px; font-size: var(--fs-xs); }
.btn--block { width: 100%; }

/* ---- Period-Liste / Add-Button ---- */
.period {
  display: grid;
  grid-template-columns: 1fr 130px 130px 1fr 1fr 32px;
  gap: var(--s-2);
  align-items: end;
  padding: var(--s-3);
  border: 1px dashed var(--c-border);
  border-radius: var(--r-md);
  background: var(--ink-50);
  margin-bottom: var(--s-2);
}
.period .field__label { font-size: var(--fs-xs); }
.add-row {
  width: 100%;
  border: 1px dashed var(--c-border-strong);
  background: transparent;
  color: var(--c-text-mute);
  padding: var(--s-3);
  border-radius: var(--r-md);
  font-size: var(--fs-sm);
  margin-top: var(--s-2);
  transition: background .15s, color .15s, border-color .15s;
}
.add-row:hover { background: var(--brand-50); color: var(--brand-700); border-color: var(--brand-300); }
.add-row--sub { padding: var(--s-2); font-size: var(--fs-xs); margin-top: var(--s-2); }

/* ---- Räume-Editor (S4) ---- */
.rooms-list { display: flex; flex-direction: column; gap: var(--s-3); }
.room {
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  background: var(--ink-0);
  padding: var(--s-3) var(--s-4);
}
.room__head {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  margin-bottom: var(--s-3);
  padding-bottom: var(--s-2);
  border-bottom: 1px dashed var(--c-border);
}
.room__head strong { font-size: var(--fs-md); color: var(--brand-700); }
.room__a { color: var(--c-text-mute); font-size: var(--fs-sm); margin-left: auto; }
.room__head .btn--ghost { padding: 2px 10px; font-size: var(--fs-md); line-height: 1; }
.room__bauteile { margin-top: var(--s-3); padding-top: var(--s-3); border-top: 1px dashed var(--c-border); }
.bauteil {
  display: flex;
  flex-wrap: wrap;
  align-items: end;
  gap: var(--s-2);
  padding: var(--s-2);
  border: 1px dashed var(--c-border);
  border-radius: var(--r-sm);
  background: var(--ink-50);
  margin-bottom: var(--s-2);
}
.bauteil .field__label { font-size: var(--fs-xs); margin-bottom: 2px; }
.bauteil .btn--ghost { padding: 2px 10px; font-size: var(--fs-md); line-height: 1; align-self: end; }

/* Detail-Cockpit-Variante */
.kpi--detail {
  background: linear-gradient(135deg, #6d28d9, #4c1d95);
  color: #fff;
  border-color: #4c1d95;
}
.kpi--detail .kpi__label { color: rgba(255,255,255,0.78); }
.kpi--detail .kpi__sub { color: rgba(255,255,255,0.85); }

/* ---- Methods (Akkordeon) ---- */
.method {
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  margin-bottom: var(--s-3);
  background: var(--ink-0);
  overflow: hidden;
}
.method__head {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: var(--s-3) var(--s-4);
  cursor: pointer;
  list-style: none;
}
.method__head::-webkit-details-marker { display: none; }
.method__num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--ink-200);
  color: var(--ink-700);
  font-size: var(--fs-sm);
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.method[open] .method__num { background: var(--brand-500); color: #fff; }
.method__title { font-weight: 600; color: var(--ink-900); flex: 1; }
.method__hint { font-weight: 400; color: var(--c-text-mute); font-size: var(--fs-sm); }
.method__status { font-size: var(--fs-sm); color: var(--ink-700); margin-left: auto; }
.method__chev {
  width: 16px; height: 16px;
  transition: transform .2s;
  color: var(--ink-500);
}
.method[open] .method__chev { transform: rotate(90deg); }
.method__body {
  padding: 0 var(--s-4) var(--s-4);
  border-top: 1px solid var(--c-border);
  padding-top: var(--s-3);
}

/* ---- Result-Cockpit ---- */
.cockpit {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: var(--s-3);
  align-items: stretch;
}
.kpi {
  background: var(--ink-50);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: var(--s-4);
  display: flex;
  flex-direction: column;
  gap: var(--s-1);
}
.kpi--hero {
  background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
  color: #fff;
  border-color: var(--brand-700);
}
.kpi__label {
  font-size: var(--fs-xs);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--c-text-mute);
  font-weight: 600;
}
.kpi--hero .kpi__label { color: rgba(255,255,255,0.78); }
.kpi__value {
  font-size: var(--fs-2xl);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--ink-900);
  line-height: 1.1;
}
.kpi--hero .kpi__value { font-size: var(--fs-3xl); color: #fff; }
.kpi__unit {
  font-size: var(--fs-md);
  color: var(--c-text-mute);
  margin-left: 4px;
  font-weight: 500;
}
.kpi--hero .kpi__unit { color: rgba(255,255,255,0.78); }
.kpi__sub {
  font-size: var(--fs-xs);
  color: var(--c-text-mute);
  margin-top: var(--s-1);
}
.kpi--hero .kpi__sub { color: rgba(255,255,255,0.7); }

/* ---- Ampel-Indikator ---- */
.ampel {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: 4px 10px;
  border-radius: 999px;
  font-size: var(--fs-xs);
  font-weight: 600;
  background: var(--ink-100);
  color: var(--ink-700);
}
.ampel__dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--ink-400);
}
.ampel--gruen { background: #dcfce7; color: #166534; }
.ampel--gruen .ampel__dot { background: var(--ok-500); }
.ampel--gelb  { background: #fef3c7; color: #92400e; }
.ampel--gelb  .ampel__dot { background: var(--warn-500); }
.ampel--rot   { background: #fee2e2; color: #991b1b; }
.ampel--rot   .ampel__dot { background: var(--bad-500); }
.ampel--grau  { background: var(--ink-100); color: var(--ink-500); }
.ampel--grau  .ampel__dot { background: var(--ink-400); }

/* =========================================================================
   S5 — Wärmeübergabe / Heizkreise / Heizflächen
   ========================================================================= */
.kreis-row {
  display: flex; align-items: end; gap: var(--s-2);

.wp-liste {

}

  display: flex; flex-direction: column; gap: var(--s-2);

}
.wp-card:hover { border-color: var(--brand-500); }
.wp-card--selected { border-color: var(--brand-500); box-shadow: 0 0 0 2px var(--brand-100); }
.wp-card__img {
  height: 140px; display: flex; align-items: center; justify-content: center;

}
.wp-card__img img { max-width: 100%; max-height: 100%; object-fit: contain; }
.wp-card__placeholder {

.wp-card__title { display: flex; flex-direction: column; gap: 2px; }
.wp-card__title strong { color: var(--brand-700); font-size: var(--fs-md); }
.wp-card__title span { color: var(--ink-700); font-size: var(--fs-sm); }
.wp-card__stats {
  display: flex; flex-wrap: wrap; gap: var(--s-2);
  font-size: var(--fs-xs); color: var(--ink-600);
}

.wp-detail__head {
  display: flex; flex-wrap: wrap; align-items: center; gap: var(--s-2);
  padding-bottom: var(--s-2); border-bottom: 1px dashed var(--c-border);
  margin-bottom: var(--s-3);
}
.wp-detail__head strong { color: var(--brand-700); }
.wp-detail__head .ampel { margin-left: auto; }

/* ---- Footer ---- */
.app-footer {
  border-top: 1px solid var(--c-border);
  padding: var(--s-5) 0;
  font-size: var(--fs-xs);
  color: var(--c-text-mute);
  background: var(--ink-0);
}
.app-footer__inner {
  display: flex;
  justify-content: space-between;
  gap: var(--s-3);
  flex-wrap: wrap;
}

/* =========================================================================
   S6 — Erklär-Boxen (info-helper)
   ========================================================================= */
.info-box {
  margin-top: var(--s-2);
  border: 1px solid var(--ink-200);
  border-radius: var(--r-sm);
  background: var(--ink-50);
  font-size: var(--fs-sm);
}
.info-box[open] { background: #eff6ff; border-color: #bfdbfe; }
.info-box__sum {
  list-style: none;
  display: flex; align-items: center; gap: var(--s-2);
  padding: 6px 10px;
  cursor: pointer;
  user-select: none;
  color: var(--ink-600);
}
.info-box__sum::-webkit-details-marker { display: none; }
.info-box__sum::after {
  content: '▾';
  margin-left: auto;
  color: var(--ink-400);
  transition: transform 120ms;
}
.info-box[open] .info-box__sum::after { transform: rotate(180deg); }
.info-box__icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--info-500); color: #fff;
  font-size: 11px; font-weight: 700;
}
.info-box__label { font-weight: 500; }
.info-box__body {
  padding: 6px 10px 10px 36px;
  color: var(--ink-700);
  line-height: 1.5;
}

/* =========================================================================
   S6 — Förder-Karten
   ========================================================================= */
.foerder-liste { display: flex; flex-direction: column; gap: var(--s-3); }
.foerder-group { display: flex; flex-direction: column; gap: var(--s-2); }
.foerder-group__title {
  font-size: var(--fs-md); font-weight: 600;
  color: var(--ink-700);
  margin: var(--s-2) 0 var(--s-1);
  border-bottom: 1px solid var(--c-border);
  padding-bottom: 4px;
}
.foerder-card {
  border: 1px solid var(--c-border);
  border-left: 4px solid var(--brand-500);
  border-radius: var(--r-sm);
  background: var(--ink-0);
  padding: var(--s-3);
  display: flex; flex-direction: column; gap: 6px;
}
.foerder-card--bund { border-left-color: var(--info-500); }
.foerder-card--kanton { border-left-color: var(--brand-500); }
.foerder-card__head {
  display: flex; align-items: baseline; gap: var(--s-2);
  flex-wrap: wrap;
}
.foerder-card__ebene {
  font-size: var(--fs-xs); font-weight: 700;
  color: var(--c-brand);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.foerder-card__name {
  font-size: var(--fs-md); font-weight: 600;
  color: var(--ink-900);
  flex: 1;
}
.foerder-card__tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  font-size: var(--fs-xs);
  padding: 2px 6px;
  border-radius: var(--r-xs);
  background: var(--ink-100);
  color: var(--ink-700);
}
.foerder-card__betrag { color: var(--ink-900); font-size: var(--fs-md); }
.foerder-card__schaetz { color: var(--brand-700); font-size: var(--fs-sm); }
.foerder-card__bedingung { color: var(--ink-600); font-size: var(--fs-sm); }
.foerder-card__foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 4px; gap: var(--s-2);
  flex-wrap: wrap;
}
.badge {
  font-size: var(--fs-xs);
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
}
.badge--kombi { background: #dcfce7; color: #166534; }
.badge--solo  { background: #fee2e2; color: #991b1b; }
.foerder-card__link {
  font-size: var(--fs-sm);
  color: var(--c-brand);
  font-weight: 500;
}

/* =========================================================================
   S6 — Baubewilligungs-Boxen
   ========================================================================= */
.bewilligung-box {
  border: 1px solid var(--c-border);
  border-radius: var(--r-sm);
  padding: var(--s-3);
  margin-bottom: var(--s-2);
  background: var(--ink-0);
}
.bewilligung-box--prim {
  border-left: 4px solid var(--warn-500);
  background: #fffbeb;
}
.bewilligung-box__head {
  display: flex; align-items: center; gap: var(--s-2);
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.bewilligung-box__icon { font-size: var(--fs-lg); }
.bewilligung-box__details, .bewilligung-box__frist {
  margin-top: 6px;
  color: var(--ink-700);
  font-size: var(--fs-sm);
}
.bewilligung-pill {
  font-size: var(--fs-xs);
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 600;
  margin-left: auto;
}
.bewilligung-pill--ja { background: #fee2e2; color: #991b1b; }
.bewilligung-pill--nein { background: #dcfce7; color: #166534; }
.bewilligung-foot {
  display: flex; flex-wrap: wrap;
  gap: var(--s-3);
  margin-top: var(--s-3);
  padding-top: var(--s-2);
  border-top: 1px solid var(--c-border);
  font-size: var(--fs-sm);
  align-items: center;
}
.bewilligung-portal {
  background: var(--brand-50);
  color: var(--brand-700);
  padding: 4px 10px;
  border-radius: var(--r-sm);
  font-weight: 500;
}
.bewilligung-kontakt { color: var(--ink-500); margin-left: auto; }

/* =========================================================================
   S6 — Cockpit-Vergleich
   ========================================================================= */
.cockpit--vergleich {
  background: var(--ink-50);
  border: 1px dashed var(--c-border);
  border-radius: var(--r-sm);
  padding: var(--s-3);
}
.kpi--vergleich {
  background: var(--ink-0);
  border-left: 4px solid var(--brand-500);
}
.cockpit-wp { padding: var(--s-2); }
.cockpit-wp__row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: var(--s-2);
  font-size: var(--fs-sm);
}
.cockpit-wp__row > div { padding: 4px 8px; background: var(--ink-50); border-radius: var(--r-xs); }
.cockpit-wp__row > div strong { color: var(--ink-900); }

/* =========================================================================
   Responsive (Mobile-tauglich)
   ========================================================================= */
@media (max-width: 880px) {
  :root { --fs-2xl: 24px; --fs-3xl: 32px; }
  .grid--2, .grid--3, .grid--4 { grid-template-columns: 1fr; }
  .col-span-2, .col-span-3 { grid-column: span 1; }
  .cockpit { grid-template-columns: 1fr 1fr; }
  .cockpit .kpi--hero { grid-column: 1 / -1; }
  .period {
    grid-template-columns: 1fr 1fr;
  }
  .topbar__inner { gap: var(--s-2); }
  .stepper { top: 92px; }
}
@media (max-width: 480px) {
  .container { padding: 0 var(--s-3); }
  .section { padding: var(--s-4); }
  .cockpit { grid-template-columns: 1fr; }
  .topbar__group .login-status { display: none; }
}

/* =========================================================================
   Print-Stub (für späteren PDF-Export, S7)
   ========================================================================= */
@media print {
  body { background: #fff; color: #000; }
  .topbar, .stepper, .app-footer, .btn, .add-row { display: none !important; }
  .app-main { padding: 0; }
  .container { max-width: none; padding: 0; }
  .section {
    page-break-inside: avoid;
    box-shadow: none;
    border: 1px solid #ddd;
    margin-bottom: 12px;
  }
  .section__head { border-bottom: 1px solid #ccc; padding-bottom: 4px; }
  .kpi--hero { background: none !important; color: #000 !important; border: 2px solid #000 !important; }
  .kpi--hero .kpi__value, .kpi--hero .kpi__label, .kpi--hero .kpi__unit, .kpi--hero .kpi__sub { color: #000 !important; }
  a { color: #000; text-decoration: underline; }
}


/* =========================================================================
   S7 — Topbar-Actions (Login · Projekte · Export · Neu · Speichern)
   ========================================================================= */
.topbar-actions {
  display: flex;
  gap: var(--s-2);
  align-items: center;
  flex-wrap: wrap;
}
.btn--sm {
  font-size: var(--fs-sm);
  padding: 6px 10px;
  border-radius: var(--r-sm);
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn--danger { color: var(--bad-500); }
.btn--danger:hover { background: rgba(220,38,38,.08); }
.login-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: var(--fs-sm);
  color: var(--c-text-mute);
}
.login-status__dot {
  display: inline-block;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ink-400);
}
.login-status__dot--on { background: var(--ok-500); }

/* =========================================================================
   S7 — Modal
   ========================================================================= */
.modal {
  position: fixed; inset: 0;
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal[hidden] { display: none; }
.modal__backdrop {
  position: absolute; inset: 0;
  background: rgba(15, 23, 42, .55);
  backdrop-filter: blur(2px);
}
.modal__panel {
  position: relative;
  background: var(--c-card);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  width: 480px;
  max-width: 100%;
  max-height: 90vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.modal__panel--wide { width: 880px; }
.modal__head {
  padding: var(--s-4) var(--s-5);
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--c-border);
}
.modal__title { font-size: var(--fs-xl); }
.modal__close {
  background: none; border: none;
  font-size: 24px; line-height: 1;
  color: var(--c-text-mute);
  padding: 4px 8px; border-radius: var(--r-sm);
}
.modal__close:hover { background: var(--ink-100); color: var(--ink-900); }
.modal__body {
  padding: var(--s-5);
  overflow-y: auto;
  flex: 1;
}
.modal__foot {
  padding: var(--s-4) var(--s-5);
  display: flex; gap: var(--s-2); justify-content: flex-end;
  border-top: 1px solid var(--c-border);
  background: var(--ink-50);
}
.modal__foot--export .btn { min-width: 120px; }
body.modal-open { overflow: hidden; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink-900);
  color: var(--ink-0);
  padding: 10px 18px;
  border-radius: var(--r-sm);
  font-size: var(--fs-sm);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms, transform 200ms;
  box-shadow: var(--shadow-lg);
}
.toast--show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.field__error { color: var(--bad-500); font-size: var(--fs-sm); min-height: 1em; margin-top: var(--s-1); }
.input--inline { width: auto; min-width: 220px; padding: 6px 10px; }
.input--ta { font-family: var(--ff); resize: vertical; min-height: 64px; }
.grid--1 { display: grid; grid-template-columns: 1fr; gap: var(--s-3); }

.proj-empty {

.export-opts { display: flex; flex-direction: column; gap: var(--s-2); }

// src/calc/heatload.mjs
// Norm-Heizlast nach SIA 384/1:2022 (Anwendung von DIN EN 12831-1:2017 in CH).
// Quelle: reference/wissensbasis-auszug.md §C, reference/referenzhaus-*.json.
//
// Pure Funktionen — keine DOM-/FS-Zugriffe.
// Eingabe: Raum-/Gebäude-Datenstrukturen, Konstanten injiziert.
// Ausgabe: { phiT, phiV, phiHL, phiRH, phiAuslg } pro Raum,
//          plus Gebäudesumme.
//
// Cascade pro Raum:
//   1. HT      = Σ(Uc · A · fRT) + ΔU_WB · A_um         [W/K]
//                (Uc = U + ΔU_WB, fRT je Anschluss)
//   2. V_inf   = 2 · V · n50 · e · ε                    [m³/h]
//      V_min   = V · n_min                              [m³/h]
//      V̇       = max(V_inf, V_min)                      [m³/h]
//   3. HV      = 0.34 · V̇                               [W/K]
//   4. Φ_T     = HT · (θint - θe)                        [W]
//      Φ_V     = HV · (θint - θe)                        [W]
//      Φ_HL    = Φ_T + Φ_V                               [W]
//   5. Φ_RH    = A · f_RH                                [W]   (nur bei Nachtabsenkung)
//   6. Φ_Auslg = (Φ_HL + Φ_RH) · fx                      [W]

/* ==========================================================================
   PRIMITIV-FORMELN
   ========================================================================== */

/** ht-Beitrag eines Bauteils: ht = (U + ΔU_WB) · A · fRT. */
function htBauteil({ u, deltaUWb = 0, A, fRT = 1.0 }){
  const uc = (Number(u) || 0) + (Number(deltaUWb) || 0);
  return uc * (Number(A) || 0) * (Number(fRT) || 0);
}

/** Σ HT eines Raumes über alle Bauteile. */
function sumHT(bauteile){
  if (!Array.isArray(bauteile)) return 0;
  return bauteile.reduce((s, b) => s + htBauteil(b), 0);
}

/** Lüftungsformeln. */
function vInf({ V, n50, e_wind, epsilon = 1.0 }){
  return 2 * (Number(V)||0) * (Number(n50)||0) * (Number(e_wind)||0) * (Number(epsilon)||0);
}
function vMin({ V, n_min }){ return (Number(V)||0) * (Number(n_min)||0); }
function vTherm({ V_inf, V_min }){ return Math.max(Number(V_inf)||0, Number(V_min)||0); }
function hVRaum(V_dot){ return 0.34 * (Number(V_dot)||0); } // c_p,Luft = 0.34 Wh/(m³·K)

/** fRT-Faktor für Anschluss-Typ ("aussenluft" | "erdreich" | "unbeheizt" | "beheizt"). */
function fRT_fromAnschluss({ anschluss, theta_int, theta_nb, theta_e, b_u, fg }){
  switch (anschluss){
    case 'aussenluft': return 1.0;
    case 'erdreich':   return Number(fg) || 0.5;          // Default fg2 ≈ 0.5
    case 'unbeheizt':  return Number(b_u) || 0.45;        // Default Wissensbasis
    case 'beheizt': {
      const dt = (Number(theta_int) - Number(theta_e));
      if (!Number.isFinite(dt) || dt === 0) return 0;
      return ((Number(theta_int) || 0) - (Number(theta_nb) || 0)) / dt;
    }
    default: return 1.0;
  }
}

/* ==========================================================================
   RAUM-CASCADE
   ========================================================================== */

/** Berechnet Φ_HL für einen Raum gemäss EN 12831-1.
 *  bauteile [{ u, deltaUWb, A, fRT }, ...]
 *  geometrie { A, V } (siehe envelope.raumVolumen / .raumFlaeche)
 *  klima { theta_e } in °C
 *  raumOpt { theta_int, n_min, n50, e_wind, epsilon, A_umfassung, deltaU_WB_pauschal,
 *            f_RH_W_pro_m2, f_x }
 */
function computeRoomHeatload({
  bauteile = [], geometrie = {}, klima = {}, raumOpt = {}
} = {}){
  const A = Number(geometrie.A) || 0;
  const V = Number(geometrie.V) || (A * (Number(geometrie.h) || 0));
  const theta_int = Number(raumOpt.theta_int);
  const theta_e   = Number(klima.theta_e);
  const dT = (Number.isFinite(theta_int) && Number.isFinite(theta_e)) ? (theta_int - theta_e) : 0;

  // 1) HT pro Bauteil + ggf. pauschaler ΔU_WB-Zuschlag auf A_umfassung
  const HT_bauteile = sumHT(bauteile);
  const A_um = Number(raumOpt.A_umfassung) || 0;
  const deltaU_pausch = Number(raumOpt.deltaU_WB_pauschal) || 0;
  const HT = HT_bauteile + deltaU_pausch * A_um;

  // 2) Lüftung
  const V_inf  = vInf({ V, n50: raumOpt.n50, e_wind: raumOpt.e_wind, epsilon: raumOpt.epsilon ?? 1.0 });
  const V_minR = vMin({ V, n_min: raumOpt.n_min });
  const V_dot  = vTherm({ V_inf, V_min: V_minR });
  const HV = hVRaum(V_dot);

  // 3) Φ_T, Φ_V, Φ_HL
  const phiT = HT * dT;
  const phiV = HV * dT;
  const phiHL = phiT + phiV;

  // 4) Wiederaufheiz-Zuschlag Φ_RH = A · f_RH
  const f_RH = Number(raumOpt.f_RH_W_pro_m2) || 0;
  const phiRH = A * f_RH;

  // 5) Auslegungsleistung (Standard fx=1.0; Sanierungs-/Unsicherheits-Aufschläge optional)
  const fx = Number(raumOpt.f_x) || 1.0;
  const phiAuslg = (phiHL + phiRH) * fx;

  return { HT, HV, V_inf, V_min: V_minR, V_dot, dT, phiT, phiV, phiHL, phiRH, phiAuslg };
}

/* ==========================================================================
   GEBÄUDE-AGGREGATION
   ========================================================================== */

/** Aggregiert eine Liste Raum-Resultate (Output von computeRoomHeatload).
 *  Liefert Σ phiHL, Σ phiRH, Σ phiAuslg, Anzahl Räume. */
function aggregateBuilding(roomResults){
  if (!Array.isArray(roomResults) || roomResults.length === 0){
    return { phiHL: 0, phiRH: 0, phiAuslg: 0, n: 0 };
  }
  let phiHL = 0, phiRH = 0, phiAuslg = 0;
  for (const r of roomResults){
    phiHL    += Number(r?.phiHL)    || 0;
    phiRH    += Number(r?.phiRH)    || 0;
    phiAuslg += Number(r?.phiAuslg) || 0;
  }
  return { phiHL, phiRH, phiAuslg, n: roomResults.length };
}

/* ==========================================================================
   VEREINFACHTES VERFAHREN (Schnell-Schätzung Φ' [W/m²], B1 LF07 S.443)
   ========================================================================== */

/** Φ_HL_geb ≈ Φ' · A_N. */
function phiVereinfacht({ phiSpez, A_N }){
  return (Number(phiSpez) || 0) * (Number(A_N) || 0);
}

const PHI_SPEZ_BAND = {
  'unsaniert_vor1975':       [130, 180],
  '1976_1994':               [70, 100],
  '1995_2001_WSVO':          [60, 90],
  'EnEV2009_GEGsaniert':     [30, 50],
  'Niedrigenergie':          [25, 40],
  'Passivhaus_MinergieP':    [10, 15]
};

   S4 — DETAIL-MODUS: BUILDING-LOAD AUS STATE
   ==========================================================================

   - Wenn Räume erfasst → raumweise computeRoomHeatload pro Raum

/** Synthetisiert pauschal-Anteil für Restfläche A_rest mit Global-U-Werten.
 *  Vereinfacht: 1 m² Wand + 0.15 m² Fenster + 1/n_geschosse Dach/Boden je m² Restfläche,
 *  Volumen = A_rest * h, Lüftung n_min = 0.5.
 *  uHuelle = { wand, fenster, dach, boden, tueren } (Zahlen).
 */
function computePauschalRest({ A_rest, h, n_geschosse = 2, uHuelle = {}, theta_int = 20, theta_e = -8, n_min = 0.5 }){
  const A = Number(A_rest) || 0;
  if (A <= 0) return { phiHL: 0, HT: 0, HV: 0, V: 0, dT: 0 };
  const hh = Number(h) || 2.5;
  const ng = Math.max(1, Number(n_geschosse) || 1);
  const dT = (Number(theta_int) || 20) - (Number(theta_e) || -8);
  const V  = A * hh;
  const u_w = Number(uHuelle.wand) || 0;
  const u_f = Number(uHuelle.fenster) || 0;
  const u_d = Number(uHuelle.dach) || 0;
  const u_b = Number(uHuelle.boden) || 0;
  // Bauteilflächen-Schätzung pro m² Restfläche (typisch CH-Wohnbau)
  const A_w = A * 1.0;          // Aussenwand-Anteil
  const A_f = A * 0.15;         // Fensteranteil 15%
  const A_d = A / ng;           // Dachfläche-Anteil
  const A_b = A / ng;           // Bodenfläche-Anteil
  const HT = u_w * A_w + u_f * A_f + u_d * A_d + u_b * A_b * 0.5; // Boden mit fRT≈0.5 (Erdreich)
  const HV = 0.34 * V * (Number(n_min) || 0.5);
  const phiHL = (HT + HV) * dT;
  return { phiHL, HT, HV, V, dT };
}

/** Hauptfunktion S4: Detail-Heizlast aus state.
 *  Erwartet state mit objekt.{ebf, geschosshoehe, tAussenAuslegung} und
 *  detail.{huelle, raeume, misch}.
 *  uHuelleResolved = { wand, fenster, dach, boden, tueren } — bereits aufgelöste Zahlen.
 */
function computeBuildingDetailLoad(state, uHuelleResolved = {}){
  const det = state?.detail || {};
  if (!det.aktiv) return null;
  const obj = state?.objekt || {};
  const theta_e = Number(obj.tAussenAuslegung);
  const ebf = Number(obj.ebf) || 0;
  const h = Number(obj.geschosshoehe) || 2.5;
  const n_geschosse = Number(obj.anzahl_geschosse) || (obj.typ === 'mfh' ? 4 : 2);

  // Raumweise
  const raeume = Array.isArray(det.raeume) ? det.raeume : [];
  const roomResults = [];
  let A_raeume = 0;
  for (const r of raeume){
    if (!r) continue;
    const A = Number(r.A) || (Number(r.l) > 0 && Number(r.b) > 0 ? Number(r.l) * Number(r.b) : 0);
    const hr = Number(r.h) || h;
    const beheizt = r.beheizt !== false; // Default true
    A_raeume += A;
    if (!beheizt){
      // Raum unbeheizt → kein Heizlast-Anteil, aber A trotzdem von Restfläche abziehen
      roomResults.push({ name: r.name || '–', A, beheizt: false, phiHL: 0, phiRH: 0, phiAuslg: 0 });
      continue;
    }
    // Bauteile aus r.bauteile (Auswahl referenziert Hülle)
    const bauteile = (r.bauteile || []).map(b => {
      const u_default = Number(uHuelleResolved[b.typ]) || 0;
      const u = (b.u != null && b.u !== '') ? Number(b.u) : u_default;

        u, deltaUWb: Number(b.deltaUWb) || 0,
        A: Number(b.A) || 0,
        fRT: (b.fRT != null && b.fRT !== '') ? Number(b.fRT) : 1.0
      };
    });
    const res = computeRoomHeatload({
      bauteile,
      geometrie: { A, h: hr, V: A * hr },
      klima: { theta_e },
      raumOpt: {
        theta_int: Number(r.theta_int) || 20,
        n_min: Number(r.n_min) || 0.5,
        n50: Number(r.n50) || 4,
        e_wind: Number(r.e_wind) || 0.02,
        epsilon: 1.0,
        f_RH_W_pro_m2: Number(r.f_RH) || 0,
        f_x: 1.0
      }
    });
    roomResults.push(Object.assign({ name: r.name || ('Raum ' + (roomResults.length+1)), A, beheizt: true }, res));

  const phi_raeume = roomResults.reduce((s, r) => s + (Number(r.phiHL) || 0), 0);

  const A_rest = Math.max(0, ebf - A_raeume);

  let restDetail = null;
  if (det.misch && det.misch.rest_global !== false && A_rest > 0){

      A_rest, h, n_geschosse, uHuelle: uHuelleResolved,
      theta_int: 20, theta_e
    });
    phi_rest = restDetail.phiHL;
  }
  const phiHL_total = phi_raeume + phi_rest;
  return {
    phiHL_total, phi_raeume, phi_rest, A_raeume, A_rest,
    roomResults, restDetail,
    Qhl_kW: phiHL_total / 1000
  };
}

(function(){
// src/calc/distribution.mjs
// Wärmeübergabe-Plausibilität (Heizflächen, Vorlauftemperaturen, Heizkreise).
// Quelle: FWS Modul 3 §11 (Wärmeübergabe), VDI 6030 (Heizkörper-Auslegung),
//         Heizflächen-Korrekturkurven Q ∝ ΔT_log^n.
//
// Pure Funktionen — kein DOM-/FS-Zugriff.
//
// Modell:
//   Q(ΔT) = Q_norm · (ΔT_log,neu / ΔT_log,norm)^n
//   ΔT_log = (ΔT1 − ΔT2) / ln(ΔT1/ΔT2),  ΔTi = tWasser − tInnen
//   n = 1.30  Heizkörper (Konvektor-/Plattenheizkörper)
//   n = 1.10  Konvektor / spez. Bauart
//   n = 1.00  Fussbodenheizung
//   n = 1.05  Wandheizung
//
// Spez. Norm-Leistung (W/m² Heizflächen-Bezugsfläche) nach Gerätetyp,
// jeweils bei Norm-Auslegung der Heizfläche:
//   FBH  bei 35/28/20  → ca.  80 W/m² (Bodenfläche)
//   Wand bei 35/28/20  → ca.  80 W/m² (Heizfläche)
//   HK   bei 75/65/20  → ca. 1000 W/m² (HK-Frontfläche)
//
// Plausi-Ampel (Sanierungs-Frage „reicht alte HF bei niedrigerem VL?"):
//   deckungsgrad ≥ 1.00 → grün
//   0.85 ≤ deckungsgrad < 1.00 → gelb
//   deckungsgrad < 0.85 → rot
//
// Heizkreis-Aggregation: Liste { kreis, raeume[], A_total, Q_total } —
// nutzt der UI für Verteiler-Übersicht.

/* ==========================================================================
   KONSTANTEN
   ========================================================================== */

const N_EXPONENT = {
  fbh: 1.00,
  wandheizung: 1.05,
  heizkoerper: 1.30,
  konvektor: 1.10
};

/** Norm-Auslegung pro Heizflächentyp (Referenzpunkt der Korrekturkurve). */
const REF_AUSLEGUNG = {
  fbh:         { tVL: 35, tRL: 28, tInnen: 20, q_W_pro_m2:   80 },
  wandheizung: { tVL: 35, tRL: 28, tInnen: 20, q_W_pro_m2:   80 },
  heizkoerper: { tVL: 75, tRL: 65, tInnen: 20, q_W_pro_m2: 1000 },
  konvektor:   { tVL: 75, tRL: 65, tInnen: 20, q_W_pro_m2: 1500 }
};

/* ==========================================================================
   PRIMITIV-FORMELN
   ========================================================================== */

/** Logarithmische Mitteltemperatur-Differenz Heizfläche ↔ Raum [K].
 *  Wenn dT1 ≈ dT2 → arithmetisches Mittel (Limes der ln-Formel).
 *  Liefert 0 wenn eines der dT ≤ 0 (Heizfläche kann dann nicht heizen). */
function dTm({ tVL, tRL, tInnen = 20 } = {}){
  const a = Number(tVL) - Number(tInnen);
  const b = Number(tRL) - Number(tInnen);
  if (!Number.isFinite(a) || !Number.isFinite(b)) return 0;
  if (a <= 0 || b <= 0) return 0;
  if (Math.abs(a - b) < 0.01) return (a + b) / 2;
  return (a - b) / Math.log(a / b);
}

/** Leistungsfaktor f = (ΔT_neu / ΔT_ref)^n (relativ zur Norm-Auslegung).
 *  null wenn Heizflächentyp unbekannt oder ΔT_ref nicht berechenbar. */
function leistungsFaktor({ typ, tVL, tRL, tInnen = 20 } = {}){
  const ref = REF_AUSLEGUNG[typ];
  if (!ref) return null;
  const dT_neu = dTm({ tVL, tRL, tInnen });
  const dT_ref = dTm(ref);
  if (!(dT_ref > 0)) return null;
  if (!(dT_neu > 0)) return 0;
  const n = N_EXPONENT[typ] || 1.3;
  return Math.pow(dT_neu / dT_ref, n);
}

/** Ampel-Klassifikation aus Deckungsgrad. */
function ampelFromDeckungsgrad(d){
  if (d == null || !Number.isFinite(d)) return 'grau';
  if (d >= 1.00) return 'gruen';
  if (d >= 0.85) return 'gelb';
  return 'rot';
}

/* ==========================================================================
   PLAUSI: REICHT BESTEHENDE HEIZFLÄCHE BEI NEUER VORLAUFTEMP?
   ========================================================================== */

/** Plausibilitäts-Check Bestand: gegeben Heizlast, Heizfläche, Typ, neue VL/RL —
 *  reicht die Heizfläche?
 *
 *  @param {object} args
 *  @param {number} args.phiHL_raum       Heizlast Raum [W]
 *  @param {number} args.A_heizflaeche    Heizfläche [m²]
 *  @param {string} args.typ              'fbh' | 'wandheizung' | 'heizkoerper' | 'konvektor'
 *  @param {number} args.tVL_neu          Geplante neue Vorlauftemperatur [°C]
 *  @param {number} [args.tRL_neu]        Geplante Rücklauftemperatur [°C] (Default: tVL−7 für FBH/Wand, tVL−10 für HK/Konv)
 *  @param {number} [args.tInnen=20]      Innentemperatur [°C]
 *  @param {number} [args.q_norm_W_pro_m2] Override für spez. Norm-Leistung
 *  @returns {{ ampel, deckungsgrad, faktor, Q_real, hinweis }}
 */
function plausibilitaetHeizflaeche({
  phiHL_raum, A_heizflaeche, typ,
  tVL_neu, tRL_neu, tInnen = 20, q_norm_W_pro_m2
} = {}){
  const ref = REF_AUSLEGUNG[typ];
  if (!ref) return { ampel: 'grau', deckungsgrad: null, faktor: null, Q_real: 0, hinweis: 'Unbekannter Heizflächentyp' };
  const phi = Number(phiHL_raum) || 0;
  const A = Number(A_heizflaeche) || 0;
  const tVL = Number(tVL_neu);
  const dT_default = (typ === 'fbh' || typ === 'wandheizung') ? 7 : 10;
  const tRL = (tRL_neu == null || tRL_neu === '') ? (tVL - dT_default) : Number(tRL_neu);
  if (!(A > 0) || !(phi > 0)){
    return { ampel: 'grau', deckungsgrad: null, faktor: null, Q_real: 0, hinweis: 'Heizfläche oder Heizlast fehlt' };
  }
  const f = leistungsFaktor({ typ, tVL, tRL, tInnen });
  if (f == null){
    return { ampel: 'grau', deckungsgrad: null, faktor: null, Q_real: 0, hinweis: 'Vorlauf-/Rücklauftemperatur ungültig' };
  }
  const q_norm = Number(q_norm_W_pro_m2) || ref.q_W_pro_m2;
  const Q_real = q_norm * f * A;
  const deckungsgrad = Q_real / phi;
  const ampel = ampelFromDeckungsgrad(deckungsgrad);

  if (ampel === 'gruen') hinweis = 'Heizfläche reicht aus';
  else if (ampel === 'gelb') hinweis = 'Knapp — bei kalten Tagen evtl. Boost erforderlich';
  else hinweis = 'Heizfläche zu klein — Vergrösserung oder höhere VL nötig';
  return { ampel, deckungsgrad, faktor: f, Q_real, hinweis };

/* ==========================================================================
   MAX. VORLAUFTEMPERATUR BEI GEGEBENER HEIZFLÄCHE
   ========================================================================== */

/** Wieviel Vorlauftemperatur ist bei gegebener Heizfläche und Heizlast nötig?
 *  Iterative Lösung: dT_log_erforderlich = dT_ref · (Q_HL / (q_norm · A))^(1/n)
 *  Daraus über Annahme tRL = tVL − Spreizung → tVL.
 *  @returns {{ tVL_max, tRL_max, dT_log_req, dT_logSpan }} oder null bei ungültigen Inputs
 */
function maxVorlauftemperatur({
  phiHL_raum, A_heizflaeche, typ, tInnen = 20,
  spreizung = null, q_norm_W_pro_m2
} = {}){
  const ref = REF_AUSLEGUNG[typ];
  if (!ref) return null;
  const phi = Number(phiHL_raum) || 0;
  const A = Number(A_heizflaeche) || 0;
  if (!(phi > 0) || !(A > 0)) return null;
  const q_norm = Number(q_norm_W_pro_m2) || ref.q_W_pro_m2;
  const n = N_EXPONENT[typ] || 1.3;
  const dT_ref = dTm(ref);
  if (!(dT_ref > 0)) return null;
  // Q = q_norm · A · (dT/dT_ref)^n  →  dT = dT_ref · (Q/(q_norm·A))^(1/n)
  const factor = phi / (q_norm * A);
  if (!(factor > 0)) return null;

  const tVL_max = Number(tInnen) + dT_req + span / 2;
  const tRL_max = tVL_max - span;

   ========================================================================== */

/** Gruppiert Heizflächen-Einträge nach Heizkreis.
 *  Eingabe: Array { raumId, raumName?, A, typ, kreis, phiHL? }
 *  @returns {Array<{kreis, raeume:[{raumId, raumName, A, typ, phiHL}], A_total, phi_total, typen}>}
 */
function heizkreiseGruppieren(heizflaechen){
  const list = Array.isArray(heizflaechen) ? heizflaechen : [];
  const map = new Map();
  for (const h of list){
    const k = (h && h.kreis) || '–';
    if (!map.has(k)) map.set(k, { kreis: k, raeume: [], A_total: 0, phi_total: 0, typen: new Set() });
    const grp = map.get(k);
    grp.raeume.push({
      raumId: h.raumId ?? null,
      raumName: h.raumName || '',
      A: Number(h.A) || 0,
      typ: h.typ || '',
      phiHL: Number(h.phiHL) || 0

}

   STATE-INTEGRATION (S5)
   ========================================================================== */

/** Berechnet Plausi pro Raum-Heizfläche aus state + Detail-Heatload-Result.
 *  Liefert ein Bundle mit:
 *    - heizflaechen_flat: alle Heizflächen flach mit Plausi-Resultaten
 *    - kreise: gruppiert nach Heizkreis
 *    - global: Plausi für Global-Fallback (wenn keine Räume erfasst)
 *  detailLoad = computeBuildingDetailLoad-Ergebnis (kann null sein).
 */
function computeDistribution(state, detailLoad){
  if (!state || !state.detail) return null;
  const det = state.detail;
  const vert = det.verteilung || {};
  const raeume = Array.isArray(det.raeume) ? det.raeume : [];
  const tInnen_default = 20;
  const flat = [];
  const roomResults = (detailLoad && detailLoad.roomResults) || [];

  for (let i = 0; i < raeume.length; i++){
    const r = raeume[i];
    if (!r) continue;
    const tInnen = Number(r.theta_int) || tInnen_default;
    const rRes = roomResults[i] || null;
    const phiHL_raum = (rRes && Number.isFinite(rRes.phiHL)) ? rRes.phiHL : 0;
    const heizflaechen = Array.isArray(r.heizflaechen) ? r.heizflaechen : [];
    // Verteile Heizlast proportional zu Heizflächen-Soll-Leistungsfähigkeit (gleichmässig falls 1 Fläche)
    if (heizflaechen.length === 0) continue;
    // Gewichte: A · q_norm_typ (relativ)
    const gewichte = heizflaechen.map(h => {
      const ref = REF_AUSLEGUNG[h.typ];
      const A = Number(h.A) || 0;
      return ref ? ref.q_W_pro_m2 * A : 0;
    });
    const sumG = gewichte.reduce((s, g) => s + g, 0);
    const tVL_neu = (vert.global && Number(vert.global.tVL_neu)) || 35;
    const tRL_neu = (vert.global && Number(vert.global.tRL_neu)) || (tVL_neu - 7);
    for (let j = 0; j < heizflaechen.length; j++){
      const h = heizflaechen[j];
      const phi_anteil = sumG > 0 ? phiHL_raum * (gewichte[j] / sumG) : (phiHL_raum / heizflaechen.length);
      const plausi = plausibilitaetHeizflaeche({
        phiHL_raum: phi_anteil,
        A_heizflaeche: Number(h.A) || 0,
        typ: h.typ,
        tVL_neu, tRL_neu, tInnen
      });
      const tVL_req = maxVorlauftemperatur({
        phiHL_raum: phi_anteil,
        A_heizflaeche: Number(h.A) || 0,
        typ: h.typ, tInnen
      });
      flat.push({
        raumIdx: i, raumName: r.name || ('Raum ' + (i + 1)),
        bauteilIdx: j, typ: h.typ, A: Number(h.A) || 0, kreis: h.kreis_id || '–',
        phiHL: phi_anteil, plausi,
        tVL_max: tVL_req ? tVL_req.tVL_max : null,
        tRL_max: tVL_req ? tVL_req.tRL_max : null
      });
    }
  }

  const kreise = heizkreiseGruppieren(flat.map(f => ({
    raumId: f.raumIdx, raumName: f.raumName, A: f.A, typ: f.typ, kreis: f.kreis,
    phiHL: f.phiHL
  })));

  // Global-Plausi: nur wenn keine Räume erfasst sind
  let global = null;
  if (raeume.length === 0 && detailLoad && detailLoad.phiHL_total > 0){
    const g = vert.global || {};
    const tVL = Number(g.tVL_neu) || 35;
    const tRL = Number(g.tRL_neu) || (tVL - 7);
    global = {
      typ: g.typ || 'fbh',
      tVL_neu: tVL, tRL_neu: tRL,
      faktor: leistungsFaktor({ typ: g.typ || 'fbh', tVL, tRL, tInnen: tInnen_default })
    };
  }

  return { flat, kreise, global };
}

}

  const tol = (Number(kriterien.toleranz_proz) || 20) / 100;

/** Lineare Interpolation einer Power-Curve über die Aussentemperatur.
 *  Erwartet kennlinie = [{ T_aussen, Qh_wp, COP }] (sortiert oder unsortiert).
 */
function interpolatePowerCurve(kennlinie, T){
  const arr = (kennlinie || []).slice().sort((a, b) => a.T_aussen - b.T_aussen);
  if (arr.length === 0) return null;
  if (T <= arr[0].T_aussen) return Object.assign({}, arr[0]);
  if (T >= arr[arr.length - 1].T_aussen) return Object.assign({}, arr[arr.length - 1]);
  for (let i = 0; i < arr.length - 1; i++){
    if (T >= arr[i].T_aussen && T <= arr[i + 1].T_aussen){
      const k = (T - arr[i].T_aussen) / (arr[i + 1].T_aussen - arr[i].T_aussen);
      return {
        T_aussen: T,
        Qh_wp: arr[i].Qh_wp + k * (arr[i + 1].Qh_wp - arr[i].Qh_wp),
        COP:    arr[i].COP    + k * (arr[i + 1].COP    - arr[i].COP)

  }
  return Object.assign({}, arr[arr.length - 1]);

/** Bivalenzpunkt-Berechnung (FWS §18).
 *  Heizlast-Linie: Q_HL(T) = Qh · (T_HG − T) / (T_HG − T_N), T ≤ T_HG.
 *  WP-Linie: aus kennlinie linear interpoliert.
 *  Bivalenz: kleinste T, ab der Q_WP < Q_HL (WP deckt nicht mehr alleine).
 */
function bivalenzpunkt({ Qh_geb, kennlinie = [], T_N = -8, T_HG = 15 } = {}){
  const Qh = Number(Qh_geb) || 0;
  if (!(Qh > 0) || !Array.isArray(kennlinie) || kennlinie.length < 2 || !(T_HG > T_N)){
    return { T_biv: null, Qh_biv: 0, deckungEnergie: 0 };
  }
  const Qload = (T) => Qh * (T_HG - T) / (T_HG - T_N);
  // Diskrete Suche von T_N nach T_HG
  let T_biv = null, Q_biv = 0;
  const step = 0.5;
  for (let T = T_N; T <= T_HG; T += step){

    if (!wp) continue;
    const QL = Qload(T);
    if (wp.Qh_wp >= QL){
      T_biv = T;
      Q_biv = QL;
      break;
    }

  // Energie_total ∝ ∫(T_HG−T)dT von T_N bis T_HG, Defizit ∝ ∫(QL−Q_WP)dT von T_N bis T_biv.
  let energie_total = 0, defizit = 0;
  const dT = 0.5;
  for (let T = T_N; T <= T_HG; T += dT){

    const QL = Qload(T);
    energie_total += QL * dT;
    if (wp && wp.Qh_wp < QL && (T_biv == null || T < T_biv)){

function jazSchaetzung({

  if (ratio >= 0.75 && ratio <= 1.20)      { ampel = 'gruen'; hinweis = 'Modulation gut, kein Takten'; }

 *  '1978_1994', '1995_2000', '2001_2009', '2010_2015', '2016_heute', 'minergie'. */
function bauklasseFromBaujahr(baujahr){
  const y = Number(baujahr);
  if (!Number.isFinite(y) || y <= 0) return null;
  if (y < 1946) return 'vor1945';
  if (y <= 1960) return '1946_1960';
  if (y <= 1977) return '1961_1977';
  if (y <= 1994) return '1978_1994';
  if (y <= 2000) return '1995_2000';
  if (y <= 2009) return '2001_2009';
  if (y <= 2015) return '2010_2015';
  return '2016_heute';
}

/** Mappt einen FWS-Bauperiode-Key (z.B. '1971-1980') auf die u-werte.json-Bauklasse.
 *  Bei Spannweiten wird der Mittelwert genommen (so trifft '1971-1980' den
 *  Bauklassen-Schwerpunkt '1961_1977', '1986-1990' den '1978_1994' usw.). */
function bauklasseFromPeriode(periode){
  if (!periode || typeof periode !== 'string') return null;
  if (periode === 'minergie') return 'minergie';
  if (periode === '<1919') return 'vor1945';
  if (periode === '2011-heute') return '2016_heute';
  const m = periode.match(/(\d{4})\s*[-–]\s*(\d{4})/);
  if (m) return bauklasseFromBaujahr(Math.round((Number(m[1]) + Number(m[2])) / 2));
  const m2 = periode.match(/(\d{4})/);
  if (m2) return bauklasseFromBaujahr(Number(m2[1]));
  return null;
}

/** Sanierungsstand → Bauklassen-Override.
 *  'unsaniert' = original; 'teilsaniert' = ein Schritt jünger;
 *  'saniert' = '2010_2015'; 'minergie' = 'minergie'. */
function applySanierung(bauklasse, sanierungsstand){
  if (!bauklasse) return null;
  const order = ['vor1945','1946_1960','1961_1977','1978_1994',
                 '1995_2000','2001_2009','2010_2015','2016_heute','minergie'];
  switch (sanierungsstand){
    case 'minergie':    return 'minergie';
    case 'saniert':     return '2010_2015';
    case 'teilsaniert': {
      const i = order.indexOf(bauklasse);
      return i < 0 ? bauklasse : order[Math.min(order.length-1, i+1)];
    }
    case 'unsaniert':
    default:            return bauklasse;
  }
}

/* ==========================================================================
   U-WERT LOOKUP
   ========================================================================== */

/** Liest typischen U-Wert eines Bauteils aus u-werte.json.
 *  @param data       u-werte.json
 *  @param bauteil    'wand' | 'dach' | 'boden' | 'fenster'
 *  @param gebaeudetyp 'EFH' | 'MFH'
 *  @param bauklasse  'vor1945' | '1946_1960' | ... | 'minergie'
 *  @param variant    Sub-key bei dach/boden/fenster (Default sinnvoll).
 *  @returns { typ, min, max, gen? } oder null bei Lookup-Fail. */
function lookupUWert(data, { bauteil, gebaeudetyp, bauklasse, variant }){
  if (!data || !bauklasse) return null;
  const typeKey = String(gebaeudetyp || 'EFH').toUpperCase();

  if (bauteil === 'wand'){
    const node = data.wandUWert?.[typeKey]?.[bauklasse];
    if (!node) return null;
    return { typ: node.typ ?? null, min: node.min ?? null, max: node.max ?? null };
  }
  if (bauteil === 'dach'){
    const v = variant || 'steildach';
    const node = data.dachUWert?.[v]?.[bauklasse];
    if (!node) return null;
    return { typ: node.typ ?? null, min: node.min ?? null, max: node.max ?? null };
  }
  if (bauteil === 'boden'){
    const v = variant || 'gegenErdreich';
    const node = data.bodenUWert?.[v]?.[bauklasse];
    if (!node) return null;
    return { typ: node.typ ?? null, min: node.min ?? null, max: node.max ?? null };
  }
  if (bauteil === 'fenster'){
    const gen = variant || data.fensterGenerationDefault?.[bauklasse] || null;
    if (gen && data.fensterGenerationen?.[gen]?.uw != null){
      return { typ: data.fensterGenerationen[gen].uw, min: null, max: null, gen };
    }
    if (gen && data.fensterUWert?.[gen]){
      const node = data.fensterUWert[gen];
      return {
        typ: node.uFenster_kunststoff?.typ ?? node.uFenster_holz?.typ ?? null,
        min: node.uFenster_kunststoff?.min ?? null,
        max: node.uFenster_kunststoff?.max ?? null
      };
    }
    return null;
  }
  return null;
}

/* ==========================================================================
   SCHICHT-AUFBAU → U-WERT (DIN EN ISO 6946)
   ========================================================================== */

/** RT = Rsi + Σ(d/λ) + Rse, U = 1/RT.
 *  @param layers   [{ d:[m], lambda:[W/(m·K)] }, ...]
 *  @param Rsi/Rse  Übergangswiderstände in m²·K/W. Defaults: horizontal (0.13/0.04). */
function uFromLayers(layers, Rsi = 0.13, Rse = 0.04){
  if (!Array.isArray(layers) || layers.length === 0) return null;
  let R = Rsi + Rse;
  for (const L of layers){
    const d = Number(L?.d), lam = Number(L?.lambda);
    if (!Number.isFinite(d) || !Number.isFinite(lam) || lam <= 0) continue;
    R += d / lam;
  }
  return R > 0 ? 1 / R : null;
}

/** Übergangswiderstands-Konvention (DIN EN ISO 6946). */
const RSI_RSE = {
  horizontal: { Rsi: 0.13, Rse: 0.04 },
  aufwaerts:  { Rsi: 0.10, Rse: 0.04 },
  abwaerts:   { Rsi: 0.17, Rse: 0.04 }
};

/** Bauteil-Default aus u-werte.json `bauteilDefaults` zu Schichten ausbauen.
 *  daemmstoffeKatalog (data.daemmstoffe) liefert λ pro Material-Key. */
function defaultLayersForBauteil(data, { bauteil, bauklasse, gedaemmt = false }){
  const root = data?.bauteilDefaults?.[bauteil];
  const node = root?.[bauklasse];
  if (!node) return null;
  const layers = [];
  if (node.putzAussen)  layers.push({ d: node.putzAussen.d,  lambda: node.putzAussen.lambda });
  if (node.tragschicht) layers.push({ d: node.tragschicht.d, lambda: node.tragschicht.lambda });
  if (node.putzInnen)   layers.push({ d: node.putzInnen.d,   lambda: node.putzInnen.lambda });
  if (gedaemmt && node.daemmung){
    const matKey = node.daemmung.material;
    const lam = data?.daemmstoffe?.[matKey]?.lambda;
    if (lam && node.daemmung.dicke > 0){
      layers.push({ d: node.daemmung.dicke, lambda: lam });
    }
  }
  return layers;
}

/* ==========================================================================
   HÜLLFLÄCHEN
   ========================================================================== */

/** Aggregiert Bauteilflächen pro Typ.
 *  bauteile = [{ typ:'AW'|'AF'|'DE'|'FB'|'IW'|'IT', A:[m²] }, ...] */
function aggregateAreas(bauteile){
  const out = {};
  if (!Array.isArray(bauteile)) return out;
  for (const b of bauteile){
    const A = Number(b?.A);
    if (!Number.isFinite(A) || A <= 0) continue;
    const key = String(b.typ || 'unbekannt');
    out[key] = (out[key] || 0) + A;
  }
  return out;
}

/** Umfassungsfläche A_um = Σ A für Bauteile, die als Hülle zählen. */
function huellflaeche(bauteile, includeTypes = ['AW','AF','DE','FB','AT']){
  if (!Array.isArray(bauteile)) return 0;
  return bauteile.reduce((s, b) => {
    if (!includeTypes.includes(b?.typ)) return s;
    const A = Number(b?.A);
    return s + (Number.isFinite(A) && A > 0 ? A : 0);
  }, 0);
}

/** Volumen aus Geometrie. Akzeptiert {V} oder {A,h} oder {l,b,h}. */
function raumVolumen(g){
  if (!g) return 0;
  const V = Number(g.V);
  if (Number.isFinite(V) && V > 0) return V;
  const A = Number(g.A);
  const h = Number(g.h);
  if (Number.isFinite(A) && A > 0 && Number.isFinite(h) && h > 0) return A * h;
  const l = Number(g.l), b = Number(g.b);
  if (Number.isFinite(l) && Number.isFinite(b) && Number.isFinite(h) && l > 0 && b > 0 && h > 0){
    return l * b * h;
  }
  return 0;
}

/** Fläche aus Geometrie. Akzeptiert {A} oder {l,b}. */
function raumFlaeche(g){
  if (!g) return 0;
  const A = Number(g.A);
  if (Number.isFinite(A) && A > 0) return A;
  const l = Number(g.l), b = Number(g.b);
  if (Number.isFinite(l) && Number.isFinite(b) && l > 0 && b > 0) return l * b;
  return 0;
}

})();

// src/calc/dhw.mjs
// Warmwasser-Auslegung — FWS-Methode (Modul 3 §8) + Norm-Werte SIA 385/2.
// Quelle: reference/FWS-RECHENWEGE.md §6/§9, reference/wissensbasis-auszug.md §D.
//
// Pure Funktionen — kein DOM-/FS-Zugriff.
//
// Hauptpfade:
//   1. VW,u (Tagesvolumen) — direkt | Personen × l/(P·d) | Messung (QW,u direkt)
//   2. QW,u = V · cp · ΔT / 3600                                [kWh/d]
//   3. QWW = QW,u + Σ Verluste (Speicher, Zirkulation, Ausstoss) [kWh/d]
//   4. Qn,WW = QWW · 365                                         [kWh/a]
//   5. Qw  = Q_HL · (24/(24−td) − 1), td = QWW/Q_HL              [kW]
//   6. VW,Sto = QWW / (cp·ΔT/3600) · f_Sto                       [l]

/* ==========================================================================
   KONSTANTEN
   ========================================================================== */

const C_P = 4.2;     // kJ/(kg·K), Wasser
const RHO_W = 1.0;   // kg/l

// Tagesbedarf pro Person — SIA 385/2 / FWS §8.1 / Wissensbasis D

  { key:'sparsam',  label:'Sparsam (Dusche)',     lPd: 30 },
  { key:'normal',   label:'Normal (Standard)',     lPd: 40 },
  { key:'komfort',  label:'Komfort (inkl. Bad)',  lPd: 55 },
  { key:'mfh',      label:'MFH allgemein',         lPd: 35 },
  { key:'mfh_geh',  label:'MFH gehoben',           lPd: 45 },
  { key:'buero',    label:'Bürogebäude',           lPd:  3 }
];

const F_STO_PRESETS = [
  { key:'innen',  label:'Innenliegender WT (Misch- + Kaltzone)',     fSto: 1.25 },
  { key:'aussen', label:'Aussenliegender WT (nur Mischzone)',         fSto: 1.10 },
  { key:'ohne',   label:'Keine Misch-/Kaltzone (ideale Schichtung)',  fSto: 1.00 }
];

  speicher: 10,    // %

  ausstoss: 15     // %

/** VW,u aus Personen × l/(P·d) oder Direkteingabe.
 *  inputs = { modus:'direkt'|'personen'|'messung', VW_u, personen, lProPerson, QW_u? } */
function effectiveVWu(inputs = {}){
  if (inputs.modus === 'personen'){
    const p = Number(inputs.personen) || 0;
    const l = Number(inputs.lProPerson) || 40;
    return p * l;
  }
  if (inputs.modus === 'messung') return 0; // QW,u wird direkt geliefert

/** QW,u Tages-Nutzwärmebedarf [kWh/d]. */
function qwuTag({ V_l_d, cp = C_P, dT = 50 }){
  return ((Number(V_l_d) || 0) * cp * (Number(dT) || 0)) / 3600;
}

/** QWW [kWh/d] = QW,u · Π(1 + f_i). */
function qwwTag({ QW_u, fSpeicher = 0, fZirk = 0, fAusstoss = 0 }){
  return (Number(QW_u) || 0)
       * (1 + (Number(fSpeicher) || 0)/100)
       * (1 + (Number(fZirk) || 0)/100)
       * (1 + (Number(fAusstoss) || 0)/100);
}

/** Qn,WW Jahres-Kompaktformel (FWS §8). */
function qnwwJahr({ V_l_d, cp = C_P, dT = 50, fSpeicher = 0, fZirk = 0, fAusstoss = 0 }){
  if (!(V_l_d > 0)) return 0;
  const base = V_l_d * cp * dT / 3600 * 365;
  const factor = (1 + fSpeicher/100) * (1 + fZirk/100) * (1 + fAusstoss/100);
  return base * factor;
}

/** Qw — WP-Leistungszuschlag für WW. td auf [0,12] geclampt. */
function qw({ Qhl, QWW_Tag }){
  if (!(Qhl > 0) || !(QWW_Tag > 0)) return { Qw: 0, td: 0, tdRaw: 0, tdClamped: false };
  const tdRaw = QWW_Tag / Qhl;
  const td = Math.max(0, Math.min(12, tdRaw));
  return {
    Qw: Qhl * (24/(24 - td) - 1),
    td, tdRaw, tdClamped: tdRaw > 12
  };

/** VW,Sto-Roh: V = QWW_Tag / (cp·ΔT/3600). */
function vwStoRoh({ QWW_Tag, cp = C_P, dT = 50 }){
  if (!(QWW_Tag > 0) || !(dT > 0)) return 0;
  return QWW_Tag / (cp * dT / 3600);
}

/** Marktrealistische Speichervolumen-Staffelung (AUFRUNDEN).
 *  ≤ 200 L → 50er, 200..500 L → 100er, 500..1000 L → 250er, > 1000 L → 500er. */
function rundeSpeicherMarkt(V){
  if (!(V > 0)) return 0;
  if (V <= 200) return Math.ceil(V / 50)  * 50;
  if (V <= 500) return Math.ceil(V / 100) * 100;
  if (V <= 1000) return Math.ceil(V / 250) * 250;
  return Math.ceil(V / 500) * 500;
}

/** Heizpuffer-Staffelung (Variante mit feinerer Auflösung): ≤ 200 L → 50er, ≤ 500 L → 100er, sonst 200er. */
function rundePufferMarkt(V){
  if (!(V > 0)) return 0;
  if (V <= 200) return Math.ceil(V / 50)  * 50;
  if (V <= 500) return Math.ceil(V / 100) * 100;
  return Math.ceil(V / 200) * 200;
}

/** Speichervolumen mit f_Sto-Aufschlag, gerundet 10-L-Schritte (FWS-Default). */
function speichervolumen({ QWW_Tag, cp = C_P, dT = 50, fSto = 1.0 }){
  const V = vwStoRoh({ QWW_Tag, cp, dT });

  const Q = Number(Qh_kW) || 0;
  if (Q <= 0) return null;

  if (Q <= 50)       { dn = 'DN15';  anschluss = '1/2"'; p_ansprech = 3.0; }
  else if (Q <= 100) { dn = 'DN20';  anschluss = '3/4"'; p_ansprech = 3.0; }
  else if (Q <= 200) { dn = 'DN25';  anschluss = '1"';   p_ansprech = 3.0; }

  const PTS = [
    [30, 0.0061], [40, 0.0096], [50, 0.0143], [60, 0.0181],
    [70, 0.0226], [80, 0.0284], [90, 0.0344], [100, 0.0408]

   ========================================================================== */

 *
 * @param {{programme: Array}} foerderDb  geladene foerderungen.json
 * @param {object} kriterien
 * @param {string} kriterien.kanton        2-Letter-Code (ZH, BE, ...) — leer = nur Bund
 * @param {string} kriterien.massnahme     Massnahme-ID
 * @param {string} [kriterien.wp_quelle]   'luft' | 'sole' | 'wasser' — filtert WP-Programme heuristisch

function filterFoerderungen(foerderDb, kriterien){

  const k = (kriterien && kriterien.kanton || '').toUpperCase().trim();
  const m = kriterien && kriterien.massnahme || '';

      const isSole = /sol[e/]|wasser\/wasser|sol\/eau|eau\/eau|salamoia/.test(nameLower);
      const isLuft = /luft\/wasser|air\/eau|aria\/acqua/.test(nameLower);
      const isWasser = /wasser\/wasser|eau\/eau/.test(nameLower);
      // Wenn Programm spezifisch ist und nicht zur Quelle passt, ausblenden.
      if (q === 'luft' && (isSole || isWasser) && !isLuft) continue;
      if (q === 'sole' && isLuft && !isSole) continue;
      if (q === 'wasser' && isLuft && !(isWasser || isSole)) continue;
    }
    matches.push(p);
  }

  // Sortierung: Bund (kanton === '*') zuerst, dann nach Kanton-Code, dann Name.
  matches.sort((a, b) => {
    const ka = (a.kanton || '').toUpperCase(), kb = (b.kanton || '').toUpperCase();
    if (ka === '*' && kb !== '*') return -1;
    if (kb === '*' && ka !== '*') return 1;
    if (ka !== kb) return ka < kb ? -1 : 1;
    return String(a.name).localeCompare(String(b.name));
  });
  return matches;
}

/**
 * Liefert kantonale Baubewilligungs-Hinweise für gegebenen Kanton.
 *
 * @param {object} bauDb  geladene baubewilligungen.json
 * @param {string} kanton 2-Letter-Code
 * @returns {object|null} kantonsspezifische Hinweise oder null
 */
function lookupBaubewilligung(bauDb, kanton){
  if (!bauDb || !bauDb.kantone) return null;
  const k = (kanton || '').toUpperCase().trim();
  if (!k) return null;
  return bauDb.kantone[k] || null;
}

/**
 * Schätzt einen Förderbetrag auf Basis der Q_h-Auslegungsleistung bzw. Bauteilfläche.
 * Nur Richtwert für Anzeige — verbindlich ist immer das Antragsportal.
 *
 * @param {object} program     Programm-Eintrag
 * @param {object} kontext     { Qh_kW, A_bauteil_m2, kollektor_m2, kWp }
 * @returns {number|null} CHF-Betrag oder null wenn nicht ableitbar.
 */
function schaetzeBetrag(program, kontext){
  if (!program) return null;
  const grund = Number(program.betrag_chf_grund) || 0;
  const perUnit = Number(program.betrag_chf_per_unit) || 0;
  const einheit = (program.einheit || '').toLowerCase();
  let menge = 0;
  if (einheit === 'chf/kw') menge = Number(kontext && kontext.Qh_kW) || 0;
  else if (einheit === 'chf/m²' || einheit === 'chf/m2') {
    // Bauteilfläche / Kollektor / je nach Massnahme
    if ((program.massnahmen || []).includes('thermische_solar')){
      menge = Number(kontext && kontext.kollektor_m2) || 0;
    } else {
      menge = Number(kontext && kontext.A_bauteil_m2) || 0;
    }
  }
  else if (einheit === 'chf/kwp') menge = Number(kontext && kontext.kWp) || 0;
  else if (einheit === 'pauschal') return grund > 0 ? grund : null;

  if (grund <= 0 && perUnit <= 0) return null;
  if (menge <= 0 && perUnit > 0 && grund <= 0) return null;
  return grund + perUnit * menge;
}

/**
 * Vergleicht Norm-Heizlast mit FWS-Verbrauchs-Heizlast und liefert Ampel.
 *
 * Schwellen (Spezifikation S6):
 *   <10 %  → grün (Werte stimmen gut überein)
 *   10–25 % → gelb (Verbrauchsdaten prüfen)
 *   >25 %  → rot (Konflikt — einer der Werte stimmt nicht)
 *
 * @param {number} Qhl_norm_kW Norm-Heizlast (Detail) in kW
 * @param {number} Qhl_fws_kW  FWS-Verbrauchs-Heizlast in kW
 * @returns {{abweichung_proz:(number|null), ampel:('gruen'|'gelb'|'rot'|'grau'), hinweis:string}}
 */
function vergleichNormVerbrauch(Qhl_norm_kW, Qhl_fws_kW){
  const a = Number(Qhl_norm_kW), b = Number(Qhl_fws_kW);
  if (!Number.isFinite(a) || !Number.isFinite(b) || a <= 0 || b <= 0){
    return { abweichung_proz: null, ampel: 'grau', hinweis: 'Werte unvollständig — Vergleich nicht möglich.' };
  }
  const abw = Math.abs(a - b) / Math.max(a, b) * 100;
  if (abw < 10){
    return { abweichung_proz: abw, ampel: 'gruen', hinweis: 'Werte stimmen gut überein — Auslegung plausibel.' };
  }
  if (abw < 25){
    return { abweichung_proz: abw, ampel: 'gelb',
      hinweis: 'Mittlere Abweichung — Verbrauchsdaten prüfen (Klimakorrektur, WW-Anteil, Stillstand).' };
  }
  return { abweichung_proz: abw, ampel: 'rot',
    hinweis: 'Grosse Abweichung — einer der Werte stimmt nicht (Bauteilflächen / U-Werte / Verbrauchsbilanz).' };
}

/**
 * Gruppiert/aggregiert die Liste — sinnvoll fürs Cockpit.
 * @returns {{ bund: Array, kanton: Array, total_geschaetzt: number|null }}
 */
function gruppiereProgramme(programme, kontext){
  const bund = [], kanton = [];
  let total = 0; let any = false;
  for (const p of programme){
    if ((p.kanton || '').toUpperCase() === '*') bund.push(p);
    else kanton.push(p);
    const b = schaetzeBetrag(p, kontext);
    if (b != null && Number.isFinite(b) && b > 0){ total += b; any = true; }
  }
  return { bund, kanton, total_geschaetzt: any ? total : null };
}

function infoBox(key, label){
  const txt = ERKLAER[key];
  if (!txt) return '';
  const labelTxt = label || 'Info';
  return `
    <details class="info-box">
      <summary class="info-box__sum">
        <span class="info-box__icon" aria-hidden="true">ⓘ</span>
        <span class="info-box__label">${esc(labelTxt)}</span>
      </summary>
      <div class="info-box__body">${txt}</div>
    </details>`;
}

const BAUTEIL_LABELS = {
  wand:    'Aussenwand',
  fenster: 'Fenster',
  dach:    'Dach',
  boden:   'Boden / Kellerdecke',
  tueren:  'Aussentüren'
};

const BAUTEIL_FRT_DEFAULT = {
  wand: 1.0, fenster: 1.0, dach: 1.0, boden: 0.5, tueren: 1.0
};

/** Aufgelöste U-Werte aus Hülle: user-Override > Auto-Default aus u-werte.json. */
function resolveHuelleUWerte(state){
  const det = state?.detail?.huelle || {};
  const obj = state?.objekt || {};
  let bk = bauklasseFromPeriode(obj.bauperiode);
  bk = applySanierung(bk, obj.sanierungsstand) || bk;
  const typeKey = (obj.typ === 'mfh') ? 'MFH' : 'EFH';
  const out = {};
  const hints = {};
  for (const key of ['wand','fenster','dach','boden','tueren']){
    const slot = det[key] || {};
    let auto = null;
    if (_uWerteData && bk){
      // tueren: existiert nicht in u-werte.json — Default 2.0 nach Bauklasse-Schätzung
      if (key === 'tueren'){
        auto = (bk === 'vor1945' || bk === '1946_1960') ? 2.5
             : (bk === '1961_1977' || bk === '1978_1994') ? 2.0
             : 1.4;
      } else {
        const u = lookupUWert(_uWerteData, {
          bauteil: key, gebaeudetyp: typeKey, bauklasse: bk,
          variant: slot.variant || undefined
        });
        auto = u ? Number(u.typ) : null;
      }
    }
    const userVal = (slot.u_user === '' || slot.u_user == null) ? null : Number(slot.u_user);
    const eff = (userVal != null && Number.isFinite(userVal) && userVal > 0) ? userVal : auto;
    out[key] = eff || 0;
    hints[key] = { auto, user: userVal, eff, bauklasse: bk };
  }
  return { uHuelle: out, hints, bauklasse: bk };
}

function renderHuelle(s){
  const { uHuelle, hints } = resolveHuelleUWerte(s);
  const det = s.detail.huelle || {};
  return `
  <section class="section" id="sec-huelle">
    <header class="section__head">
      <span class="section__num">Schritt 6</span>
      <h2 class="section__title">Hülle — Bauteil-U-Werte</h2>
    </header>
    <p class="section__intro">
      Globale U-Werte je Bauteiltyp. Default kommt automatisch aus
      <code>data/u-werte.json</code> nach Bauperiode/Sanierungsstand.
      Eigener Wert überschreibt Default — leer lassen für Auto.
    </p>
    <div class="block">
      <div class="grid grid--2">
        ${renderHuelleRow(s, 'wand',    uHuelle, hints, det)}
        ${renderHuelleRow(s, 'fenster', uHuelle, hints, det)}
        ${renderHuelleRow(s, 'dach',    uHuelle, hints, det)}
        ${renderHuelleRow(s, 'boden',   uHuelle, hints, det)}
        ${renderHuelleRow(s, 'tueren',  uHuelle, hints, det)}
      </div>
      <p class="field__hint" id="huelleHint" style="margin-top:var(--s-3);">
        Effektive Werte werden in Räume-Bauteilen als Default verwendet.
        Bauklasse: <strong id="huelleBk">${esc(hints.wand.bauklasse || '–')}</strong>.
      </p>
    </div>
  </section>`;
}

function renderHuelleRow(s, key, uHuelle, hints, det){

  return `

      <div class="input-group">

        <span class="input-group__unit">W/(m²·K)</span>

    list.innerHTML = `<p class="field__hint" style="padding:var(--s-3);background:var(--ink-50);border-radius:var(--r-sm);">Noch keine Räume erfasst. Restfläche = volle EBF wird pauschal gerechnet.</p>`;
    return;
  }
  list.innerHTML = rs.map((r, idx) => renderRoom(r, idx)).join('');
}

    </div>

      <label class="field__label">f<sub>RT</sub></label>
      ${inputNumRaw(`detail.raeume[${idx}].bauteile[${j}].fRT`, b.fRT != null ? b.fRT : '', 0.05, -1, '1.0')}

function syncRoomsCount(state){
  const list = document.getElementById('roomsList');
  if (!list) return;
  const rs = state.detail?.raeume || [];
  const dom = list.querySelectorAll('.room');
  if (dom.length !== rs.length) rebuildRooms(state);
  // Bauteile-Listen synchronisieren
  for (let i = 0; i < rs.length; i++){
    const cont = list.querySelector(`[data-room-bts="${i}"]`);
    if (!cont) continue;
    const bts = rs[i]?.bauteile || [];
    const domBts = cont.querySelectorAll('.bauteil');
    if (domBts.length !== bts.length) rebuildRooms(state);
  }
}
