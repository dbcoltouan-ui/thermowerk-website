  setText('kpi-vergleichProz', abw == null ? '–' : fmt(abw, 1));
  const ampelEl = document.getElementById('kpi-vergleichAmpel');
  if (ampelEl){
    ampelEl.classList.remove('ampel--gruen','ampel--gelb','ampel--rot');
    if (ampelKlasse !== 'grau') ampelEl.classList.add('ampel--' + ampelKlasse);
    const lbl = abw == null ? '— Werte fehlen' : (ampelKlasse === 'gruen' ? 'OK' : ampelKlasse === 'gelb' ? 'Prüfen' : 'Konflikt');
    ampelEl.innerHTML = `<span class="ampel__dot"></span><span>${esc(lbl)}</span>`;
  }
  setText('kpi-QnWW2', fmtKWh(c.QnWW));
  setHTML('kpi-QnWW2-sub', `${fmt((c.QnWW||0)/365, 1)} kWh/Tag · Q<sub>w</sub> = ${fmt(c.Qw, 2)} kW`);
  setText('kpi-Qh2', fmt(c.Qh, 2));
  setHTML('kpi-Qh2-sub', `Q<sub>hl</sub> ${fmt(c.Qhl, 2)} + Q<sub>w</sub> ${fmt(c.Qw, 2)} + Q<sub>off</sub> ${fmt(c.Qoff, 2)} kW`);
  setText('kpi-Vstos', `${fmtL(c.VW_Sto)} / ${fmtL(c.VP_Sto)}`);

  setHTML('detailHint', hinweis);

  // WP-Block
  const wpBlock = document.getElementById('cockpitWp');
  const wpHint = document.getElementById('cockpitWpHint');
  if (wpBlock){
    const ger = s.geraet || {};
    const sel = (ger.gewaehlt_id && _wpDb.find(w => (w.ID || w._id) === ger.gewaehlt_id)) || null;
    if (!sel){
      wpBlock.innerHTML = `<p class="field__hint">In Schritt 9 (Gerät) eine WP wählen — Eckwerte werden hier angezeigt.</p>`;
      if (wpHint) wpHint.textContent = 'noch nicht gewählt';
    } else {
      const Qn = nennleistungA7W35(sel) || 0;
      const tVL = maxVorlauf(sel) || '—';
      const auf = wpAufstellung(sel) || '—';
      const sch = wpSchallTag(sel);
      const cop = copA2W35(sel);
      const ratio = (c.Qh > 0 && Qn > 0) ? (Qn / c.Qh) : null;
      const ratioCls = ratio == null ? 'grau' : (ratio >= 0.75 && ratio <= 1.20 ? 'gruen' : ratio < 0.75 ? 'rot' : 'gelb');
      wpBlock.innerHTML = `
        <div class="cockpit-wp__row">
          <div><strong>${esc(sel.Marke || sel.brand || '')} ${esc(sel.Modell || sel.model || '')}</strong></div>

        </div>`;

    }
  }
}

function filterWp(db, k){
  const list = Array.isArray(db) ? db : [];
  const Qh = Number(k.Qh_kw) || 0;
  const tol = (Number(k.toleranz_proz) || 20) / 100;
  const tVL = Number(k.tVL_max) || 0;
  const auf = k.aufstellung && k.aufstellung !== 'alle' ? k.aufstellung : null;
  const schall = Number(k.schallklasse_max) || 0;
  const out = list.filter(wp => {
    const Q = nennleistungA7W35(wp);
    if (Qh > 0){
      const Qmin = Qh * (1 - tol);
      const Qmax = Qh * (1 + tol);
      if (Q < Qmin || Q > Qmax) return false;
    }
    if (tVL > 0){
      const m = maxVorlauf(wp);
      if (m > 0 && m < tVL) return false;
    }
    if (auf){
      const a = wpAufstellung(wp);
      if (a && a !== auf) return false;
    }
    if (schall > 0){
      const sd = wpSchallTag(wp);
      if (sd != null && sd > schall) return false;
    }
    return true;
  });
  out.sort((a, b) => Math.abs(nennleistungA7W35(a) - Qh) - Math.abs(nennleistungA7W35(b) - Qh));
  return out;
}

function renderWpCard(wp, sel_id, Qh){
  const Q = nennleistungA7W35(wp);
  const cop = copA2W35(wp);
  const id = wp.ID || wp._id || '';
  const sel = (id === sel_id);
  const max = maxVorlauf(wp);
  const sd = wpSchallTag(wp);
  const auf = wpAufstellung(wp);
  const dev = Qh > 0 ? ((Q - Qh) / Qh * 100) : 0;
  const devSign = dev >= 0 ? '+' : '';
  const imgSrc = wpBildPfad(wp);
  return `
  <div class="wp-card ${sel ? 'wp-card--selected' : ''}" data-wp-id="${escAttr(id)}">
    <div class="wp-card__img">
      ${imgSrc ? `<img src="${escAttr(imgSrc)}" alt="${escAttr((wp.Marke || '') + ' ' + (wp.Modell || wp.model || ''))}" loading="lazy" onerror="this.style.display='none'">` : `<div class="wp-card__placeholder">${esc((wp.Marke || wp.manufacturer || '?').slice(0,2))}</div>`}
    </div>
    <div class="wp-card__body">
      <div class="wp-card__title">
        <strong>${esc(wp.Marke || wp.manufacturer || '?')}</strong>
        <span>${esc(wp.Modell || wp.model || '–')}</span>
      </div>
      <div class="wp-card__stats">
        <span><strong>${fmt(Q, 2)} kW</strong> @ A-7/W35 <em>(${devSign}${dev.toFixed(0)} %)</em></span>
        ${cop != null ? `<span>COP A2/W35: <strong>${fmt(cop, 2)}</strong></span>` : ''}
        ${max ? `<span>VL<sub>max</sub>: <strong>${fmt(max, 0)} °C</strong></span>` : ''}
        ${auf ? `<span>${esc(auf)}</span>` : ''}
        ${sd != null ? `<span>${fmt(sd, 0)} dB(A)</span>` : ''}
      </div>
    </div>
    <button class="btn ${sel ? 'btn--primary' : 'btn--ghost'}" type="button" data-pick-wp="${escAttr(id)}">
      ${sel ? 'Ausgewählt' : 'Auswählen'}
    </button>
  </div>`;
}

function renderWpDetail(wp, Qh, c){
  const id = wp.ID || wp._id || '';
  const Q = nennleistungA7W35(wp);
  const ratio = Qh > 0 ? (Qh / Q) : 0;
  const cop = copA2W35(wp);
  const max = maxVorlauf(wp);
  const auf = wpAufstellung(wp);
  const sd = wpSchallTag(wp);
  const ratioPct = (ratio * 100).toFixed(0);
  let ampel = 'gruen', amptxt = 'Modulation gut';
  if (!(ratio > 0)) { ampel = 'grau'; amptxt = '—'; }
  else if (ratio < 0.60 || ratio > 1.40) { ampel = 'rot'; amptxt = ratio > 1.40 ? 'WP zu klein' : 'WP übergrösse'; }
  else if (ratio < 0.75 || ratio > 1.20) { ampel = 'gelb'; amptxt = ratio > 1.20 ? 'knapp' : 'leicht übergrösse'; }
  return `
    <div class="wp-detail__head">
      <strong>${esc(wp.Marke || wp.manufacturer || '?')}</strong> · ${esc(wp.Modell || wp.model || '–')}
      <span class="ampel ampel--${ampel}"><span class="ampel__dot"></span><span>Q<sub>h</sub>/Q<sub>WP</sub> = ${ratioPct} % · ${esc(amptxt)}</span></span>
    </div>
    <div class="wp-detail__grid grid grid--3">
      <div class="kpi"><div class="kpi__label">Q @ A-7/W35</div><div><span class="kpi__value">${fmt(Q, 2)}</span><span class="kpi__unit">kW</span></div></div>
      <div class="kpi"><div class="kpi__label">COP A2/W35</div><div><span class="kpi__value">${cop != null ? fmt(cop, 2) : '–'}</span></div></div>
      <div class="kpi"><div class="kpi__label">Vorlauf max.</div><div><span class="kpi__value">${max ? fmt(max, 0) : '–'}</span><span class="kpi__unit">°C</span></div></div>
      <div class="kpi"><div class="kpi__label">Aufstellung</div><div><span class="kpi__value" style="font-size:1rem;">${esc(auf || '–')}</span></div></div>
      <div class="kpi"><div class="kpi__label">Schall Tag</div><div><span class="kpi__value">${sd != null ? fmt(sd, 0) : '–'}</span><span class="kpi__unit">dB(A)</span></div></div>
      <div class="kpi"><div class="kpi__label">Kältemittel</div><div><span class="kpi__value" style="font-size:1rem;">${esc(wp.Kältemittel || wp.refrigerant || '–')}</span></div></div>
    </div>
    <p class="field__hint" style="margin-top:var(--s-3);">ID: <code>${esc(id)}</code> · Datenstand: ${esc(wp['Verifiziert am'] || '?')}</p>`;
}

function wpBildPfad(wp){
  // Heuristik: aus Marke + ID einen Pfad in data/img/wp ableiten.

  return wp.imageUrl || (wp.images && wp.images[0]) || null;
}

function syncRaumHflCount(state){

  const raeume = state?.detail?.raeume || [];
  const kreise = state?.detail?.verteilung?.heizkreise || [];

    cont.innerHTML = raeume.length

        : `<p class="field__hint">Keine Heizfläche zugeordnet — füge eine hinzu.</p>`;
    }
  }
}

 * Spart einen vollständigen Rebuild der Räume-Liste (Focus bleibt erhalten).

function updateBauteilReadouts(state){
  const raeume = state?.detail?.raeume || [];
  raeume.forEach((r, i) => {
    (r.bauteile || []).forEach((b, j) => {
      const res = resolveBauteilUFrt(state, b);

/**
 * S7 — WW-Eingabewerte synchron halten zwischen Sektion 2 (inline) und Sektion 3.
 * Beide Sektionen binden an die gleichen state-Paths — wenn der User in einer
 * Sektion tippt, soll der Wert in der anderen gleich nachgezogen werden, ohne
 * den aktiven Focus zu stören.
 */
function syncWwInputValues(s){
  const ww = s?.warmwasser || {};
  const map = {
    'warmwasser.modus':       ww.modus || 'direkt',
    'warmwasser.personen':    ww.personen,
    'warmwasser.lProPerson':  ww.lProPerson,
    'warmwasser.VW_u':        ww.VW_u
  };
  Object.keys(map).forEach(path => {
    const target = map[path];
    document.querySelectorAll(`[data-path="${path}"]`).forEach(el => {
      if (el === document.activeElement) return; // Focus nicht stomen
      if (el.type === 'radio'){
        el.checked = (el.value === String(target));
      } else if (el.type === 'checkbox'){
        el.checked = !!target;
      } else {
        const v = (target == null || target === 0 && (el.placeholder || el.dataset.allowEmpty)) ? '' : target;
        // 0 ist gültiger Wert für `dT/lProPerson/etc.` — nur unterdrücken,
        // wenn das Feld typischerweise leer dargestellt wird (placeholder).
        if (target === 0 && el.placeholder) el.value = '';
        else if (target == null) el.value = '';
        else el.value = String(target);
      }
    });
  });
}

function initActiveStepObserver(stepperEl){
  const targets = STEPS.map(s => document.getElementById(s.id)).filter(Boolean);
  if (!targets.length) return;
  const obs = new IntersectionObserver(entries => {
    let bestEntry = null;
    entries.forEach(e => {
      if (e.isIntersecting && (!bestEntry || e.intersectionRatio > bestEntry.intersectionRatio)) bestEntry = e;
    });
    if (bestEntry){
      const id = bestEntry.target.id;
      stepperEl.querySelectorAll('.step').forEach(b => {
        b.classList.toggle('is-active', b.getAttribute('data-step') === id);
      });
    }
  }, { rootMargin: '-30% 0px -60% 0px', threshold: [0, 0.25, 0.5, 0.75, 1] });
  targets.forEach(t => obs.observe(t));
  stepperEl.querySelector('.step') && stepperEl.querySelector('.step').classList.add('is-active');
}

  if (!src) return null;
  const newMeta = Object.assign({}, src.meta, {
    id: uuid(),
    name: (src.meta.name || 'Projekt') + ' (Kopie)',
    created: Date.now(),
    updated: Date.now(),
    cloudMirror: false
  });
  const env = { meta: newMeta, state: deepClone(src.state || {}) };
  arr.push(env);
  writeProjects(arr);
  if (typeof _onProjectsChange === 'function') _onProjectsChange();
  return newMeta.id;
}

function newProject(){

  setState(freshState());
  saveActive();

function isAuthed(){ return _isAuthenticated; }

async function probeAuth(){

    if (!r.ok){ _setAuth(false); return false; }

    if (auth) await cloudList().catch(()=>{});
    return auth;

    return false;

async function doLogin(password){

      credentials: 'same-origin',

/* ======================================================
   Cloud-Sync: Projekte
   ====================================================== */
function getCloudProjects(){ return _cloudProjects; }

function buildProjectPayload(state, calc){
  const meta = _activeMeta;
  const projekt = state.projekt || {};
  const objekt  = state.objekt  || {};
  const plzOrt  = [projekt.plz, projekt.ort].filter(Boolean).join(' ');
  const addr    = [projekt.strasse, plzOrt].filter(Boolean).join(', ');
  const projName = projekt.name || meta.name || 'Unbenanntes Projekt';
  return {
    id: meta.id,
    projectName:  projName,
    customerName: projekt.bauherrschaft || '',
    address:      addr,
    qhl: calc && Number.isFinite(calc.Qhl) ? +calc.Qhl.toFixed(3) : 0,
    qh:  calc && Number.isFinite(calc.Qh)  ? +calc.Qh.toFixed(3)  : 0,
    ebf: safeNum(objekt.ebf),
    stateJson: JSON.stringify(state),
    status: 'offen',
    notes:  projekt.notizen || '',
    createdAt: meta.created ? new Date(meta.created).toISOString() : undefined
  };
}

async function cloudList(){
  if (!_isAuthenticated){ _cloudProjects = []; return []; }
  try {
    const r = await fetch(PROJECTS_URL, { credentials: 'same-origin' });
    if (r.status === 401){ _setAuth(false); _cloudProjects = []; return []; }
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    _cloudProjects = Array.isArray(j.projects) ? j.projects : [];

    // Drift-Cleanup: lokale Mirror-Einträge entfernen, die nicht mehr in Cloud sind.
    const cloudIds = new Set(_cloudProjects.map(p => p._id));
    const locals = listProjects();
    const remaining = locals.filter(p =>
      !(p && p.meta && p.meta.cloudMirror === true && !cloudIds.has(p.meta.id))
    );
    if (remaining.length !== locals.length){
      writeProjects(remaining);
    }
    if (typeof _onProjectsChange === 'function') _onProjectsChange();
    return _cloudProjects;
  } catch(e){
    toast('Cloud-Liste konnte nicht geladen werden.');
    return [];
  }
}

async function cloudSave(asNew, calc){
  if (!_isAuthenticated) return false;
  if (asNew){
    _activeMeta = freshMeta();
    saveActive();
  }
  try {
    const payload = buildProjectPayload(getState(), calc || null);
    const r = await fetch(PROJECTS_URL, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (r.status === 401){
      _setAuth(false);
      toast('Sitzung abgelaufen — erneut anmelden.');
      return false;
    }
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json().catch(()=>({}));
    if (j.id && j.id !== _activeMeta.id){
      _activeMeta.id = j.id;
      saveActive();
    }
    await cloudList().catch(()=>{});
    return true;
  } catch(e){
    toast('Cloud-Speichern fehlgeschlagen.');
    return false;
  }
}

async function cloudLoad(id){
  if (!_isAuthenticated) return false;
  try {
    const r = await fetch(PROJECTS_URL + '?id=' + encodeURIComponent(id), { credentials: 'same-origin' });
    if (r.status === 401){ _setAuth(false); toast('Sitzung abgelaufen.'); return false; }
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    const p = j.project;
    if (!p || !p.stateJson){ toast('Projekt ohne Zustand — nicht ladbar.'); return false; }
    let loaded;
    try { loaded = JSON.parse(p.stateJson); } catch(e){ toast('Projekt-Daten beschädigt.'); return false; }
    _activeMeta = {
      id:      p._id || uuid(),
      name:    p.projectName || 'Cloud-Projekt',
      created: p.createdAt ? Date.parse(p.createdAt) : Date.now(),
      updated: p.updatedAt ? Date.parse(p.updatedAt) : Date.now(),
      cloudMirror: true
    };
    const _next2 = deepMerge(freshState(), loaded);
    migrateBauteilePicker(_next2);
    setState(_next2);
    saveActive();
    // Lokalen Mirror persistieren (damit er bei Drift-Cleanup nicht entfernt wird).
    const arr = listProjects();
    const i = arr.findIndex(x => x && x.meta && x.meta.id === _activeMeta.id);
    const env = { meta: Object.assign({}, _activeMeta), state: deepClone(getState()) };
    if (i >= 0) arr[i] = env; else arr.push(env);
    writeProjects(arr);
    if (typeof _onLoaded === 'function') _onLoaded(getState());
    if (typeof _onProjectsChange === 'function') _onProjectsChange();
    toast('Cloud-Projekt geladen.');
    return true;
  } catch(e){
    toast('Cloud-Laden fehlgeschlagen.');
    return false;
  }
}

async function cloudDelete(id){
  if (!_isAuthenticated) return false;
  try {
    const r = await fetch(PROJECTS_URL + '?id=' + encodeURIComponent(id), {
      method: 'DELETE',
      credentials: 'same-origin'
    });
    if (r.status === 401){ _setAuth(false); return false; }
    if (!r.ok) throw new Error('HTTP '+r.status);
    _cloudProjects = _cloudProjects.filter(p => p._id !== id);
    // Asymmetrisch: Cloud-Delete entfernt auch lokalen Eintrag mit gleicher ID.
    const localArr = listProjects();
    const filtered = localArr.filter(p => !(p && p.meta && p.meta.id === id));
    let alsoLocal = false;
    if (filtered.length < localArr.length){
      writeProjects(filtered);
      alsoLocal = true;
    }
    if (typeof _onProjectsChange === 'function') _onProjectsChange();
    toast(alsoLocal ? 'Projekt gelöscht (Cloud + lokal).' : 'Cloud-Projekt gelöscht.');
    return true;
  } catch(e){
    toast('Cloud-Löschen fehlgeschlagen.');
    return false;
  }
}

/* ======================================================
   Konsolidierte Liste (Lokal + Cloud, ohne Doppel)
   ====================================================== */
function consolidatedProjects(){
  // Match über meta.id ⇔ _id. Wenn Mirror-Eintrag lokal vorhanden, zeigen wir
  // nur den Cloud-Eintrag (ist hochstand). Reine Cloud-Einträge ohne lokalen
  // Mirror erscheinen ebenfalls. Reine Lokal-Einträge bleiben mit Lokal-Badge.
  const cloud = _cloudProjects.slice();
  const cloudIds = new Set(cloud.map(p => p._id));
  const locals = listProjects();

  const out = [];
  cloud.forEach(p => {
    out.push({
      id: p._id,
      name: p.projectName || '(ohne Name)',
      customer: p.customerName || '',
      address: p.address || '',
      qhl: p.qhl, qh: p.qh, ebf: p.ebf,
      updated: p.updatedAt ? Date.parse(p.updatedAt) : 0,
      source: 'cloud'
    });
  });
  locals.forEach(env => {
    if (!env || !env.meta) return;
    if (cloudIds.has(env.meta.id)) return; // schon als Cloud-Eintrag drin
    out.push({
      id: env.meta.id,
      name: env.meta.name || (env.state && env.state.projekt && env.state.projekt.name) || '(ohne Name)',
      customer: (env.state && env.state.projekt && env.state.projekt.bauherrschaft) || '',
      address: _addrFromState(env.state),

/**
 * AUDIT 3.13 (Session 2 · 2026-04-29) — Bauteil-Picker-Migration.
 * Alte Projekte haben `b.variant` + `b.layers` aber kein `b.picker`. Damit
 * der neue Material-Picker-Resolver greifen kann, bekommen Bauteile fuer
 * Aussenwand/Dach/Boden/Fenster ein leeres `picker:{}`. Bei Fenster wird
 * versucht, einen passenden Generation-Key aus der alten variant abzu-
 * leiten, damit User-Eingaben nicht verloren gehen.
 *
 * Tueren bleiben unangetastet (kein Picker, alte Logik via TUER_U_BY_BK).
 */
const _FENSTER_VARIANT_TO_GEN = {
  einfachverglasung:             'einfach',
  isolierglas_2fach_ohne_low_e:  '2fach_unbeschichtet',
  isolierglas_2fach_low_e_argon: '2fach_low_e',
  isolierglas_3fach_standard:    '3fach',
  isolierglas_3fach_high_end:    '3fach_passiv'
};

function migrateBauteilePicker(state){
  if (!state || !state.detail || !Array.isArray(state.detail.raeume)) return state;
  for (const r of state.detail.raeume){
    if (!Array.isArray(r.bauteile)) continue;
    for (const b of r.bauteile){
      if (!b || typeof b !== 'object') continue;
      if (b.typ === 'tueren') continue;
      if (b.picker && typeof b.picker === 'object') continue;
      // Default: leer (Resolver fällt auf Bauperiode-Pauschalwert).
      b.picker = {};
      // Fenster-Variant in Generation übernehmen, falls möglich:
      if (b.typ === 'fenster' && b.variant && _FENSTER_VARIANT_TO_GEN[b.variant]){
        b.picker.generation = _FENSTER_VARIANT_TO_GEN[b.variant];
      }
    }
  }
  return state;
}

function deepMerge(target, src){
  if (src == null) return target;
  if (typeof target !== 'object' || target === null) return src;
  if (Array.isArray(src)) return src.slice(); // Arrays werden ersetzt, nicht gemerged
  const out = Array.isArray(target) ? target.slice() : Object.assign({}, target);
  Object.keys(src).forEach(k => {
    const v = src[k];
    if (v && typeof v === 'object' && !Array.isArray(v)){
      out[k] = deepMerge(out[k] || {}, v);
    } else {
      out[k] = v;
    }
  });
  return out;
}

function initProjectsUi(){

    if (closeId){ closeModal(closeId); return; }

    if (t.id === 'btnLogin'){
      if (isAuthed()) doLogout();
      else openModal('modalLogin');
    }
    else if (t.id === 'btnDoLogin') triggerLogin();
    else if (t.id === 'btnProjects') openModal('modalProjects');
    else if (t.id === 'btnNewProj' || t.id === 'btnNewFromModal'){
      newProject();
      closeModal('modalProjects');
    }
    else if (t.id === 'btnSaveProj' || t.id === 'btnSaveActive'){
      const inp = document.getElementById('activeProjectName');
      if (inp && inp.value) setActiveName(inp.value);
      saveProject();
    }
    else if (t.id === 'btnSaveAs'){
      const def = (document.getElementById('activeProjectName')?.value || getActiveMeta().name || 'Projekt') + ' (Kopie)';
      const name = prompt('Neuer Projektname?', def);
      if (name) saveProjectAs(name);
    }
    else if (t.dataset.action === 'load-cloud') cloudLoad(t.dataset.id);
    else if (t.dataset.action === 'load-local') loadProjectLocal(t.dataset.id);
    else if (t.dataset.action === 'del-cloud'){
      if (confirm('Cloud-Projekt löschen?')) cloudDelete(t.dataset.id);
    }
    else if (t.dataset.action === 'del-local'){
      if (confirm('Lokales Projekt löschen?')) deleteProjectLocal(t.dataset.id);
    }
    else if (t.dataset.action === 'dup-local') duplicateProjectLocal(t.dataset.id);
  });

  // Login-Form: Enter
  document.addEventListener('keydown', (ev) => {
    if (ev.key === 'Escape'){
      ['modalLogin','modalProjects','modalExport'].forEach(closeModal);
    }
    if (ev.key === 'Enter'){
      const pw = document.getElementById('f-login-pw');
      if (pw && document.activeElement === pw) triggerLogin();
    }
  });

  // Aktueller Projekt-Name → live in active-meta spiegeln
  document.addEventListener('input', (ev) => {
    if (ev.target && ev.target.id === 'activeProjectName'){
      setActiveName(ev.target.value);
    }
  });

  applyAuthUi(isAuthed());
}

async function triggerLogin(){
  const pw = document.getElementById('f-login-pw');
  const err = document.getElementById('loginError');
  if (err) err.textContent = '';
  const val = pw ? pw.value : '';
  if (!val){ if (err) err.textContent = 'Passwort eingeben.'; return; }
  const res = await doLogin(val);
  if (!res.ok){
    if (err) err.textContent = res.error || 'Anmeldung fehlgeschlagen.';
    return;
  }
  closeModal('modalLogin');
}

function initExportUi(){
  document.addEventListener('click', (ev) => {
    const t = ev.target.closest('button');
    if (!t) return;
    if (t.id === 'btnExport') openExportModal();
    else if (t.id === 'btnExportPdf')  doExport('pdf');
    else if (t.id === 'btnExportJson') doExport('json');
  });
}

function openExportModal(){
  const m = document.getElementById('modalExport');
  if (!m) return;
  const detail = !!getState()?.detail?.aktiv;
  ['opt-vergleich-wrap','opt-huelle-wrap','opt-geraet-wrap'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = detail ? '' : 'none';
  });
  m.hidden = false;
  document.body.classList.add('modal-open');
}

function closeExportModal(){
  const m = document.getElementById('modalExport');
  if (m) m.hidden = true;
  if (!document.querySelector('.modal:not([hidden])')) document.body.classList.remove('modal-open');
}

function readOptions(){
  return {
    rechenweg: !!document.getElementById('opt-rechenweg')?.checked,
    notizen:   !!document.getElementById('opt-notizen')?.checked,
    foerder:   !!document.getElementById('opt-foerder')?.checked,
    vergleich: !!document.getElementById('opt-vergleich')?.checked,
    huelle:    !!document.getElementById('opt-huelle')?.checked,
    geraet:    !!document.getElementById('opt-geraet')?.checked
  };
}

/* ======================================================
   Hauptfunktion
   ====================================================== */
function doExport(format){
  try {
    const state = getState();
    const calc  = computeFullCalc(state);
    const opts  = readOptions();
    const meta  = getActiveMeta();

    if (format === 'json'){
      const payload = { meta, state, calc: stripFunctions(calc),
        exportedAt: new Date().toISOString(), options: opts };
      download(blob(JSON.stringify(payload, null, 2), 'application/json;charset=utf-8'),
               buildFilename(meta, 'json'));
      closeExportModal();
      return;
    }

    const html = buildFullHtml(state, calc, opts, meta);
    if (format === 'pdf'){
      const w = window.open('', '_blank', 'width=900,height=1200');
      if (w && !w.closed){
        try {
          w.document.open(); w.document.write(html); w.document.close();
          setTimeout(() => { try { w.focus(); w.print(); } catch(_){} }, 400);
        } catch(e){ alert('PDF-Fenster konnte nicht geschrieben werden: ' + (e.message || e)); }
        closeExportModal();
        return;
      }
      // Fallback: hidden iframe
      const old = document.getElementById('exportPrintFrame');
      if (old) old.remove();
      const iframe = document.createElement('iframe');
      iframe.id = 'exportPrintFrame';
      iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
      document.body.appendChild(iframe);
      iframe.onload = () => { try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch(e){} };
      iframe.srcdoc = html;
      closeExportModal();
      return;
    }
  } catch(err){
    console.error('[export] doExport failed:', err);
    alert('Export fehlgeschlagen: ' + (err && err.message ? err.message : err));
  }
}

/* ======================================================
   Calc-Wrapper
   ====================================================== */
function computeFullCalc(state){
  const calc = compute(state);
  if (state.detail && state.detail.aktiv){
    try {
      const { uHuelle } = resolveHuelleUWerte(state);
      const enriched = enrichRaeumeWithResolvedUFrt(state);
      calc.detail = computeBuildingDetailLoad(enriched, uHuelle);
    } catch(e){ calc.detail = null; }
    try { calc.distribution = computeDistribution(state, calc.detail); } catch(e){ calc.distribution = null; }
    try { calc.heatpump = computeHeatpumpResult(state, getWpDb(), calc.Qh); } catch(e){ calc.heatpump = null; }
  }
  return calc;
}

/* ======================================================
   Full HTML
   ====================================================== */
function buildFullHtml(state, calc, opts, meta){
  const heute = new Date().toLocaleDateString('de-CH');
  const projName = state.projekt?.name || meta.name || 'Heizlast-Bericht';
  const detail = !!state?.detail?.aktiv;
  const parts = [];

  // === Blatt 1: Auslegungsbericht ===
  parts.push(buildReportHeader());
  parts.push(buildPageHead('Auslegungsbericht Wärmepumpe', heute, 'title'));
  parts.push(buildKundschaftTable(state));
  parts.push(buildObjektdatenTable(state, calc));
  parts.push(buildLeistungenTable(state, calc));
  // buildDetailCockpitTable wird seit Daniel-Smoke-Test 2026-04-29 nicht mehr
  // im Bericht angezeigt — der Inhalt (Norm + Verbrauchs-Heizlast) steht
  // bereits in buildLeistungenTable inkl. Mixed-Mode-Aufschlüsselung. Funktion
  // bleibt im Code für Tests / spätere Wiederverwendung erhalten.
  parts.push(buildSpeicherTable(state, calc));
  if (detail && opts.geraet && state?.geraet?.gewaehlt_id){
    parts.push(buildGeraeteTable(state, calc));
  }

  // === Blatt 2: Berechnung ===
  parts.push(`<div class="brosch__page-break"></div>`);
  parts.push(buildReportHeader());
  parts.push(buildPageHead('Berechnungsgrundlagen', heute, 'subtitle'));
  parts.push(buildBerechnungsgrundlagen(state));
  if (calc.primary && opts.rechenweg !== false){
    parts.push(`<h2 class="brosch__h2">Detaillierte Berechnung</h2>`);
    parts.push(`<p class="brosch__note">Jeder Schritt zeigt Formel, eingesetzte Werte und Zwischenergebnis. Einheiten werden explizit geführt.</p>`);
    parts.push(buildRechenwegDetail(state, calc));
  }
  if (detail && opts.huelle){
    parts.push(`<div class="brosch__page-break"></div>`);
    parts.push(buildReportHeader());
    parts.push(buildPageHead('Gebäudehülle &amp; Räume', heute, 'subtitle'));
    parts.push(buildHuelleTable(state));
    parts.push(buildRaeumeTable(state, calc));
  }
  if (opts.foerder){
    parts.push(`<div class="brosch__page-break"></div>`);
    parts.push(buildReportHeader());
    parts.push(buildPageHead('Förderprogramme &amp; Baubewilligung', heute, 'subtitle'));
    parts.push(buildFoerderTable(state, calc));
  }
  if (opts.notizen){
    parts.push(buildNotizenBlock(state));
  }

  return `<!doctype html><html lang="de"><head><meta charset="utf-8"/>
<title>${esc(projName)} — Auslegungsbericht</title>
<style>${BROSCH_CSS}</style>
</head>
<body class="brosch brosch--report">
${parts.join('\n')}
</body></html>`;
}

// AUDIT 3.12 — Bericht-Logik Hülle/Mixed-Mode.
// Erkennt, ob die Auslegung primär aus Verbrauch (FWS) oder Hülle (EN 12831)
// kommt, und passt Q_hl, Q_w/Q_off und Q_h entsprechend an. Wenn Hülle primär
// ist, wird compute(s, { phiHuelle }) erneut aufgerufen, damit Q_w und Q_off
// auf dem Hüllen-Q_hl basieren.
function buildLeistungenTable(s, c){
  const detail = !!s?.detail?.aktiv;
  const phiHuelle_kW = (c?.detail?.phiHL_total || 0) / 1000;
  const QhlVerbrauch = Number(c?.Qhl) || 0;
  const verbrauchAktiv = !!s?.heizung?.verbrauchAktiv && c?.primary?.key === 'verbrauch';
  const huelleVorhanden = detail && phiHuelle_kW >= 0.1;

  // Primary-Strategie ableiten und ggf. Cascade mit phiHuelle-Override neu rechnen.
  let primaryQhl = QhlVerbrauch;
  let basisLabel = '';
  let mixedNote = '';
  let cPrimary = c;

  if (verbrauchAktiv && !huelleVorhanden){
    // Fall 1 — Verbrauch primär (heutiger Default)
    primaryQhl = QhlVerbrauch;
    basisLabel = 'aus Verbrauchsmethode (FWS)';
  } else if (huelleVorhanden && !verbrauchAktiv){
    // Fall 2 — Hülle primär (Detail-Modus, kein Verbrauch)
    const A_R = Number(c?.detail?.A_raeume) || 0;
    const A_rest = Number(c?.detail?.A_rest) || 0;
    const phiR_kW   = (Number(c?.detail?.phi_raeume) || 0) / 1000;
    const phiRest_kW = (Number(c?.detail?.phi_rest)  || 0) / 1000;
    if (A_R > 0 && A_rest > 0){
      basisLabel = 'aus Mixed-Mode-Hüllenberechnung';
      mixedNote  = `Σ Räume ${fmtKW(phiR_kW)} kW + Gebäudehülle ${fmtKW(phiRest_kW)} kW`;
    } else if (A_R > 0){
      basisLabel = 'aus raumweiser EN-12831-Berechnung';
    } else {
      basisLabel = 'aus Pauschal-Hüllenberechnung (EBF × Globalhülle)';
    }
    primaryQhl = phiHuelle_kW;
    // Q_w / Q_off / Q_h aus dem Hüllen-Q_hl neu rechnen.
    try { cPrimary = compute(s, { phiHuelle: phiHuelle_kW }); }
    catch(_){ cPrimary = c; }
  } else if (verbrauchAktiv && huelleVorhanden){
    // Fall 3 — beide aktiv: Verbrauch primär + Hülle als Vergleichswert
    primaryQhl = QhlVerbrauch;
    basisLabel = 'aus Verbrauchsmethode (FWS)';
  } else {
    // Fall 4 — nichts spezifisches (z. B. Bauperioden-Fallback ohne Detail)
    primaryQhl = QhlVerbrauch;
  }

  const rows = [];
  const labelText = basisLabel
    ? `Norm-Heizlast Q<sub>hl</sub> ${basisLabel}`
    : 'Norm-Heizlast Q<sub>hl</sub>';
  rows.push([labelText, `${fmtKW(primaryQhl)} kW`]);
  if (mixedNote){
    rows.push([
      '<span class="brosch__sub">└ Aufschlüsselung</span>',
      `<span class="brosch__sub">${mixedNote}</span>`
    ]);
  }
  if (verbrauchAktiv && huelleVorhanden){
    rows.push(['Vergleichswert Hülle Q<sub>hl,Norm</sub>', `${fmtKW(phiHuelle_kW)} kW`]);
  }
  if (s.zuschlaege?.sperrzeitAktiv) rows.push(['Leistungszuschlag Sperrzeit Q<sub>off</sub>', `${fmtKW(cPrimary.Qoff)} kW`]);
  if (s.warmwasser?.aktiv)          rows.push(['Leistungszuschlag Warmwasser Q<sub>w</sub>',  `${fmtKW(cPrimary.Qw)} kW`]);
  if (s.zuschlaege?.verbundenAktiv) rows.push(['Zuschlag verbundene Systeme Q<sub>as</sub>', `${fmtKW(cPrimary.Qas)} kW`]);
  return `<h2 class="brosch__h2">Dimensionsrelevante Leistungen</h2>
    <table class="brosch__kv-table"><tbody>
      ${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}
      <tr class="is-highlight"><td>Auslegungsleistung Wärmepumpe Q<sub>h</sub></td><td>${fmtKW(cPrimary.Qh)} kW</td></tr>
    </tbody></table>`;
}

function buildHuelleTable(s){

const ANSCHLUSS_DEF = { wand:'aussenluft', dach:'aussenluft', fenster:'aussenluft', tueren:'aussenluft', boden:'erdreich' };

function buildRaeumeTable(s, c){

    const tInt = r.theta_int || '—';

    const phi = c.detail?.roomResults?.[i]?.phiHL;
    const phiTxt = (phi != null && Number.isFinite(phi)) ? `${fmt(phi/1000, 2)} kW` : '—';

    <table class="brosch__kv-table brosch__kv-table--6col"><thead><tr><th>#</th><th>Name</th><th>Fläche</th><th>θ<sub>int</sub></th><th>beheizt</th><th>Φ<sub>HL</sub></th></tr></thead>
    <tbody>${rows}${sum}</tbody></table>`;

function buildFoerderTable(s, c){
  const db = getFoerderDb();
  const bauDb = getBauDb();
  if (!db) return `<p class="brosch__note">Förder-Datenbank nicht verfügbar.</p>`;
  // Wichtige Ctx-Keys: schaetzeBetrag liest `Qh_kW` (chf/kW) und
  // `A_bauteil_m2`/`kollektor_m2`/`kWp` (chf/m² etc.). Die alte Variante mit
  // `Qh` führte dazu, dass pro-Programm-Schätzungen leer blieben, obwohl der
  // Total > 0 war (Pauschalprogramme).
  const ctx = {
    Qh_kW: c.Qh || 0,
    A_bauteil_m2: 0,
    kollektor_m2: 0,
    kWp: 0,
    objekt: { ebf: num(s.objekt?.ebf) },
    detail: { huelle: {} }
  };
  let progs = [];
  try {
    progs = filterFoerderungen(db, {
      kanton: s.projekt?.kanton, massnahme: s.projekt?.massnahme, wp_quelle: s.projekt?.wp_quelle
    });
  } catch(e){}
  if (!progs.length) return `<p class="brosch__note">Keine passenden Förderprogramme gefunden — Kanton/Massnahme prüfen.</p>`;
  let total = 0;
  try { const g = gruppiereProgramme(progs, ctx); total = g.total_geschaetzt || 0; } catch(_){}
  const rows = progs.map(p => {
    let betr = null;
    try { betr = schaetzeBetrag(p, ctx); } catch(_){}
    const beitragText = (p.beitrag?.text || '').trim();
    const schaetzText = (betr != null && Number.isFinite(betr) && betr > 0)
      ? '≈ CHF ' + fmt(betr, 0) : '';
    // Spalten zusammenführen: wenn Schätzung > 0 zeigen, sonst nur Beitragstext.
    const cell = schaetzText
      ? (beitragText ? `${esc(beitragText)} · <strong>${schaetzText}</strong>` : `<strong>${schaetzText}</strong>`)
      : (beitragText || '—');
    return `<tr><td>${esc(p.ebene === 'bund' ? 'Bund' : kantonLabel(p.kanton || ''))}</td><td>${esc(p.name)}</td><td>${cell}</td></tr>`;
  }).join('');
  // Baubewilligung: Erdsonde komplett ausgeblendet (Daniel macht keine Sonden);
  // LSV-Zeile nur wenn echter Hinweis vorhanden ist; ganze Section nur wenn
  // mindestens eine Zeile etwas Sinnvolles enthält.
  let bewBox = '';
  if (bauDb && s.projekt?.kanton){
    const b = lookupBaubewilligung(bauDb, s.projekt.kanton);
    if (b){
      const bewRows = [];
      if (b.heizungsersatz){
        const t = b.heizungsersatz.bewilligung ? 'bewilligungspflichtig' : 'frei';
        const bd = b.heizungsersatz.bedingungen ? ' · ' + esc(b.heizungsersatz.bedingungen) : '';
        bewRows.push(['Heizungsersatz', t + bd]);
      }
      const lswHinweis = (b.lwwp?.hinweis || '').trim();
      if (lswHinweis && lswHinweis !== '—'){
        bewRows.push(['Luft/Wasser-WP (LSV)', esc(lswHinweis)]);
      }
      if (bewRows.length){
        bewBox = `<h2 class="brosch__h2">Baubewilligung — ${esc(kantonLabel(s.projekt.kanton))}</h2>
          <table class="brosch__kv-table"><tbody>${bewRows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</tbody></table>`;
      }
    }
  }
  return `<h2 class="brosch__h2">Förderprogramme · ${esc(kantonLabel(s.projekt?.kanton) || '—')}</h2>
    <table class="brosch__kv-table brosch__kv-table--3col"><thead><tr><th>Ebene</th><th>Programm</th><th>Beitrag (geschätzt)</th></tr></thead><tbody>${rows}</tbody></table>
    ${total > 0 ? `<p class="brosch__note"><strong>Total Schätzung:</strong> ≈ CHF ${fmt(total, 0)} (Bund + Kanton, in der Regel kombinierbar)</p>` : ''}
    ${bewBox}
    <p class="brosch__footnote">Förder-Beträge sind Richtwerte — verbindlich nur über das jeweilige Antragsportal. Antrag VOR Baubeginn stellen.</p>`;
}

function buildBerechnungsgrundlagen(s){
  // Detail-Block nur ausweisen, wenn der Detail-Modus auch wirklich gerechnet
  // wurde. Sonst genügt der Verbrauchspfad.
  const detail = !!s?.detail?.aktiv;
  const detailLine = detail
    ? `<p class="brosch__note">SIA 384/1:2022 / EN 12831 (raumweise Norm-Heizlast), SIA 385/1:2020 (Warmwasser), VDI 4645 (Pufferspeicher).</p>`
    : '';
  return `<p class="brosch__note">Die Heizlast wurde nach dem Verbrauchsverfahren gemäss Schweizer Wärmepumpen-Fachvereinigung ermittelt. Leistungszuschläge für Sperrzeiten und Warmwasserbereitung folgen denselben Grundlagen.</p>
    ${detailLine}
    <p class="brosch__footnote">Die berechneten Werte basieren auf den vom Kunden/Planer zur Verfügung gestellten Angaben (Brennstoffverbrauch, Gebäudekennwerte, Sanierungszustand, Bauteile). Abweichungen im Nutzerverhalten oder in der Gebäudehülle können das Ergebnis beeinflussen.</p>`;
}

/* ======================================================
   Detaillierter Rechenweg (FWS-Style mit Formeln)
   ====================================================== */
function buildRechenwegDetail(s, c){
  const out = [];
  const primary = c.primary;
  const tv = effectiveTvoll(s);
  const tvA = tvollAuto(s);
  out.push(`<div class="brosch__calc-step">
    <div class="brosch__calc-title">1 · Vollbetriebsstunden t<sub>voll</sub></div>
    <div class="brosch__calc-list">Gebäudetyp = <code>${esc(s.objekt.typ.toUpperCase())}</code> · Lage = <code>${esc(s.objekt.lage)}</code> · WW-Betrieb = <code>${s.warmwasser.aktiv?'mit':'ohne'}</code></div>
    <span class="brosch__calc-formula">t<sub>voll,auto</sub> = FWS-Tabelle(${esc(s.objekt.typ.toUpperCase())}, ${esc(s.objekt.lage)}) = <strong>${fmt(tvA,0)} h/a</strong>${num(s.heizung.tvollOverride)>0?` · Override = ${fmt(num(s.heizung.tvollOverride),0)} h/a`:''}</span>
    <div class="brosch__calc-result">t<sub>voll</sub> = ${fmt(tv,0)} h/a</div>
  </div>`);
  if (primary && primary.key === 'verbrauch' && s.heizung.perioden.length){
    const rows = s.heizung.perioden.map((p, i) => {
      const h = HEIZWERT[p.energy]; if (!h) return '';
      const menge = num(p.menge); if (menge <= 0) return `<li>Periode ${i+1} — <em>keine Menge erfasst</em></li>`;
      const d = periodDays(p);
      const annual = menge * (365/d);
      const eta = periodEta(p);
      const Qn_i = annual * h.Ho * eta;
      const scaled = d !== 365;
      return `<div class="brosch__calc-step brosch__calc-step--accent" style="margin:8px 0 8px 12px; padding:8px 12px;">
        <div class="brosch__calc-subtitle">Periode ${i+1}: ${esc(h.name)}</div>
        <ul class="brosch__calc-list">
          <li>Mess-Menge = <code>${fmt(menge,1)} ${esc(h.unit)}</code>${p.von&&p.bis?` · Zeitraum <code>${esc(p.von)} … ${esc(p.bis)}</code> = <code>${d} d</code>`:` · Annahme <code>365 d</code>`}</li>
          ${scaled?`<li>Annualisierung: ${fmt(menge,1)} × (365/${d}) = <code>${fmt(annual,1)} ${esc(h.unit)}/a</code></li>`:`<li>Annualisierte Menge = <code>${fmt(annual,1)} ${esc(h.unit)}/a</code></li>`}
          <li>Heizwert = <code>${h.Ho} kWh/${esc(h.unit)}</code> · η = <code>${fmt(eta,3)}</code></li>
        </ul>
        <span class="brosch__calc-formula">Q<sub>n,${i+1}</sub> = ${fmt(annual,1)} × ${h.Ho} × ${fmt(eta,3)} = <strong>${fmtKWh(Qn_i)} kWh/a</strong></span>
      </div>`;
    }).join('');
    out.push(`<div class="brosch__calc-step">
      <div class="brosch__calc-title">2 · Brennstoff-Verbrauch → Q<sub>n</sub> (Bruttoenergie)</div>
      <span class="brosch__calc-formula">Q<sub>n</sub> = Σ [ Menge × (365 / T<sub>Mess</sub>) × H × η ]</span>
      ${rows}
      <div class="brosch__calc-result">Σ Q<sub>n</sub> = ${fmtKWh(primary.Qn)} kWh/a</div>
    </div>`);
  }
  if (primary && primary.key === 'betriebsstunden'){
    const kwh = num(s.heizung.bstd_kwh), std = num(s.heizung.bstd_stunden), cop = num(s.heizung.bstd_cop)||1;
    out.push(`<div class="brosch__calc-step"><div class="brosch__calc-title">2 · Methode B — WP-Betriebsstunden</div>
      <ul class="brosch__calc-list"><li>Strombezug = <code>${fmtKWh(kwh)} kWh/a</code> · Stunden = <code>${fmt(std,0)} h</code> · COP = <code>${fmt(cop,2)}</code></li></ul>
      <span class="brosch__calc-formula">Q<sub>n,H</sub> = ${fmtKWh(kwh)} × ${fmt(cop,2)} = <strong>${fmtKWh(primary.QnH)} kWh/a</strong></span></div>`);
  }
  if (primary && primary.key === 'kwh'){
    out.push(`<div class="brosch__calc-step"><div class="brosch__calc-title">2 · Methode C — Nutzenergie direkt</div>
      <span class="brosch__calc-formula">Q<sub>n,H</sub> = <strong>${fmtKWh(primary.QnH)} kWh/a</strong></span></div>`);
  }
  // Step 3 — Warmwasser
  const showWW = s.warmwasser.aktiv || (s.heizung.verbrauchInklWW && primary && primary.QnWW > 0);
  if (showWW){
    const V = effectiveVWu(s);
    const cp = 4.2, dT = num(s.warmwasser.dT) || 50;
    const perDay = V*cp*dT/3600;
    const perYear = perDay * 365;
    const fS = num(s.warmwasser.speicherverluste)/100;
    const fZ = num(s.warmwasser.zirkulation)/100;
    const fA = num(s.warmwasser.ausstoss)/100;
    const pf = (1+fS)*(1+fZ)*(1+fA);
    const QnWW = perYear * pf;
    const vLine = s.warmwasser.modus === 'personen'
      ? `${num(s.warmwasser.personen)} P × ${num(s.warmwasser.lProPerson)||40} l/(P·d) = <code>${fmt(V,0)} l/d</code>`
      : `direkt eingegeben = <code>${fmt(V,0)} l/d</code>`;
    out.push(`<div class="brosch__calc-step"><div class="brosch__calc-title">3 · Warmwasser-Nutzenergie Q<sub>n,WW</sub></div>
      <ul class="brosch__calc-list">
        <li>V<sub>W,u</sub>: ${vLine}</li>
        <li>Tages-Nutzenergie: ${fmt(V,0)} × 4.2 × ${dT} / 3600 = <code>${fmtKWh(perDay)} kWh/d</code></li>
        <li>× 365 d → <code>${fmtKWh(perYear)} kWh/a</code> · Verlust-Faktor (1+${fS.toFixed(2)})·(1+${fZ.toFixed(2)})·(1+${fA.toFixed(2)}) = <code>${pf.toFixed(3)}</code></li>
      </ul>
      <span class="brosch__calc-formula">Q<sub>n,WW</sub> = V × c<sub>p</sub> × ΔT × 365 / 3600 × Π(1+f) = <strong>${fmtKWh(QnWW)} kWh/a</strong></span></div>`);
  }
  // Step 4 — QnH
  if (primary){
    const inclWW = s.heizung.verbrauchInklWW && primary.key==='verbrauch' && primary.QnWW > 0;
    out.push(`<div class="brosch__calc-step"><div class="brosch__calc-title">4 · Heizanteil Q<sub>n,H</sub></div>
      ${inclWW
        ? `<span class="brosch__calc-formula">Q<sub>n,H</sub> = Q<sub>n</sub> − Q<sub>n,WW</sub> = ${fmtKWh(primary.Qn)} − ${fmtKWh(primary.QnWW)} = <strong>${fmtKWh(primary.QnH)} kWh/a</strong></span>`
        : `<span class="brosch__calc-formula">Q<sub>n,H</sub> = <strong>${fmtKWh(primary.QnH)} kWh/a</strong>${primary.key==='verbrauch'?' (Verbrauch enthält kein WW)':''}</span>`}
      </div>`);
    out.push(`<div class="brosch__calc-step"><div class="brosch__calc-title">5 · Norm-Heizlast roh Q<sub>hl,roh</sub></div>
      <span class="brosch__calc-formula">Q<sub>hl,roh</sub> = Q<sub>n,H</sub> / t<sub>voll</sub> = ${fmtKWh(primary.QnH)} / ${fmt(primary.tvoll,0)} = <strong>${fmtKW(primary.Qhl_roh)} kW</strong></span>
      <p class="brosch__calc-note">Einheiten: kWh/a ÷ h/a = kW.</p></div>`);
  }
  // Step 6 — Sanierungsfaktor
  if (primary){
    const f = sanFactor(s);
    out.push(`<div class="brosch__calc-step"><div class="brosch__calc-title">6 · Sanierungsfaktor</div>
      <span class="brosch__calc-formula">Faktor = <strong>${f.toFixed(4)}</strong> · Q<sub>hl</sub> = Q<sub>hl,roh</sub> × ${f.toFixed(4)} = <strong>${fmtKW(primary.Qhl)} kW</strong></span></div>`);
  }
  // Step 7 — Q_w
  if (s.warmwasser.aktiv && primary){
    out.push(`<div class="brosch__calc-step"><div class="brosch__calc-title">7 · Warmwasser-Nachheizung Q<sub>w</sub></div>
      <span class="brosch__calc-formula">Q<sub>w</sub> = Q<sub>hl</sub> × (24/(24 − t<sub>d</sub>) − 1) = <strong>${fmtKW(c.Qw)} kW</strong></span></div>`);
  }
  // Step 8 — Q_off
  if (s.zuschlaege.sperrzeitAktiv){
    const ov = num(s.zuschlaege.toffOverride);
    const toff = ov > 0 ? ov : (TOFF_DEFAULTS[s.zuschlaege.sperrzeitTyp] || 0);
    out.push(`<div class="brosch__calc-step"><div class="brosch__calc-title">8 · EVU-Sperrzeit Q<sub>off</sub></div>
      <span class="brosch__calc-formula">t<sub>off</sub> = ${toff} h/d · Q<sub>off</sub> = Q<sub>hl</sub> × (24/(24 − ${toff}) − 1) = <strong>${fmtKW(c.Qoff)} kW</strong></span></div>`);
  }
  // Step Final
  out.push(`<div class="brosch__calc-step brosch__calc-step--accent">
    <div class="brosch__calc-title">∑ · WP-Auslegungsleistung Q<sub>h</sub></div>
    <span class="brosch__calc-formula">Q<sub>h</sub> = ${fmtKW(c.Qhl)} + ${fmtKW(c.Qw)} + ${fmtKW(c.Qoff)} + ${fmtKW(c.Qas)} = <strong>${fmtKW(c.Qh)} kW</strong></span>
    <div class="brosch__calc-result">Q<sub>h</sub> = ${fmtKW(c.Qh)} kW</div></div>`);
  return out.join('');
}

function buildNotizenBlock(s){
  const n = s.notes || {};
  const order = [
    ['Stammdaten', n.stamm], ['Hülle', n.huelle], ['Räume', n.raeume],
    ['Warmwasser', n.ww], ['Wärmeübergabe', n.verteilung],
    ['Zuschläge', n.zuschlaege], ['Heizlast', n.heizlast],
    ['Speicher · Puffer · MAG', n.speicher], ['Gerät', n.geraet],
    ['Förderungen', n.foerder], ['Baubewilligung', n.bau]
  ].filter(([_, t]) => t && String(t).trim());
  const raum = (s.detail?.raeume || []).map((r, i) => [r.name || ('Raum ' + (i+1)), r.notiz]).filter(([_, t]) => t && String(t).trim());
  if (!order.length && !raum.length) return '';
  let html = `<div class="brosch__page-break"></div>${buildReportHeader()}${buildPageHead('Notizen', new Date().toLocaleDateString('de-CH'), 'subtitle')}`;
  order.forEach(([k, v]) => {
    html += `<div class="brosch__note-block"><strong>${esc(k)}</strong><p>${esc(v).replace(/\n/g,'<br>')}</p></div>`;
  });
  if (raum.length) html += `<h2 class="brosch__h2">Raum-Notizen</h2>`;
  raum.forEach(([k, v]) => {
    html += `<div class="brosch__note-block"><strong>${esc(k)}</strong><p>${esc(v).replace(/\n/g,'<br>')}</p></div>`;
  });
  return html;
}

/* ======================================================
   Helpers
   ====================================================== */
function verbrauchBasisText(s, c){
  const p = c.primary; if (!p) return '— (keine Methode aktiv)';
  if (p.key === 'verbrauch'){
    const parts = (s.heizung.perioden||[]).filter(x => num(x.menge) > 0).map(x => {
      const h = HEIZWERT[x.energy]; const d = periodDays(x);
      return `${fmt(num(x.menge)*(365/d), 0)} ${h?h.unit:''}/a ${h?h.name:x.energy}`;
    });
    return parts.length ? esc(parts.join(' + ')) : '— (keine Menge erfasst)';
  }
  if (p.key === 'betriebsstunden') return `${fmtKWh(num(s.heizung.bstd_kwh))} kWh/a Strombezug · COP ${fmt(num(s.heizung.bstd_cop), 2)}`;
  if (p.key === 'kwh') return `${fmtKWh(num(s.heizung.kwhManual))} kWh/a Nutzenergie (direkt)`;
  if (p.key === 'bauperiode') return `Bauperioden-Schätzung · ${BAUPERIODE_LABEL[s.objekt.bauperiode] || '—'}`;
  return '—';
}
function periodDays(p){ if (!p.von || !p.bis) return 365; const dv = new Date(p.von), db = new Date(p.bis); if (isNaN(dv) || isNaN(db)) return 365; const d = Math.round((db-dv)/86400000)+1; return d>0?d:365; }
function num(v){ const n = Number(v); return Number.isFinite(n) ? n : 0; }
function fmt(v, d=2){ const n = Number(v); if (!Number.isFinite(n)) return '–'; return n.toLocaleString('de-CH', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function fmtKW(v){ return fmt(v, 2); }
function fmtKWh(v){ return fmt(v, 0); }
function cap(s){ return String(s||'').charAt(0).toUpperCase() + String(s||'').slice(1); }
function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function blob(content, mime){ return new Blob([content], { type: mime }); }
function download(b, filename){
  const a = document.createElement('a'); const url = URL.createObjectURL(b);
  a.href = url; a.download = filename; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 200);
}
function buildFilename(meta, ext){
  const safe = (meta.name || 'Heizlast').replace(/[^\wäöüÄÖÜß\-]+/g, '_').slice(0, 40) || 'Heizlast';
  const today = new Date().toISOString().slice(0, 10);
  return `${safe}_${today}.${ext}`;
}
function stripFunctions(obj){ try { return JSON.parse(JSON.stringify(obj)); } catch(_){ return null; } }

// === ./main.mjs ===
(function(){
// src/main.mjs
// Bootstrap-Modul: verdrahtet state ↔ ui ↔ calc/fws + S4 Detail-Modus + S7 Persistenz/Export.
// Datenfluss: Eingabe → state.set → compute(state) [+ computeBuildingDetailLoad]
// → updateUi → autosave Active.

const { getState, setState, set, subscribe, freshState } = __mods__["./state.mjs"];
const { compute } = __mods__["./calc/fws.mjs"];
const { computeBuildingDetailLoad } = __mods__["./calc/heatload.mjs"];
const { computeDistribution } = __mods__["./calc/distribution.mjs"];
const { computeHeatpumpResult } = __mods__["./calc/heatpump.mjs"];
const { initUi, updateUi, rebuildOnDetailToggle, setUWerteData, setWpDb, getWpDb, setFoerderDb, getFoerderDb, setBauDb, getBauDb, resolveHuelleUWerte, enrichRaeumeWithResolvedUFrt } = __mods__["./ui.mjs"];
const { filterFoerderungen, lookupBaubewilligung, schaetzeBetrag, gruppiereProgramme } = __mods__["./calc/foerderung.mjs"];
// S7 — Persistenz + Modale
const { loadActive, autosaveActive, installAutoSync, onLoaded, getActiveMeta, setLastCalc } = __mods__["./persistence.mjs"];
const { renderTopbarActions, renderModals, bootProjectsUi } = __mods__["./projects.mjs"];
const { renderExportModal, initExportUi } = __mods__["./export.mjs"];

const root      = document.getElementById('app');
const stepperEl = document.getElementById('stepper');
const modalRoot = document.getElementById('modalRoot');
const topbarActions = document.getElementById('topbarActions');

// U-Werte-Daten asynchron laden — danach UI initialisieren.
let _booted = false;
async function boot(){
  if (_booted) return; _booted = true;

  // S7 — Topbar-Buttons + Modale ins DOM einfügen, BEVOR initUi/probeAuth läuft
  // (damit globaler Click-Handler die Buttons findet).
  if (topbarActions) topbarActions.innerHTML = renderTopbarActions();
  if (modalRoot) modalRoot.innerHTML = renderModals() + renderExportModal();

  // Daten-Files laden (relative Pfade — funktioniert sowohl in /src/ wie auch
  // in /heizlast/ Deploy, weil bundler die Pfade auf './data/...' umschreibt).
  await loadDataFiles();

  if (!root || !stepperEl){
    console.error('[main] #app oder #stepper im DOM nicht gefunden.');
    return;
  }
  initUi({ root, stepperEl, set, getState });

  // S7 — Aktive Session aus localStorage wiederherstellen, BEVOR der Render-
  // Tick angestossen wird. Wenn nichts da ist: freshState bleibt aktiv.
  const wasLoaded = loadActive();
  // Wenn das geladene Projekt im Detail-Modus war: UI komplett neu rendern,
  // damit die Detail-Sektionen sichtbar sind (initUi rendert sonst nur
  // fresh-state-Layout).
  if (wasLoaded){
    rebuildOnDetailToggle(getState());
  }

  // S7 — Wenn ein Projekt geladen wird (lokal/cloud), UI komplett neu rendern.
  onLoaded((state) => {
    rebuildOnDetailToggle(state);
    const tgl = document.getElementById('toggleDetail');
    if (tgl) tgl.checked = !!state?.detail?.aktiv;
  });

  // Subscribe: bei jeder State-Änderung neu rechnen + UI aktualisieren + autosave.
  let _lastDetailFlag = getState().detail && getState().detail.aktiv;
  subscribe((state) => {
    const calc = compute(state);
    if (state.detail && state.detail.aktiv){
      const { uHuelle } = resolveHuelleUWerte(state);
      // S7: Bauteile mit aufgelösten U/fRT-Werten anreichern (Variante +
      // Anschluss + Bauperiode → U + fRT) BEVOR der Heatload sie liest.
      const enriched = enrichRaeumeWithResolvedUFrt(state);
      calc.detail = computeBuildingDetailLoad(enriched, uHuelle);
      calc.distribution = computeDistribution(state, calc.detail);
      try {
        const db = getWpDb();
        calc.heatpump = computeHeatpumpResult(state, db, calc.Qh);
      } catch (_) { calc.heatpump = null; }
    } else {
      calc.detail = null; calc.distribution = null; calc.heatpump = null;
    }
    const cur = state.detail && state.detail.aktiv;
    if (_lastDetailFlag !== cur){
      _lastDetailFlag = cur;
      rebuildOnDetailToggle(state);
    }
    setLastCalc(calc);
    updateUi(state, calc);
    autosaveActive();
    // Topbar-Projekt-Tag synchron halten.
    const tn = document.getElementById('topProjectName');
    if (tn){
      const m = getActiveMeta();
      tn.textContent = state.projekt?.name || m.name || 'Neues Projekt';
    }
  });

  // Initialer Render-Tick.
  setState(getState());

  // S7 — Login-Probe + Projekte/Export-UI scharf schalten + Auto-Sync.
  await bootProjectsUi();
  initExportUi();
  installAutoSync();

  // Sticky-Layering: Stepper sitzt direkt unter der Topbar. Da die Topbar
  // 2 Zeilen hat und je nach Viewport unterschiedlich hoch ausfällt, messen
  // wir die echte Höhe und setzen `--topbar-h` auf html. Stepper-CSS nutzt
  // `top: var(--topbar-h)`. Auf load + resize + via ResizeObserver.
  syncStickyOffsets();
  window.addEventListener('resize', syncStickyOffsets);
  window.addEventListener('load', syncStickyOffsets);
  if (typeof ResizeObserver !== 'undefined'){
    const tb = document.querySelector('.topbar');
    if (tb){
      const ro = new ResizeObserver(() => syncStickyOffsets());
      ro.observe(tb);
    }
  }

  // Detail-Modus-Toggle ist ab S7 Teil der Topbar-Actions (renderTopbarActions),
  // wird also erst NACH boot() im DOM existieren. Listener hier scharf schalten.
  const tgl = document.getElementById('toggleDetail');
  if (tgl){
    tgl.disabled = false;
    tgl.checked = !!getState()?.detail?.aktiv;
    tgl.addEventListener('change', (ev) => set('detail.aktiv', ev.target.checked));
  }
}

async function loadDataFiles(){
  const tries = [
    ['./data/u-werte.json',         (d) => setUWerteData(d)],
    ['../data/u-werte.json',        (d) => setUWerteData(d)],
    ['./data/waermepumpen.json',    (d) => setWpDb(extractWpList(d))],
    ['../data/waermepumpen.json',   (d) => setWpDb(extractWpList(d))],
    ['./data/foerderungen.json',    (d) => setFoerderDb(d)],
    ['../data/foerderungen.json',   (d) => setFoerderDb(d)],
    ['./data/baubewilligungen.json',(d) => setBauDb(d)],
    ['../data/baubewilligungen.json',(d) => setBauDb(d)]
  ];
  // Pro „Themen-File" einmal versuchen, in der Reihenfolge ./ dann ../.
  const buckets = [
    [tries[0], tries[1]],
    [tries[2], tries[3]],
    [tries[4], tries[5]],
    [tries[6], tries[7]]
  ];
  for (const bucket of buckets){
    for (const [url, apply] of bucket){
      try {
        const res = await fetch(url);
        if (res.ok){
          const data = await res.json();
          apply(data);
          break;
        }
      } catch(_){ /* try next */ }
    }
  }
}
function extractWpList(d){
  if (Array.isArray(d?.hauptgeraete)) return d.hauptgeraete;
  if (Array.isArray(d?.heatPumps))    return d.heatPumps;
  return Array.isArray(d) ? d : [];
}

/** Misst die echte Höhe der sticky `.topbar` und schreibt sie als
 *  CSS-Variable `--topbar-h` auf <html>. Stepper-CSS liest `top: var(--topbar-h)`,
 *  damit der Stepper exakt unter der Topbar klebt — egal wie viele Zeilen
 *  oder welcher Viewport. */
function syncStickyOffsets(){
  const tb = document.querySelector('.topbar');
  if (!tb) return;
  const h = Math.round(tb.getBoundingClientRect().height);
  if (h > 0){
    document.documentElement.style.setProperty('--topbar-h', h + 'px');
  }
}

// (Detail-Toggle wird in boot() scharfgeschaltet — siehe oben. Der alte Top-
// Level-Listener wurde entfernt, weil das Element ab S7 erst nach
// renderTopbarActions im DOM existiert.)

// Devtool: globaler Zugriff für Debugging in der Konsole.
if (typeof window !== 'undefined'){
  window.__heizlast = {
    getState, setState, set, freshState, compute, computeBuildingDetailLoad,
    computeDistribution, computeHeatpumpResult, getWpDb,
    getFoerderDb, getBauDb,
    filterFoerderungen, lookupBaubewilligung, schaetzeBetrag, gruppiereProgramme
  };
}

boot();

__mods__["./main.mjs"] = {  };
})();

</script>
